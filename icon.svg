<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd066"/>
      <stop offset="100%" stop-color="#e8920a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="#011c22"/>
  <!-- Subtle inner atmosphere -->
  <circle cx="256" cy="224" r="220" fill="#073d4a" opacity="0.25"/>
  <!-- Golden ring — the "O" of RelyOn -->
  <circle cx="256" cy="224" r="160" fill="none" stroke="url(#ring)" stroke-width="46"/>
  <!-- "360" inside the ring -->
  <text
    x="256" y="224"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="108"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="middle">360</text>
  <!-- "RELYON" wordmark below ring -->
  <text
    x="256" y="448"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="44"
    font-weight="700"
    fill="#ffa619"
    text-anchor="middle"
    letter-spacing="7">RELYON</text>
</svg>
