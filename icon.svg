<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo -->
  <rect width="512" height="512" rx="80" fill="#01323d"/>
  <!-- Círculo decorativo externo -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#0a6e84" stroke-width="12"/>
  <!-- Círculo interno -->
  <circle cx="256" cy="256" r="155" fill="#052d38"/>
  <!-- Texto R -->
  <text
    x="185"
    y="300"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="160"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-4"
  >R</text>
  <!-- Número 360 menor abaixo -->
  <text
    x="256"
    y="370"
    text-anchor="middle"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="72"
    font-weight="600"
    fill="#3ab5cc"
  >360</text>
  <!-- Linha decorativa -->
  <line x1="176" y1="330" x2="336" y2="330" stroke="#0a6e84" stroke-width="3" stroke-linecap="round"/>
</svg>
