<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <meta name="theme-color" content="#01323d" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <meta name="apple-mobile-web-app-title" content="RelyOn 360" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <!-- CDN scripts com Subresource Integrity (SRI): o navegador recusa rodar o script
       se os bytes não baterem com o hash → defesa contra CDN comprometida (SEGURANCA.md §6.9 S5).
       Versões FIXADAS de propósito (incl. supabase-js, antes flutuante @2): SRI exige bytes
       imutáveis. Atualizar = trocar versão E recalcular o integrity (sha384). -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" integrity="sha384-tMH8h3BGESGckSAVGZ82T9n90ztNXxvdwvdM6UoR56cYcf+0iGXBliJ29D+wZ/x8" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" integrity="sha384-bm7MnzvK++ykSwVJ2tynSE5TRdN+xL418osEVF2DE/L/gfWHj91J2Sphe582B1Bh" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" integrity="sha384-aGlMNK3U/x0wl4lEH5jD1PGhJlX9hApuPmIiA5gtiYCOQ1J8ejIdC0btaU/TMoBD" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.1" integrity="sha384-UQ9Ztz63gzT2JZCuDRkNXV8RP/gXxdPUuM9LKlz2BzqGx9xFYNAK8yAEgbfZHs7P" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js" integrity="sha384-qGFE4FIJLgCFuYs3nzg39XpCtvT5AZUhaBdjB3e1+vpKQa03AkyWOyBSFb9OcQ/g" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" integrity="sha384-vtjasyidUo0kW94K5MXDXntzOJpQgBKXmE7e2Ga4LG0skTTLeBi97eFAXsqewJjw" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* Fallback teal (= boot screen) em vez de #050505 preto: o app seta --rl-page-bg
       em runtime, então este valor só pinta nos GAPS de boot/reload (ex.: auto-update
       do portão de versão). Teal aqui = sem flash preto durante o recarregamento. */
    body { background: var(--rl-page-bg, #011c22); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--rl-scrollbar-track, #111111); }
    ::-webkit-scrollbar-thumb { background: var(--rl-scrollbar-thumb, #2c2c2e); border-radius: 3px; }
    .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    input, select, textarea, button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    select option { background-color: #fff; color: #111; }
    select option[disabled] { color: #475569; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes rl-slideDown { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }
    @keyframes rl-boot-pulse { 0%,100% { stroke-dashoffset: 60; } 50% { stroke-dashoffset: 180; } }
    .rl-boot-screen { display:flex; align-items:center; justify-content:center; height:100vh; background:#011c22; flex-direction:column; gap:28px; padding:0 24px; text-align:center; font-family:'Segoe UI',sans-serif; }
    .rl-boot-ring { position:relative; width:140px; height:140px; }
    .rl-boot-ring .rl-boot-track { stroke:#0e3a45; }
    .rl-boot-ring .rl-boot-arc { stroke:url(#rl-boot-grad); animation: spin 1.4s linear infinite, rl-boot-pulse 2.2s ease-in-out infinite; transform-origin: 48px 48px; }
    .rl-boot-title { font-size:24px; font-weight:800; color:#e2e8f0; letter-spacing:0.5px; line-height:1; }
    .rl-boot-title-o { color:#ffa619; }
    .rl-boot-title-360 { color:#475569; font-weight:300; font-size:18px; }
    .rl-boot-sub { color:#1e4a58; font-size:11px; margin-top:8px; letter-spacing:3px; text-transform:uppercase; }
    .rl-boot-msg { color:#94a3b8; font-size:14px; font-weight:600; margin:0; }
    .rl-nav-btn { transition: background 0.18s ease, color 0.18s ease !important; }
    .rl-nav-btn:hover:not([data-active="true"]) { background: rgba(255,255,255,0.07) !important; color: #ffffff !important; }
    [data-rl-theme="light"] .rl-nav-btn:hover:not([data-active="true"]) { background: rgba(0,0,0,0.06) !important; color: #1d1d1f !important; }
    .rl-nav-btn:focus-visible { outline: 1px solid rgba(255,149,0,0.40); outline-offset: -1px; }
    @media (max-width: 767px) {
      input[type="date"], input[type="time"], input[type="number"], select { font-size: 16px !important; }
    }
  </style>
</head>
<body>
  <div id="root">
    <!-- Placeholder de boot — substituído pelo React quando o AppLoader monta -->
    <div class="rl-boot-screen">
      <div class="rl-boot-ring">
        <svg width="140" height="140" viewBox="0 0 96 96" style="position:absolute;top:0;left:0;filter:drop-shadow(0 0 24px rgba(255,166,25,0.18));">
          <circle cx="48" cy="48" r="38" stroke-width="6" fill="none" class="rl-boot-track"/>
        </svg>
        <svg width="140" height="140" viewBox="0 0 96 96" style="position:absolute;top:0;left:0;transform:rotate(-90deg);">
          <defs>
            <linearGradient id="rl-boot-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#ffd066"/>
              <stop offset="100%" stop-color="#e8920a"/>
            </linearGradient>
          </defs>
          <circle cx="48" cy="48" r="38" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="240" class="rl-boot-arc"/>
        </svg>
      </div>
      <div>
        <div class="rl-boot-title">Rely<span class="rl-boot-title-o">O</span>n<span class="rl-boot-title-360"> 360</span></div>
        <div class="rl-boot-sub">Scheduler</div>
      </div>
      <p class="rl-boot-msg">Carregando…</p>
    </div>
  </div>
  <script type="text/babel" src="js/core.cjs?v=core1"></script>

  <script>

</body>
</html>
