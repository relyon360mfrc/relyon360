<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RelyOn 360 — Scheduler</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <meta name="theme-color" content="#01323d" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RelyOn 360" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #01323d; font-family: 'Segoe UI', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #073d4a; }
    ::-webkit-scrollbar-thumb { background: #154753; border-radius: 3px; }
    .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    input, select, textarea, button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    select option { background-color: #fff; color: #111; }
    select option[disabled] { color: #475569; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes rl-slideDown { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }
    .rl-nav-btn { transition: background 0.18s ease, color 0.18s ease !important; }
    .rl-nav-btn:hover:not([data-active="true"]) { background: rgba(255,255,255,0.05) !important; color: #e2e8f0 !important; }
    .rl-nav-btn:focus-visible { outline: 1px solid rgba(255,166,25,0.35); outline-offset: -1px; }
    @media (max-width: 767px) {
      input[type="date"], input[type="time"], input[type="number"], select { font-size: 16px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="js/config.js?v=cov17"></script>
  <script type="text/babel" src="js/constants.js?v=cov9"></script>
  <script type="text/babel" src="js/components.js?v=cov5"></script>
  <script type="text/babel" src="js/auth.js?v=cov6"></script>
  <script type="text/babel" src="js/dashboard.js?v=cov5"></script>
  <script type="text/babel" src="js/schedule.js?v=cov12"></script>
  <script type="text/babel" src="js/trainings.js?v=cov5"></script>
  <script type="text/babel" src="js/instructors.js?v=cov6"></script>
  <script type="text/babel" src="js/locals.js?v=cov4"></script>
  <script type="text/babel" src="js/ai.js?v=cov4"></script>
  <script type="text/babel" src="js/instructor.js?v=cov6"></script>
  <script type="text/babel" src="js/reports.js?v=cov7"></script>
  <script type="text/babel" src="js/admin.js?v=cov6"></script>
  <script type="text/babel" src="js/communication.js?v=cov2"></script>
  <script type="text/babel" src="js/poolbatch.js?v=cov4"></script>
  <script type="text/babel" src="js/coverage.js?v=cov4"></script>
  <script type="text/babel" src="js/app.js?v=cov11"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .catch(() => {});
      });
    }
  </script>
</body>
</html>
