<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RelyOn 360 — Scheduler</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#01323d" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RelyOn 360" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #01323d; font-family: 'Segoe UI', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #073d4a; }
    ::-webkit-scrollbar-thumb { background: #154753; border-radius: 3px; }
    .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    input, select, textarea, button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 767px) {
      input[type="date"], input[type="time"], input[type="number"], select { font-size: 16px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="js/config.js"></script>
  <script type="text/babel" src="js/constants.js"></script>
  <script type="text/babel" src="js/components.js"></script>
  <script type="text/babel" src="js/auth.js"></script>
  <script type="text/babel" src="js/dashboard.js"></script>
  <script type="text/babel" src="js/schedule.js"></script>
  <script type="text/babel" src="js/trainings.js"></script>
  <script type="text/babel" src="js/instructors.js"></script>
  <script type="text/babel" src="js/locals.js"></script>
  <script type="text/babel" src="js/ai.js"></script>
  <script type="text/babel" src="js/instructor.js"></script>
  <script type="text/babel" src="js/reports.js"></script>
  <script type="text/babel" src="js/admin.js"></script>
  <script type="text/babel" src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .catch(err => console.warn('[RelyOn] SW registro falhou:', err));
      });
    }
  </script>
</body>
</html>
