};

// ── REPORTS ───────────────────────────────────────────────────────────────────
const ReportsPage = ({ schedules, trainings, instructors, user }) => {
  const isInstr = user && user.role === "instructor";
  const instrId = isInstr && (user.linkedInstructorId || user.id);
  // ── Visão do Instrutor (My History) ──────────────────────────────────────
  const hoje = new Date();
  const trintaDiasAtras = new Date(hoje); trintaDiasAtras.setDate(hoje.getDate() - 30);
  const [periodoInicio, setPeriodoInicio] = useState(trintaDiasAtras.toISOString().split("T")[0]);
  const [periodoFim, setPeriodoFim] = useState(hoje.toISOString().split("T")[0]);

  if (isInstr) {
    const fmtDate = d => { const [y,m,dd] = d.split("-"); return `${dd}/${m}/${y}`; };
    const DIAS = ["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];
    const getDia = d => { const [y,m,dd] = d.split("-"); return DIAS[new Date(Number(y), Number(m)-1, Number(dd)).getDay()]; };
    const minhasAulas = schedules
      .filter(s => s.instructorId === instrId && s.date >= periodoInicio && s.date <= periodoFim)
      .sort((a, b) => b.date.localeCompare(a.date) || b.startTime.localeCompare(a.startTime));
    return (
      <div style={{ maxWidth: 960, margin: "0 auto" }}>
        <h2 style={{ color: "#e2e8f0", fontWeight: 700, fontSize: 20, marginBottom: 24 }}>Meu Histórico</h2>
        <div style={{ display: "flex", gap: 16, marginBottom: 24, flexWrap: "wrap", alignItems: "flex-end" }}>
          <div>
            <label style={{ color: "#94a3b8", fontSize: 12, display: "block", marginBottom: 4 }}>De</label>
            <input type="date" value={periodoInicio} onChange={e => setPeriodoInicio(e.target.value)}
              style={{ background: "#073d4a", border: "1px solid #154753", borderRadius: 8, padding: "8px 12px", color: "#e2e8f0", fontSize: 14 }} />
          </div>
          <div>
            <label style={{ color: "#94a3b8", fontSize: 12, display: "block", marginBottom: 4 }}>Até</label>
            <input type="date" value={periodoFim} onChange={e => setPeriodoFim(e.target.value)}
              style={{ background: "#073d4a", border: "1px solid #154753", borderRadius: 8, padding: "8px 12px", color: "#e2e8f0", fontSize: 14 }} />
          </div>
          <div style={{ color: "#64748b", fontSize: 13, paddingBottom: 8 }}>
            {minhasAulas.length} aula{minhasAulas.length !== 1 ? "s" : ""} encontrada{minhasAulas.length !== 1 ? "s" : ""}
          </div>
        </div>
        {minhasAulas.length === 0 ? (
          <div style={{ color: "#64748b", textAlign: "center", marginTop: 48, fontSize: 15 }}>
            Nenhuma aula encontrada neste período.
          </div>
        ) : (
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
              <thead>
                <tr style={{ borderBottom: "2px solid #154753" }}>
                  <th style={{ color: "#64748b", fontWeight: 600, padding: "10px 12px", textAlign: "left", whiteSpace: "nowrap" }}>Dia</th>
                  <th style={{ color: "#64748b", fontWeight: 600, padding: "10px 12px", textAlign: "left", whiteSpace: "nowrap" }}>Data</th>
                  <th style={{ color: "#64748b", fontWeight: 600, padding: "10px 12px", textAlign: "left", whiteSpace: "nowrap" }}>Horário</th>
                  <th style={{ color: "#64748b", fontWeight: 600, padding: "10px 12px", textAlign: "left" }}>Módulo</th>
                  <th style={{ color: "#64748b", fontWeight: 600, padding: "10px 12px", textAlign: "left" }}>Turma</th>
                  <th style={{ color: "#64748b", fontWeight: 600, padding: "10px 12px", textAlign: "left" }}>Local</th>
                  <th style={{ color: "#64748b", fontWeight: 600, padding: "10px 12px", textAlign: "center" }}>Status</th>
                </tr>
              </thead>
              <tbody>
                {minhasAulas.map((s, i) => (
                  <tr key={i} style={{ borderBottom: "1px solid #0d3540", background: i % 2 === 0 ? "transparent" : "#073d4a22" }}>
                    <td style={{ padding: "10px 12px", color: "#64748b", fontWeight: 600, whiteSpace: "nowrap" }}>{getDia(s.date)}</td>
                    <td style={{ padding: "10px 12px", color: "#ffa619", fontWeight: 700, whiteSpace: "nowrap" }}>{fmtDate(s.date)}</td>
                    <td style={{ padding: "10px 12px", color: "#94a3b8", whiteSpace: "nowrap" }}>{s.startTime} – {s.endTime}</td>
                    <td style={{ padding: "10px 12px", color: "#e2e8f0" }}>{s.module}</td>
                    <td style={{ padding: "10px 12px", color: "#94a3b8", whiteSpace: "nowrap" }}>{s.className}</td>
                    <td style={{ padding: "10px 12px", color: "#94a3b8", whiteSpace: "nowrap" }}>{s.local}</td>
                    <td style={{ padding: "10px 12px", textAlign: "center" }}>
                      <span style={{ background: s.status === "Confirmado" ? "#16a34a22" : "#f59e0b22", color: s.status === "Confirmado" ? "#4ade80" : "#fbbf24", border: `1px solid ${s.status === "Confirmado" ? "#16a34a" : "#f59e0b"}`, borderRadius: 20, padding: "3px 10px", fontSize: 12, fontWeight: 600, whiteSpace: "nowrap" }}>
                        {s.status || "Pendente"}
                      </span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    );
  }

  const [tab, setTab] = useState("utilizacao");
  const today = new Date().toISOString().split("T")[0];
  const [utilDate, setUtilDate] = useState(today);

  // ── Relatório de Utilização ───────────────────────────────────────────────
  // Slots: cada slot representa o início da hora. 08:00 = 08:00–09:00, 20:00 = 20:00–21:00
  const PERIODS = [
    { label: "MANHÃ",  color: "#f59e0b", slots: ["08:00","09:00","10:00","11:00"] },
    { label: "TARDE",  color: "#3b82f6", slots: ["13:00","14:00","15:00","16:00"] },
    { label: "NOITE",  color: "#8b5cf6", slots: ["17:00","18:00","19:00","20:00"] },
  ];

  const timeToMins = t => { const [h,m] = t.split(":").map(Number); return h*60+m; };

  const getSlotOccupation = (instructorId, slotStart) => {
    const slotS = timeToMins(slotStart);
    const slotE = slotS + 60; // cada slot = 1 hora
    return schedules.filter(s =>
      s.instructorId === instructorId &&
      s.date === utilDate &&
      timeToMins(s.startTime) < slotE &&
      timeToMins(s.endTime)   > slotS
    );
  };

  const daySchedules = schedules.filter(s => s.date === utilDate);
  const activeInstructors = instructors.filter(i =>
    daySchedules.some(s => s.instructorId === i.id)
  );

  // ── Carga por Instrutor ───────────────────────────────────────────────────
  const byI = instructors.map(i => ({ ...i, count: schedules.filter(s => s.instructorId === i.id).length })).sort((a, b) => b.count - a.count);
  const byT = trainings.map(t => ({ ...t, count: schedules.filter(s => s.trainingId === t.id).length })).sort((a, b) => b.count - a.count);
  const maxI = Math.max(...byI.map(x => x.count), 1), maxT = Math.max(...byT.map(x => x.count), 1);

  const TAB_BTN = (id, label) => (
    <button key={id} onClick={() => setTab(id)}
      style={{ padding: "8px 18px", borderRadius: 20, border: `1px solid ${tab===id ? "#ffa619" : "#154753"}`,
        background: tab===id ? "#ffa61920" : "transparent", color: tab===id ? "#ffa619" : "#64748b",
        fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
      {label}
    </button>
  );

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20, flexWrap:"wrap", gap:12 }}>
        <div>
          <h2 style={{ color:"#fff", fontWeight:800, margin:0, fontSize:24 }}>Relatórios</h2>
          <p style={{ color:"#64748b", margin:"4px 0 0", fontSize:14 }}>Análise de desempenho e utilização</p>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          {TAB_BTN("utilizacao", "📊 Utilização Diária")}
          {TAB_BTN("carga", "🏆 Carga por Instrutor")}
          {TAB_BTN("cursos", "📚 Cursos Programados")}
        </div>
      </div>

      {/* ── ABA: UTILIZAÇÃO DIÁRIA ── */}
      {tab === "utilizacao" && (() => {
        const [somenteLivres, setSomenteLivres] = React.useState(false);
        const [hoveredSlot, setHoveredSlot] = React.useState(null);
        const [busca, setBusca] = React.useState("");
        const buscaRef = React.useRef(null);

        const listaFiltrada = instructors.filter(i => {
          const nomeOk = busca ? i.name.toLowerCase().includes(busca.toLowerCase()) : true;
          const livreOk = somenteLivres ? !PERIODS.some(p => p.slots.some(s => getSlotOccupation(i.id, s).length > 0)) : true;
          return nomeOk && livreOk;
        });

        return (
        <div style={{ position:"relative" }}>
          {/* Tooltip flutuante */}
          {hoveredSlot && (() => {
            const occ = getSlotOccupation(hoveredSlot.instrId, hoveredSlot.slot);
            if (!occ.length) return null;
            const e = occ[0];
            return (
              <div style={{ position:"fixed", left: hoveredSlot.x+12, top: hoveredSlot.y-10, zIndex:999,
                background:"#0a2a34", border:"1px solid #ffa61960", borderRadius:10, padding:"10px 14px",
                boxShadow:"0 8px 24px #00000080", minWidth:200, pointerEvents:"none" }}>
                <div style={{ color:"#ffa619", fontSize:12, fontWeight:700, marginBottom:4 }}>{e.trainingName} · {e.className}</div>
                <div style={{ color:"#e2e8f0", fontSize:11, marginBottom:2 }}>{e.module}</div>
                {e.local && <div style={{ color:"#94a3b8", fontSize:11 }}>📍 {e.local}</div>}
                <div style={{ color:"#64748b", fontSize:10, marginTop:4 }}>{e.startTime} – {e.endTime}</div>
              </div>
            );
          })()}

          {/* Barra de controles */}
          <div style={{ display:"flex", alignItems:"center", gap:16, marginBottom:16, flexWrap:"wrap" }}>
            <div>
              <label style={{ color:"#94a3b8", fontSize:12, display:"block", marginBottom:4 }}>Selecionar dia</label>
              <input type="date" value={utilDate} onChange={e => setUtilDate(e.target.value)}
                style={{ padding:"8px 12px", background:"#073d4a", border:"1px solid #154753", borderRadius:8, color:"#e2e8f0", fontSize:14, outline:"none" }} />
            </div>
            <div style={{ padding:"10px 16px", background:"#01323d", borderRadius:10, border:"1px solid #154753" }}>
              <div style={{ color:"#64748b", fontSize:12 }}>
                {new Date(utilDate+"T12:00:00").toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})}
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:4 }}>
                <span style={{ color:"#16a34a", fontSize:13, fontWeight:700 }}>{activeInstructors.length}/{instructors.length}</span>
                <span style={{ color:"#64748b", fontSize:12 }}>instrutor(es) com programação</span>
                {/* Checkbox: mostrar somente livres */}
                <label style={{ display:"flex", alignItems:"center", gap:6, cursor:"pointer", marginLeft:8,
                  padding:"3px 10px", borderRadius:6, background: somenteLivres ? "#16a34a20" : "#154753",
                  border:`1px solid ${somenteLivres ? "#16a34a60" : "#1e5a6a"}` }}>
                  <input type="checkbox" checked={somenteLivres} onChange={e => setSomenteLivres(e.target.checked)}
                    style={{ accentColor:"#16a34a", width:13, height:13 }} />
                  <span style={{ color: somenteLivres ? "#16a34a" : "#94a3b8", fontSize:11, fontWeight:600 }}>
                    Somente disponíveis
                  </span>
                </label>
              </div>
            </div>
            {/* Campo de busca com ESC para cancelar */}
            <div style={{ position:"relative" }}>
              <div style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", pointerEvents:"none" }}>
                <Icon name="search" size={14} color="#64748b" />
              </div>
              <input
                ref={buscaRef}
                value={busca}
                onChange={e => setBusca(e.target.value)}
                onKeyDown={e => { if (e.key === "Escape") { setBusca(""); buscaRef.current?.blur(); } }}
                placeholder="Filtrar instrutor..."
                style={{ padding:"9px 12px 9px 32px", background:"#073d4a", border:`1px solid ${busca ? "#ffa619" : "#154753"}`,
                  borderRadius:8, color:"#e2e8f0", fontSize:13, outline:"none", width:200, transition:"border 0.2s" }} />
              {busca && (
                <button onClick={() => { setBusca(""); buscaRef.current?.focus(); }}
                  style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", color:"#64748b", fontSize:14, lineHeight:1 }}>
                  ×
                </button>
              )}
            </div>
          </div>

          {/* Tabela */}
          <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", minWidth:900 }}>
              <thead>
                <tr style={{ background:"#01323d" }}>
                  <th rowSpan={2} style={{ padding:"10px 16px", color:"#94a3b8", fontSize:12, fontWeight:700, textAlign:"left", border:"1px solid #154753", minWidth:180 }}>INSTRUTOR</th>
                  {PERIODS.map(p => (
                    <th key={p.label} colSpan={4}
                      style={{ padding:"8px", color:p.color, fontSize:12, fontWeight:800, textAlign:"center", border:"1px solid #154753", background:p.color+"15" }}>
                      {p.label}
                    </th>
                  ))}
                </tr>
                <tr style={{ background:"#01323d" }}>
                  {PERIODS.map(p => p.slots.map(slot => (
                    <th key={`${p.label}-${slot}`}
                      style={{ padding:"6px 4px", color:"#64748b", fontSize:11, fontWeight:600, textAlign:"center", border:"1px solid #154753", minWidth:70 }}>
                      {slot}
                    </th>
                  )))}
                </tr>
              </thead>
              <tbody>
                {listaFiltrada.map((instr, ri) => {
                  const hasAny = PERIODS.some(p => p.slots.some(s => getSlotOccupation(instr.id, s).length > 0));
                  return (
                    <tr key={instr.id} style={{ background: ri%2===0 ? "#073d4a" : "#063540" }}>
                      <td style={{ padding:"8px 14px", border:"1px solid #154753", whiteSpace:"nowrap" }}>
                        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                          <div style={{ width:26, height:26, borderRadius:"50%", background:"linear-gradient(135deg,#ffa619,#e8920a)", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontSize:9, fontWeight:700, flexShrink:0 }}>
                            {instr.name.split(" ").map(n=>n[0]).join("").slice(0,2)}
                          </div>
                          <span style={{ color: hasAny ? "#e2e8f0" : "#475569", fontSize:12, fontWeight: hasAny ? 600 : 400 }}>
                            {instr.name.split(" ").slice(0,3).join(" ")}
                          </span>
                        </div>
                      </td>
                      {PERIODS.map(p => p.slots.map(slot => {
                        const occ = getSlotOccupation(instr.id, slot);
                        const busy = occ.length > 0;
                        const entry = occ[0];
                        const slotKey = `${instr.id}-${p.label}-${slot}`;
                        return (
                          <td key={slotKey} style={{ padding:"6px 4px", border:"1px solid #154753", textAlign:"center", verticalAlign:"middle" }}>
                            {/* Bolinha: verde = ocupado, cinza = livre */}
                            <div
                              onMouseEnter={e => busy && setHoveredSlot({ instrId:instr.id, slot, x:e.clientX, y:e.clientY })}
                              onMouseMove={e => busy && setHoveredSlot(h => h ? { ...h, x:e.clientX, y:e.clientY } : h)}
                              onMouseLeave={() => setHoveredSlot(null)}
                              style={{ width:12, height:12, borderRadius:"50%", margin:"auto", cursor: busy ? "pointer" : "default", transition:"transform 0.1s",
                                background: busy ? "#16a34a" : "#1e3a42",
                                boxShadow: busy ? "0 0 6px #16a34a80" : "none",
                                transform: hoveredSlot?.instrId===instr.id && hoveredSlot?.slot===slot ? "scale(1.4)" : "scale(1)" }}
                            />
                          </td>
                        );
                      }))}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {listaFiltrada.length === 0 && (
            <p style={{ color:"#64748b", textAlign:"center", padding:40 }}>
              {somenteLivres ? "Todos os instrutores têm programação neste dia." : "Nenhuma programação encontrada para este dia."}
            </p>
          )}

          {/* Legenda */}
          <div style={{ display:"flex", gap:20, marginTop:14, flexWrap:"wrap", alignItems:"center" }}>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <div style={{ width:12, height:12, borderRadius:"50%", background:"#16a34a", boxShadow:"0 0 6px #16a34a80" }} />
              <span style={{ color:"#64748b", fontSize:12 }}>Ocupado</span>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <div style={{ width:12, height:12, borderRadius:"50%", background:"#1e3a42" }} />
              <span style={{ color:"#64748b", fontSize:12 }}>Livre</span>
            </div>
            {PERIODS.map(p => (
              <div key={p.label} style={{ display:"flex", alignItems:"center", gap:6 }}>
                <div style={{ width:10, height:10, borderRadius:2, background:p.color+"40", border:`1px solid ${p.color}60` }} />
                <span style={{ color:"#64748b", fontSize:12 }}>{p.label} ({p.slots[0]}–{String(+p.slots[3].split(":")[0]+1).padStart(2,"0")}:00)</span>
              </div>
            ))}
            <span style={{ color:"#475569", fontSize:11, marginLeft:"auto" }}>Passe o mouse sobre uma bolinha verde para ver detalhes</span>
          </div>
        </div>
        );
      })()}

      {/* ── ABA: CARGA POR INSTRUTOR ── */}
      {tab === "carga" && (
        <div style={{ background:"#073d4a", borderRadius:16, padding:24, border:"1px solid #154753" }}>
          <h3 style={{ color:"#fff", fontWeight:700, margin:"0 0 16px", fontSize:15 }}>🏆 Carga por Instrutor</h3>
          {byI.filter(i => i.count > 0).map(i => (
            <div key={i.id} style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12 }}>
              <div style={{ width:30, height:30, borderRadius:"50%", background:"linear-gradient(135deg,#ffa619,#e8920a)", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontSize:10, fontWeight:700, flexShrink:0 }}>
                {i.name.split(" ").map(n=>n[0]).join("").slice(0,2)}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between" }}>
                  <span style={{ color:"#e2e8f0", fontSize:13 }}>{i.name}</span>
                  <span style={{ color:"#64748b", fontSize:13 }}>{i.count} disciplina(s)</span>
                </div>
                <div style={{ height:4, background:"#154753", borderRadius:2, marginTop:4 }}>
                  <div style={{ height:"100%", width:`${(i.count/maxI)*100}%`, background:"linear-gradient(90deg,#ffa619,#e8920a)", borderRadius:2 }} />
                </div>
              </div>
            </div>
          ))}
          {byI.every(i => i.count === 0) && <p style={{ color:"#64748b", textAlign:"center", padding:24 }}>Nenhuma programação cadastrada.</p>}
        </div>
      )}

      {/* ── ABA: CURSOS PROGRAMADOS ── */}
      {tab === "cursos" && (
        <div style={{ background:"#073d4a", borderRadius:16, padding:24, border:"1px solid #154753" }}>
          <h3 style={{ color:"#fff", fontWeight:700, margin:"0 0 16px", fontSize:15 }}>📚 Cursos Mais Programados</h3>
          {byT.filter(t => t.count > 0).slice(0,15).map(t => (
            <div key={t.id} style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12 }}>
              <span style={{ padding:"2px 8px", borderRadius:6, background:"#ffa61920", color:"#ffa619", fontSize:11, fontWeight:700, flexShrink:0, minWidth:60, textAlign:"center" }}>{t.gcc}</span>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between" }}>
                  <span style={{ color:"#e2e8f0", fontSize:12, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:200 }}>{t.name.slice(0,35)}</span>
                  <span style={{ color:"#64748b", fontSize:13 }}>{t.count}</span>
                </div>
                <div style={{ height:4, background:"#154753", borderRadius:2, marginTop:4 }}>
                  <div style={{ height:"100%", width:`${(t.count/maxT)*100}%`, background:"linear-gradient(90deg,#f59e0b,#ef4444)", borderRadius:2 }} />
                </div>
              </div>
            </div>
          ))}
          {byT.every(t => t.count === 0) && <p style={{ color:"#64748b", textAlign:"center", padding:24 }}>Nenhuma programação cadastrada.</p>}
        </div>
      )}
    </div>
  );
};

// ── USERS PAGE ────────────────────────────────────────────────────────────────
const UsersPage = ({ users, setUsers, currentUser, instructors }) => {
  const BLANK = { name: "", email: "", username: "", password: "", role: "planejador", avatar: "", permissions: [] };
  const [form, setForm]       = useState(BLANK);
  const [editing, setEditing] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [delGuard, setDelGuard] = useState({ show: false, action: null, pass: "", err: "" });
  const askDelete = fn => setDelGuard({ show: true, action: fn, pass: "", err: "" });

  const openNew  = () => { setForm(BLANK); setEditing(null); setShowForm(true); };
  const openEdit = u => { setForm({ name: u.name, email: u.email, username: u.username || "", password: u.password, role: u.role, avatar: u.avatar || u.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase(), permissions: u.permissions || [] }); setEditing(u); setShowForm(true); };
  const [unameErr, setUnameErr] = useState("");
  const checkUsername = (val) => {
    const v = (val||"").trim().toLowerCase();
    if (!v) { setUnameErr(""); return; }
    const dupUser  = users.find(u => u.username === v && (!editing || u.id !== editing.id));
    const dupInstr = (instructors||[]).find(i => i.username === v);
    if (dupUser || dupInstr) setUnameErr("⚠ Já existe um usuário/instrutor com esse nome de acesso.");
    else setUnameErr("");
  };
  const save = () => {
    if (!form.name.trim() || !form.email.trim()) return;
    if (!form.username.trim()) return;
    const v = form.username.trim().toLowerCase();
    const dupUser  = users.find(u => u.username === v && (!editing || u.id !== editing.id));
    const dupInstr = (instructors||[]).find(i => i.username === v);
    if (dupUser || dupInstr) { setUnameErr("⚠ Já existe um usuário/instrutor com esse nome de acesso."); return; }
    const av = form.avatar || form.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();
    if (editing) {
      setUsers(users.map(u => u.id === editing.id ? { ...u, ...form, username: v, avatar: av } : u));
    } else {
      setUsers([...users, { id: Date.now(), ...form, username: v, avatar: av, mustChangePass: true }]);
    }
    setUnameErr(""); setShowForm(false); setEditing(null); setForm(BLANK);
  };
  const togglePerm = p => setForm({ ...form, permissions: form.permissions.includes(p) ? form.permissions.filter(x => x !== p) : [...form.permissions, p] });

  const roleColor = { developer: "#8b5cf6", admin: "#ffa619", planejador: "#3b82f6", customer_service: "#06b6d4" };
  const groups = [...new Set(PERMISSIONS_LIST.map(p => p.group))];

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>
        <div><h2 style={{ color: "#fff", fontWeight: 800, margin: 0, fontSize: 24 }}>Usuários</h2>
          <p style={{ color: "#64748b", margin: "4px 0 0", fontSize: 14 }}>Gerenciar contas e níveis de acesso</p></div>
        <Btn onClick={openNew} label="Novo Usuário" icon="plus" />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(300px,1fr))", gap: 16 }}>
        {users.map(u => (
          <div key={u.id} style={{ background: "#073d4a", borderRadius: 16, padding: 20, border: "1px solid #154753" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
              <div style={{ width: 44, height: 44, borderRadius: "50%", background: "linear-gradient(135deg,#ffa619,#e8920a)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 700, fontSize: 15, flexShrink: 0 }}>{u.avatar}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <p style={{ color: "#e2e8f0", fontWeight: 700, margin: 0, fontSize: 15, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{u.name}</p>
                <p style={{ color: "#64748b", fontSize: 12, margin: "2px 0 0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{u.email}</p>
                {u.username && <p style={{ color: "#ffa619", fontSize: 11, margin: "1px 0 0", fontWeight: 600 }}>@{u.username}</p>}
              </div>
              <span style={{ padding: "3px 10px", borderRadius: 20, background: (roleColor[u.role]||"#64748b")+"25", color: roleColor[u.role]||"#64748b", fontSize: 11, fontWeight: 700, flexShrink: 0 }}>
                {ROLE_LABELS[u.role]||u.role}
              </span>
            </div>
            {u.role === "planejador" && (u.permissions||[]).length > 0 && (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 12 }}>
                {(u.permissions||[]).slice(0,4).map(p => { const pl = PERMISSIONS_LIST.find(x=>x.id===p); return pl ? <span key={p} style={{ padding: "2px 7px", borderRadius: 5, background: "#3b82f620", color: "#93c5fd", fontSize: 10 }}>{pl.label}</span> : null; })}
                {(u.permissions||[]).length > 4 && <span style={{ color: "#64748b", fontSize: 10 }}>+{u.permissions.length-4}</span>}
              </div>
            )}
            <div style={{ display: "flex", gap: 8, borderTop: "1px solid #154753", paddingTop: 12 }}>
              <button onClick={() => openEdit(u)} style={{ flex: 1, background: "#154753", border: "none", borderRadius: 8, padding: "8px 0", color: "#e2e8f0", fontSize: 13, cursor: "pointer", fontWeight: 600 }}>Editar</button>
              {u.id !== currentUser.id && (
                <button onClick={() => askDelete(() => setUsers(users.filter(x => x.id !== u.id)))} style={{ background: "none", border: "1px solid #ef444440", borderRadius: 8, padding: "8px 12px", cursor: "pointer", color: "#ef4444", fontSize: 13 }}>✕</button>
              )}
            </div>
          </div>
        ))}
      </div>
      <DeleteGuardModal guard={delGuard} setGuard={setDelGuard} />
      {showForm && (
        <Modal title={editing ? "Editar Usuário" : "Novo Usuário"} onClose={() => { setShowForm(false); setEditing(null); }} width={560}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div style={{ gridColumn: "1/-1" }}><Input label="Nome completo" value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="Ex: João da Silva" /></div>
            <Input label="E-mail" value={form.email} onChange={e => setForm({...form, email: e.target.value})} placeholder="joao@relyonnutec.com" />
            <Input label="Senha" type="password" value={form.password} onChange={e => setForm({...form, password: e.target.value})} placeholder="••••••••" />
          </div>
          <Input label="Usuário (nome de acesso)" value={form.username} onChange={e => { const v = e.target.value.toLowerCase().replace(/\s/g,""); setForm({...form, username: v}); checkUsername(v); }} placeholder="Ex: joao.silva (sem espaços)" />
          {unameErr && <p style={{ color: "#f87171", fontSize: 12, margin: "-10px 0 10px" }}>{unameErr}</p>}
          {!editing && <p style={{ color: "#94a3b8", fontSize: 12, margin: "-8px 0 12px" }}>O usuário precisará alterar a senha no primeiro acesso.</p>}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          </div>
          <Sel label="Nível de Acesso" value={form.role} onChange={e => setForm({...form, role: e.target.value, permissions: []})}
            opts={[
              { v: "developer",        l: "Desenvolvedor — acesso total ao sistema"          },
              { v: "admin",            l: "Administrador — gerencia usuários e configurações" },
              { v: "planejador",       l: "Planejador — permissões configuráveis abaixo"     },
              { v: "customer_service", l: "Customer Service — relatórios de turmas"          },
            ]} />
          {form.role === "planejador" && (
            <div style={{ marginBottom: 16 }}>
              <label style={{ color: "#94a3b8", fontSize: 13, display: "block", marginBottom: 10 }}>Permissões do Planejador</label>
              {groups.map(grp => (
                <div key={grp} style={{ marginBottom: 12 }}>
                  <p style={{ color: "#64748b", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, margin: "0 0 6px" }}>{grp}</p>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {PERMISSIONS_LIST.filter(p => p.group === grp).map(p => (
                      <label key={p.id} style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", padding: "6px 10px", borderRadius: 8, background: form.permissions.includes(p.id) ? "#3b82f620" : "#01323d", border: `1px solid ${form.permissions.includes(p.id) ? "#3b82f6" : "#154753"}` }}>
                        <div onClick={() => togglePerm(p.id)}
                          style={{ width: 18, height: 18, borderRadius: 5, border: `2px solid ${form.permissions.includes(p.id) ? "#3b82f6" : "#154753"}`, background: form.permissions.includes(p.id) ? "#3b82f6" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                          {form.permissions.includes(p.id) && <Icon name="check" size={12} color="#fff" />}
                        </div>
                        <span style={{ color: form.permissions.includes(p.id) ? "#93c5fd" : "#94a3b8", fontSize: 13 }}>{p.label}</span>
                      </label>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
          {form.role === "developer"       && <p style={{ color: "#8b5cf6", fontSize: 13, background: "#8b5cf620", padding: "8px 12px", borderRadius: 8, margin: "0 0 14px" }}>⚡ Desenvolvedor tem acesso irrestrito a todos os recursos do sistema.</p>}
          {form.role === "admin"           && <p style={{ color: "#ffa619",  fontSize: 13, background: "#ffa61920", padding: "8px 12px", borderRadius: 8, margin: "0 0 14px" }}>🔑 Administrador pode gerenciar usuários e todos os itens de configuração.</p>}
          {form.role === "customer_service"&& <p style={{ color: "#06b6d4", fontSize: 13, background: "#06b6d420", padding: "8px 12px", borderRadius: 8, margin: "0 0 14px" }}>📊 Customer Service acessa relatórios de turmas.</p>}
          <Btn onClick={save} label={editing ? "Salvar Alterações" : "Criar Usuário"} icon="check" color="#16a34a" />
        </Modal>
      )}
    </div>
  );
};

// ── ABSENTEISMO PAGE ───────────────────────────────────────────────────────────
const AbsenteismoPage = ({ instructors, absences, setAbsences }) => {
  const BLANK = { instructorId: "", type: "", category: "", startDate: "", endDate: "", startTime: "08:00", endTime: "17:00", obs: "" };
  const [form, setForm]       = useState(BLANK);
  const [showForm, setShowForm] = useState(false);
  const [filterType, setFilterType] = useState("");
  const [filterInstr, setFilterInstr] = useState("");
  const [delGuard, setDelGuard] = useState({ show: false, action: null, pass: "", err: "" });
  const askDelete = fn => setDelGuard({ show: true, action: fn, pass: "", err: "" });

  const cats = form.type ? ABSENCE_TYPES[form.type]?.categories || [] : [];
  const filtered = absences.filter(a =>
    (!filterType || a.type === filterType) &&
    (!filterInstr || String(a.instructorId) === filterInstr)
  );

  const save = () => {
    if (!form.instructorId || !form.type || !form.category || !form.startDate) return;
    if (!isFullDayAbsence(form.category) && (!form.startTime || !form.endTime)) return;
    const instr = instructors.find(i => i.id === +form.instructorId);
    setAbsences([...absences, { ...form, id: Date.now(), instructorId: +form.instructorId, instructorName: instr?.name || "" }]);
    setShowForm(false); setForm(BLANK);
  };

  const typeInfo = t => ABSENCE_TYPES[t] || { label: t, color: "#64748b" };
  const daysBetween = (s, e) => { if (!s||!e) return "—"; const d = (new Date(e)-new Date(s))/(1000*60*60*24); return d >= 0 ? `${d+1} dias` : "—"; };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>
        <div><h2 style={{ color: "#fff", fontWeight: 800, margin: 0, fontSize: 24 }}>Absenteísmo</h2>
          <p style={{ color: "#64748b", margin: "4px 0 0", fontSize: 14 }}>Registro de ausências e afastamentos</p></div>
        <Btn onClick={() => { setForm(BLANK); setShowForm(true); }} label="Registrar Ausência" icon="plus" />
      </div>
      <div style={{ display: "flex", gap: 16, marginBottom: 20, flexWrap: "wrap" }}>
        {Object.entries(ABSENCE_TYPES).map(([k,v]) => (
          <div key={k} style={{ background: "#073d4a", borderRadius: 12, padding: "12px 16px", border: `1px solid ${v.color}40`, flex: 1, minWidth: 160 }}>
            <p style={{ color: v.color, fontSize: 12, fontWeight: 700, margin: "0 0 4px" }}>{v.label}</p>
            <p style={{ color: "#fff", fontSize: 28, fontWeight: 800, margin: 0 }}>{absences.filter(a => a.type === k).length}</p>
          </div>
        ))}
      </div>
      <div style={{ display: "flex", gap: 12, marginBottom: 16, flexWrap: "wrap" }}>
        <select value={filterType} onChange={e => setFilterType(e.target.value)}
          style={{ padding: "8px 12px", background: "#073d4a", border: "1px solid #154753", borderRadius: 8, color: "#e2e8f0", fontSize: 13, outline: "none" }}>
          <option value="">Todos os tipos</option>
          {Object.entries(ABSENCE_TYPES).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
        </select>
        <select value={filterInstr} onChange={e => setFilterInstr(e.target.value)}
          style={{ padding: "8px 12px", background: "#073d4a", border: "1px solid #154753", borderRadius: 8, color: "#e2e8f0", fontSize: 13, outline: "none" }}>
          <option value="">Todos os instrutores</option>
          {instructors.map(i => <option key={i.id} value={i.id}>{i.name}</option>)}
        </select>
      </div>
      {filtered.length === 0 ? (
        <div style={{ background: "#073d4a", borderRadius: 16, padding: 48, textAlign: "center", border: "1px solid #154753" }}>
          <p style={{ color: "#64748b", fontSize: 15 }}>Nenhuma ausência registrada.</p>
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {filtered.map(a => {
            const ti = typeInfo(a.type);
            return (
              <div key={a.id} style={{ background: "#073d4a", borderRadius: 14, padding: "16px 20px", border: "1px solid #154753", display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
                <div style={{ width: 12, height: 12, borderRadius: "50%", background: ti.color, flexShrink: 0 }} />
                <div style={{ flex: 1, minWidth: 180 }}>
                  <p style={{ color: "#e2e8f0", fontWeight: 700, margin: 0, fontSize: 14 }}>{a.instructorName}</p>
                  <p style={{ color: "#64748b", fontSize: 12, margin: "2px 0 0" }}>{a.category}</p>
                </div>
                <div style={{ textAlign: "center", minWidth: 100 }}>
                  <span style={{ padding: "3px 10px", borderRadius: 20, background: ti.color+"25", color: ti.color, fontSize: 11, fontWeight: 700 }}>{ti.label.replace("Absenteísmo ","").replace("Ausência ","Aus. ")}</span>
                </div>
                <div style={{ textAlign: "center", minWidth: 120 }}>
                  <p style={{ color: "#e2e8f0", fontSize: 13, margin: 0 }}>{new Date(a.startDate+"T12:00:00").toLocaleDateString("pt-BR")} — {new Date(a.endDate+"T12:00:00").toLocaleDateString("pt-BR")}</p>
                  <p style={{ color: "#64748b", fontSize: 11, margin: "2px 0 0" }}>{daysBetween(a.startDate, a.endDate)}</p>
                  {!isFullDayAbsence(a.category) && a.startTime && a.endTime && (
                    <p style={{ color: "#ffa619", fontSize: 11, margin: "2px 0 0", fontWeight: 600 }}>⏰ {a.startTime} – {a.endTime}</p>
                  )}
                </div>
                {a.obs && <p style={{ color: "#94a3b8", fontSize: 12, flex: 1, minWidth: 120, margin: 0 }}>{a.obs}</p>}
                <button onClick={() => askDelete(() => setAbsences(absences.filter(x => x.id !== a.id)))} style={{ background: "none", border: "1px solid #ef444440", borderRadius: 8, padding: "6px 8px", cursor: "pointer", flexShrink: 0 }}><Icon name="delete" size={14} color="#ef4444" /></button>
              </div>
            );
          })}
        </div>
      )}
      <DeleteGuardModal guard={delGuard} setGuard={setDelGuard} />
      {showForm && (
        <Modal title="Registrar Ausência" onClose={() => setShowForm(false)} width={500}>
          <Sel label="Instrutor" value={form.instructorId} onChange={e => setForm({...form, instructorId: e.target.value})} opts={instructors.map(i => ({v: i.id, l: i.name}))} />
          <Sel label="Tipo de Ausência" value={form.type} onChange={e => setForm({...form, type: e.target.value, category: ""})}
            opts={Object.entries(ABSENCE_TYPES).map(([k,v]) => ({v: k, l: v.label}))} />
          {form.type && (
            <Sel label="Categoria" value={form.category} onChange={e => setForm({...form, category: e.target.value})}
              opts={cats.map(c => ({v: c, l: c}))} />
          )}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Input label="Data de Início" type="date" value={form.startDate} onChange={e => setForm({...form, startDate: e.target.value})} />
            <Input label="Data de Término" type="date" value={form.endDate} onChange={e => setForm({...form, endDate: e.target.value})} />
          </div>
          {form.startDate && form.endDate && <p style={{ color: "#64748b", fontSize: 12, margin: "-4px 0 12px" }}>{daysBetween(form.startDate, form.endDate)}</p>}
          {form.category && !isFullDayAbsence(form.category) && (
            <div>
              <label style={{ color: "#94a3b8", fontSize: 13, display: "block", marginBottom: 6 }}>Horário de Ausência</label>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
                <Input label="Hora Início" type="time" value={form.startTime} onChange={e => setForm({...form, startTime: e.target.value})} />
                <Input label="Hora Término" type="time" value={form.endTime} onChange={e => setForm({...form, endTime: e.target.value})} />
              </div>
            </div>
          )}
          <div style={{ marginBottom: 16 }}>
            <label style={{ color: "#94a3b8", fontSize: 13, display: "block", marginBottom: 6 }}>Observações <span style={{ color: "#64748b" }}>(opcional)</span></label>
            <textarea value={form.obs} onChange={e => setForm({...form, obs: e.target.value})} rows={2}
              style={{ width: "100%", padding: "10px 12px", background: "#01323d", border: "1px solid #154753", borderRadius: 8, color: "#e2e8f0", fontSize: 13, outline: "none", resize: "vertical", boxSizing: "border-box", fontFamily: "inherit" }} />
          </div>
          <Btn onClick={save} label="Registrar" icon="check" color="#16a34a" />
        </Modal>
      )}
    </div>
  );
};

// ── SETTINGS ──────────────────────────────────────────────────────────────────
const maskPhone = v => {
  const d = (v || "").replace(/\D/g, "").slice(0, 11);
  if (d.length <= 2) return d;
  if (d.length <= 7) return `(${d.slice(0,2)}) ${d.slice(2)}`;
  return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
};

const SettingsPage = ({ areas, setAreas, user }) => {
  const BLANK_FORM = { name: "", color: "#ffa619", leader: "", leaderEmail: "", whatsapp: "" };
  const [showNew,   setShowNew]   = useState(false);
  const [editing,   setEditing]   = useState(null);
  const [form,      setForm]      = useState(BLANK_FORM);
  const [delGuard,  setDelGuard]  = useState({ show: false, action: null, pass: "", err: "" });
  const [saveGuard, setSaveGuard] = useState({ show: false, action: null, pass: "", err: "" });
  const askDelete = (fn) => setDelGuard({ show: true, action: fn, pass: "", err: "" });
  const askSave   = (fn) => setSaveGuard({ show: true, action: fn, pass: "", err: "" });
  const confirmSave = () => {
    if (saveGuard.pass !== "admin123") { setSaveGuard({ ...saveGuard, err: "Senha incorreta." }); return; }
    saveGuard.action();
    setSaveGuard({ show: false, action: null, pass: "", err: "" });
  };

  // 6.3 — Paleta de cores com azul incluído
  const COLORS = [
    "#ffa619","#e8920a","#ef4444","#f97316",
    "#f59e0b","#16a34a","#10b981","#ec4899",
    "#3b82f6","#2563eb","#06b6d4","#64748b",
  ];

  const openNew  = () => { setForm(BLANK_FORM); setEditing(null); setShowNew(true); };
  const openEdit = a  => {
    setForm({ name: a.name, color: a.color, leader: a.leader, leaderEmail: a.leaderEmail, whatsapp: a.whatsapp || "" });
    setEditing(a);
    setShowNew(true);
  };
  const save = () => {
    if (!form.name || !form.leader) return;
    askSave(() => {
      if (editing) setAreas(areas.map(a => a.id === editing.id ? { ...a, ...form } : a));
      else setAreas([...areas, { id: Date.now(), ...form }]);
      setShowNew(false);
    });
  };

  return (
    <div>
      <h2 style={{ color: "#fff", fontWeight: 800, margin: "0 0 4px", fontSize: 24 }}>Configurações</h2>
      <p style={{ color: "#64748b", margin: "0 0 28px", fontSize: 14 }}>Gerencie as áreas de negócio — base de toda a estrutura</p>
      <div style={{ background: "#073d4a", borderRadius: 16, border: "1px solid #154753", overflow: "hidden" }}>
        <div style={{ padding: "18px 24px", borderBottom: "1px solid #154753", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div><h3 style={{ color: "#fff", fontWeight: 700, margin: 0, fontSize: 16 }}>Áreas de Negócio</h3>
            <p style={{ color: "#64748b", fontSize: 13, margin: "2px 0 0" }}>Cada área tem um líder responsável e agrupa os treinamentos</p>
          </div>
          {canAdmin(user) && <Btn onClick={openNew} label="Nova Área" icon="plus" sm />}
        </div>
        {areas.map((a, i) => (
          <div key={a.id} style={{ display: "flex", alignItems: "center", gap: 16, padding: "18px 24px", borderBottom: i < areas.length - 1 ? "1px solid #154753" : "none" }}>
            {/* 6.1 — Ícone de cor sem badge "ÁREA N" */}
            <div style={{ width: 44, height: 44, borderRadius: 12, background: a.color + "20", border: `2px solid ${a.color}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <div style={{ width: 18, height: 18, borderRadius: "50%", background: a.color }} />
            </div>
            <div style={{ flex: 1 }}>
              {/* 6.1 — Nome da área sem o badge de índice */}
              <p style={{ color: "#fff", fontWeight: 800, fontSize: 15, margin: "0 0 6px" }}>{a.name}</p>
              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                <div style={{ width: 28, height: 28, borderRadius: "50%", background: "linear-gradient(135deg,#ffa619,#e8920a)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 10, fontWeight: 700, flexShrink: 0 }}>
                  {a.leader.split(" ").map(n => n[0]).join("").slice(0, 2)}
                </div>
                <div>
                  <p style={{ color: "#e2e8f0", fontSize: 13, margin: 0, fontWeight: 600 }}>{a.leader}</p>
                  <p style={{ color: "#64748b", fontSize: 11, margin: 0 }}>{a.leaderEmail}</p>
                </div>
                {/* 6.2 — WhatsApp */}
                {a.whatsapp && (
                  <span style={{ marginLeft: 8, padding: "2px 10px", borderRadius: 20, background: "#16a34a20", color: "#16a34a", fontSize: 12, fontWeight: 600 }}>
                    📱 {maskPhone(a.whatsapp)}
                  </span>
                )}
              </div>
            </div>
            {canAdmin(user) && (
              <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                <Btn onClick={() => openEdit(a)} label="Editar" icon="edit" color="#154753" sm />
                <button onClick={() => askDelete(() => setAreas(areas.filter(x => x.id !== a.id)))} style={{ background: "none", border: "1px solid #ef444440", borderRadius: 8, cursor: "pointer", padding: "6px 8px" }}>
                  <Icon name="delete" size={14} color="#ef4444" />
                </button>
              </div>
            )}
          </div>
        ))}
      </div>
      <DeleteGuardModal guard={delGuard} setGuard={setDelGuard} />

      {/* 6.4 — Guard modal para salvar/criar área */}
      {saveGuard.show && (
        <Modal title="🔐 Confirmar Alteração" onClose={() => setSaveGuard({ show: false, action: null, pass: "", err: "" })} width={400}>
          <p style={{ color: "#94a3b8", fontSize: 14, marginBottom: 16 }}>
            Alterações em Áreas de Negócio exigem senha de <strong style={{ color: "#ffa619" }}>Administrador</strong>.
          </p>
          <Input label="Senha do Administrador" type="password" value={saveGuard.pass}
            onChange={e => setSaveGuard({ ...saveGuard, pass: e.target.value, err: "" })}
            placeholder="••••••••" />
          {saveGuard.err && <p style={{ color: "#f87171", fontSize: 13, margin: "-4px 0 12px" }}>{saveGuard.err}</p>}
          <div style={{ display: "flex", gap: 8 }}>
            <Btn onClick={confirmSave} label="Confirmar" color="#16a34a" icon="check" />
            <Btn onClick={() => setSaveGuard({ show: false, action: null, pass: "", err: "" })} label="Cancelar" color="#154753" />
          </div>
        </Modal>
      )}

      {showNew && (
        <Modal title={editing ? "Editar Área" : "Nova Área"} onClose={() => setShowNew(false)} width={480}>
          <Input label="Nome da Área" value={form.name} onChange={e => setForm({ ...form, name: e.target.value.toUpperCase() })} placeholder="Ex: OPITO" />
          {/* 6.3 — Paleta com azul */}
          <div style={{ marginBottom: 16 }}>
            <label style={{ color: "#94a3b8", fontSize: 13, display: "block", marginBottom: 8 }}>Cor de identificação</label>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              {COLORS.map(c => (
                <button key={c} onClick={() => setForm({ ...form, color: c })}
                  style={{ width: 32, height: 32, borderRadius: "50%", background: c,
                    border: form.color === c ? "3px solid #fff" : "3px solid transparent",
                    cursor: "pointer", outline: "none", boxShadow: form.color === c ? `0 0 0 2px ${c}` : "none" }} />
              ))}
            </div>
            <div style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ width: 20, height: 20, borderRadius: "50%", background: form.color, border: "2px solid #154753" }} />
              <span style={{ color: form.color, fontSize: 12, fontWeight: 700 }}>{form.color}</span>
            </div>
          </div>
          <Input label="Nome do Líder" value={form.leader} onChange={e => setForm({ ...form, leader: e.target.value })} placeholder="Ex: Matheus Fritz Rodrigues Carvalho" />
          <Input label="E-mail do Líder" value={form.leaderEmail} onChange={e => setForm({ ...form, leaderEmail: e.target.value })} placeholder="Ex: lider@relyonnutec.com" />
          {/* 6.2 — WhatsApp */}
          <Input label="WhatsApp" value={maskPhone(form.whatsapp)}
            onChange={e => setForm({ ...form, whatsapp: e.target.value.replace(/\D/g, "").slice(0, 11) })}
            placeholder="(22) 99999-9999" />
          <Btn onClick={save} label={editing ? "Salvar Alterações" : "Criar Área"} icon="check" color="#16a34a" />
        </Modal>
      )}
    </div>
  );
};

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser]       = useState(() => { try { const s = sessionStorage.getItem(SAVED_KEY); return s ? JSON.parse(s) : null; } catch { return null; } });
  const [active, setActive]   = useState("dashboard");
  const [collapsed, setCollapsed] = useState(false);
  const [schedules, setSchedules]     = usePersisted("relyon_schedules",   INITIAL_SCHEDULES);
  const [trainings, setTrainings]     = usePersisted("relyon_trainings",   INITIAL_TRAININGS);
  const [areas, setAreas]             = usePersisted("relyon_areas",       INITIAL_AREAS);
  const [instructors, setInstructors] = usePersisted("relyon_instructors", INSTRUCTORS);
  const [users,       setUsers]       = usePersisted("relyon_users",       USERS);
  const [absences,    setAbsences]    = usePersisted("relyon_absences",    INITIAL_ABSENCES);

  const isMobile = useIsMobile();
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

  const handleLogin = (u, keep, changePassInfo) => {
    // If first-login triggered a password change, persist to the arrays
    if (changePassInfo) {
      const { id, password, source } = changePassInfo;
      if (source === "user") {
        setUsers(prev => prev.map(x => x.id === id ? { ...x, password, mustChangePass: false } : x));
      } else {
        setInstructors(prev => prev.map(x => x.id === id ? { ...x, password, mustChangePass: false } : x));
      }
    }
    const cleanUser = { ...u }; delete cleanUser._source;
    setUser(cleanUser);
    setActive(u.role === "instructor" ? "dashboard" : (["developer","admin","planejador","customer_service"].includes(u.role) ? "dashboard" : "my-schedule"));
    try { sessionStorage.setItem(SAVED_KEY, JSON.stringify(cleanUser)); } catch {}
  };
  const handleLogout = () => { setUser(null); try { sessionStorage.removeItem(SAVED_KEY); } catch {} };

  if (!user) return <Login onLogin={handleLogin} users={users} instructors={instructors} />;

  const pages = {
    dashboard:    user.role === "instructor" ? <InstructorDashboard schedules={schedules} setSchedules={setSchedules} user={user} /> : <Dashboard schedules={schedules} trainings={trainings} />,
    schedule:     <Schedule     schedules={schedules} setSchedules={setSchedules} trainings={trainings} areas={areas} user={user} instructors={instructors} absences={absences} />,
    instructors:  <InstructorsPage instructors={instructors} setInstructors={setInstructors} trainings={trainings} user={user} users={users} areas={areas} />,
    trainings:    <TrainingsPage  trainings={trainings} setTrainings={setTrainings} areas={areas} user={user} />,
    locals:       <LocalsPage     schedules={schedules} />,
    ai:           <AiPage         schedules={schedules} setSchedules={setSchedules} trainings={trainings} instructors={instructors} />,
    reports:      <ReportsPage    schedules={schedules} trainings={trainings} instructors={instructors} />,
    settings:     <SettingsPage   areas={areas} setAreas={setAreas} user={user} />,
    users:        <UsersPage       users={users} setUsers={setUsers} currentUser={user} instructors={instructors} />,
    absenteismo:  <AbsenteismoPage instructors={instructors} absences={absences} setAbsences={setAbsences} />,
    "my-schedule":<MySchedule     schedules={schedules} setSchedules={setSchedules} user={user} />,
    "my-history": <ReportsPage    schedules={schedules} trainings={trainings} instructors={instructors} user={user} />,
    "my-profile": <InstructorProfile user={user} instructors={instructors} setInstructors={setInstructors} setUser={setUser} />,
  };

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: "#01323d", fontFamily: "'Segoe UI',sans-serif", position: "relative" }}>
      {isMobile && mobileMenuOpen && (
        <div onClick={() => setMobileMenuOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 199 }} />
      )}
      <Sidebar active={active} setActive={setActive} user={user} onLogout={handleLogout}
        collapsed={collapsed} setCollapsed={setCollapsed}
        isMobile={isMobile} mobileOpen={mobileMenuOpen} setMobileOpen={setMobileMenuOpen} />
      <main style={{ flex: 1, padding: isMobile ? 16 : 32, overflowY: "auto", minWidth: 0 }}>
        {isMobile && (
          <button onClick={() => setMobileMenuOpen(true)}
            style={{ marginBottom: 16, background: "#073d4a", border: "1px solid #154753", borderRadius: 10, padding: "8px 14px", color: "#ffa619", cursor: "pointer", display: "flex", alignItems: "center", gap: 8, fontWeight: 600, fontSize: 14 }}>
            <Icon name="menu" size={18} color="#ffa619" /> Menu
          </button>
        )}
        {pages[active] || <Dashboard schedules={schedules} trainings={trainings} />}
      </main>
    </div>
  );
}


// ── APP LOADER (fetches all data from Supabase before rendering) ──────────────
const AppLoader = () => {
  const [ready, setReady] = React.useState(false);
  React.useEffect(() => {
    const DEFAULTS = {
      relyon_schedules: [],
      relyon_trainings: INITIAL_TRAININGS,
      relyon_areas: INITIAL_AREAS,
      relyon_instructors: INSTRUCTORS,
      relyon_users: USERS,
      relyon_absences: INITIAL_ABSENCES,
    };
    (async () => {
      try {
        const { data } = await sb.from('app_state').select('key,value').in('key', _DB_KEYS);
        _initialData = {};
        (data || []).forEach(r => { _initialData[r.key] = r.value; });
        const missing = _DB_KEYS.filter(k => _initialData[k] == null)
          .map(k => ({ key: k, value: DEFAULTS[k] }));
        if (missing.length > 0) {
          missing.forEach(row => { _initialData[row.key] = row.value; });
          await sb.from('app_state').upsert(missing, { onConflict: 'key', ignoreDuplicates: true });
        }
      } catch(e) {
        if (!_initialData) _initialData = {};
      } finally {
        setReady(true);
      }
    })();
  }, []);
  if (!ready) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#011c22',flexDirection:'column',gap:16}}>
      <div style={{width:40,height:40,border:'3px solid #154753',borderTop:'3px solid #ffa619',borderRadius:'50%',animation:'spin 1s linear infinite'}} />
      <p style={{color:'#64748b',fontSize:14}}>Conectando ao banco de dados...</p>
    </div>
  );
  return <App />;
};

ReactDOM.createRoot(document.getElementById('root')).render(<AppLoader />);
  </script>
</body>
