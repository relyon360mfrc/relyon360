  return [state, setState];
};

// Verifica se instrutor está ausente em um determinado dia/horário
const isInstructorAbsent = (instructorId, date, startMins, endMins, absences) => {
  return absences.some(a => {
    if (String(a.instructorId) !== String(instructorId)) return false;
    const aStart = a.startDate, aEnd = a.endDate || a.startDate;
    if (date < aStart || date > aEnd) return false;
    if (isFullDayAbsence(a.category)) return true;
    if (!a.startTime || !a.endTime) return false;
    const absS = timeToMins(a.startTime), absE = timeToMins(a.endTime);
    return startMins < absE && endMins > absS;
  });
};

const SearchSel = ({ label, value, onChange, opts, placeholder = "Buscar ou selecionar..." }) => {
  const [open, setOpen] = React.useState(false);
  const [query, setQuery] = React.useState("");
  const [hi, setHi] = React.useState(0);
  const ref = React.useRef(null);
  const listRef = React.useRef(null);
  const selected = opts.find(o => String(o.v) === String(value));
  const filtered = query ? opts.filter(o => o.l.toLowerCase().includes(query.toLowerCase())) : opts;

  // Reset highlight to 0 whenever filter changes
  React.useEffect(() => { setHi(0); }, [query, open]);

  // Scroll highlighted item into view
  React.useEffect(() => {
    if (!listRef.current) return;
    const el = listRef.current.children[hi];
    if (el) el.scrollIntoView({ block: "nearest" });
  }, [hi]);

  // Close on outside click
  React.useEffect(() => {
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) { setOpen(false); setQuery(""); } };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const select = o => { onChange({ target: { value: o.v } }); setOpen(false); setQuery(""); };

  const onKeyDown = e => {
    if (!open) return;
    if (e.key === "ArrowDown") { e.preventDefault(); setHi(h => Math.min(h + 1, filtered.length - 1)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setHi(h => Math.max(h - 1, 0)); }
    else if (e.key === "Enter") { e.preventDefault(); if (filtered[hi]) select(filtered[hi]); }
    else if (e.key === "Escape") { setOpen(false); setQuery(""); }
  };

  return (
    <div style={{ marginBottom: 14, position: "relative" }} ref={ref}>
      {label && <label style={{ color: "#94a3b8", fontSize: 13, display: "block", marginBottom: 6 }}>{label}</label>}
      <div onClick={() => { setOpen(v => !v); setQuery(""); }}
        style={{ width: "100%", padding: "10px 12px", background: "#01323d", border: `1px solid ${open ? "#ffa619" : "#154753"}`, borderRadius: 8, color: selected ? "#e2e8f0" : "#475569", fontSize: 14, cursor: "pointer", boxSizing: "border-box", display: "flex", justifyContent: "space-between", alignItems: "center", userSelect: "none" }}>
        <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginRight: 8 }}>{selected ? selected.l : placeholder}</span>
        <span style={{ color: "#475569", fontSize: 10, flexShrink: 0 }}>{open ? "▲" : "▼"}</span>
      </div>
      {open && (
        <div style={{ position: "absolute", top: "calc(100% + 4px)", left: 0, right: 0, zIndex: 200, background: "#073d4a", border: "1px solid #ffa61940", borderRadius: 8, boxShadow: "0 8px 28px #00000070", overflow: "hidden" }}>
          <div style={{ padding: "8px 10px", borderBottom: "1px solid #154753" }}>
            <input autoFocus value={query}
              onChange={e => setQuery(e.target.value)}
              onKeyDown={onKeyDown}
              onClick={e => e.stopPropagation()}
              placeholder="Filtrar..."
              style={{ width: "100%", background: "#01323d", border: "1px solid #154753", borderRadius: 6, padding: "7px 10px", color: "#e2e8f0", fontSize: 13, outline: "none", boxSizing: "border-box" }} />
          </div>
          <div ref={listRef} style={{ maxHeight: 220, overflowY: "auto" }}>
            {filtered.length === 0
              ? <p style={{ color: "#475569", fontSize: 13, padding: "10px 14px", margin: 0 }}>Nenhum resultado.</p>
              : filtered.map((o, idx) => {
                const isSelected = String(o.v) === String(value);
                const isHi = idx === hi;
                return (
                  <div key={o.v} onClick={() => select(o)} onMouseEnter={() => setHi(idx)}
                    style={{ padding: "9px 14px", cursor: "pointer", fontSize: 13, borderBottom: "1px solid #01323d30",
                      color: isSelected ? "#ffa619" : "#e2e8f0",
                      background: isHi ? "#1e5a6a" : isSelected ? "#ffa61915" : "transparent" }}>
                    {o.l}
                  </div>
                );
              })}
          </div>
          {filtered.length > 0 && <p style={{ color: "#475569", fontSize: 11, padding: "4px 10px 6px", margin: 0 }}>↑↓ navegar · Enter selecionar · Esc fechar</p>}
        </div>
      )}
    </div>
  );
};

// ── SCHEDULE ──────────────────────────────────────────────────────────────────
const Schedule = ({ schedules, setSchedules, trainings, areas, user, instructors, absences }) => {

  // ── Time helpers ─────────────────────────────────────────────────────────
  const timeToMins = t => { const [h,m] = t.split(":").map(Number); return h*60+m; };
  const minsToTime = m => { const mm = Math.max(0, m); return `${String(Math.floor(mm/60)).padStart(2,"0")}:${String(mm%60).padStart(2,"0")}`; };
  const addDays = (ds, n) => { const d = new Date(ds+"T12:00:00"); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; };
  const fmtDate = ds => ds ? new Date(ds+"T12:00:00").toLocaleDateString("pt-BR", { weekday:"short", day:"2-digit", month:"short" }) : "";

  const sortModules = mods => {
    if (!mods || !mods.length) return [];
    const isReserva = m => /TEMPO\s*RESERVA/i.test(m.name);
    const isProva   = m => /\bPROVA\b/i.test(m.name) && !isReserva(m);
    const regular = mods.filter(m => !isProva(m) && !isReserva(m));
    regular.sort((a,b) => {
      const at = /CBINC/i.test(a.name), bt = /CBINC/i.test(b.name);
      if (at && bt) { if (a.type==="TEORIA" && b.type==="PRÁTICA") return -1; if (a.type==="PRÁTICA" && b.type==="TEORIA") return 1; }
      return (a.priority||99)-(b.priority||99);
    });
    return [...regular, ...mods.filter(isProva), ...mods.filter(isReserva)];
  };

  const recalcTimes = (items, startDateStr, startMins) => {
    // Regra: 08:00-12:00 manha · 13:00-17:00 tarde · quebra nos dias seguintes
    const LUNCH_S = 12*60, LUNCH_E = 13*60, DAY_END = 17*60, DAY_START = 8*60;
    const USEFUL_MINS = (LUNCH_S - DAY_START) + (DAY_END - LUNCH_E); // 480 min uteis por dia
    let curDate = startDateStr, cur = startMins;
    const result = [];
    for (const item of items) {
      let remaining = item.mod?.minutes || 60;
      let isFirst = true;
      while (remaining > 0) {
        // Pular almoco se estamos nele
        if (cur >= LUNCH_S && cur < LUNCH_E) cur = LUNCH_E;
        // Se ja passamos do fim do dia, avancar para proximo dia
        if (cur >= DAY_END) { curDate = addDays(curDate, 1); cur = DAY_START; }
        // Calcular quanto cabe no periodo atual (manha ou tarde)
        let periodEnd = cur < LUNCH_S ? LUNCH_S : DAY_END;
        let available = periodEnd - cur;
        if (available <= 0) {
          // Pular para proximo periodo
          if (cur < LUNCH_E) { cur = LUNCH_E; periodEnd = DAY_END; available = DAY_END - LUNCH_E; }
          else { curDate = addDays(curDate, 1); cur = DAY_START; periodEnd = LUNCH_S; available = LUNCH_S - DAY_START; }
        }
        const chunk = Math.min(remaining, available);
        const endM = cur + chunk;
        if (isFirst) {
          // Primeira parte do modulo: usa o item original
          result.push({ ...item, date: curDate, startTime: minsToTime(cur), endTime: minsToTime(endM) });
          isFirst = false;
        } else {
          // Partes seguintes: mesmo modulo, novo dia
          result.push({ ...item, id: item.id + '_' + curDate, date: curDate, startTime: minsToTime(cur), endTime: minsToTime(endM) });
        }
        remaining -= chunk;
        cur = endM;
        // Pular almoco apos bloco
        if (cur >= LUNCH_S && cur < LUNCH_E) cur = LUNCH_E;
        if (cur >= DAY_END && remaining > 0) { curDate = addDays(curDate, 1); cur = DAY_START; }
      }
    }
    return result;
  };

  const getLocalOpts = (mod, training) => {
    if (!mod) return LOCALS;
    const area = areas.find(a => a.id === training?.area);
    const isCbinc = area && /CBINC|INCÊNDIO|INCENDIO/i.test(area.name);
    return LOCALS.filter(l => {
      if (mod.type === "TEORIA") return l.env === "Teórico";
      if (mod.type === "PRÁTICA") {
        if (isCbinc) return l.subtype === "incendio";
        return l.env === "Prático";
      }
      return true;
    });
  };

  // ── State ─────────────────────────────────────────────────────────────────
  const [step, setStep] = useState(0);
  const [wizForm, setWizForm] = useState({ trainingId: "", className: "", date: "", startTime: "08:00" });
  const [planItems, setPlanItems] = useState([]);
  const [dragIdx, setDragIdx]   = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const [search, setSearch]     = useState("");
  const [expandCls, setExpandCls] = useState({});
  const [delGuard, setDelGuard] = useState({ show: false, action: null, pass: "", err: "" });
  const askDelete = fn => setDelGuard({ show: true, action: fn, pass: "", err: "" });
  // ── Edit mode state ───────────────────────────────────────────────────────
  const [editCls,     setEditCls]     = useState(null);
  const [editItems,   setEditItems]   = useState([]);
  const [dragEditId,  setDragEditId]  = useState(null);
  const [dragOverDay, setDragOverDay] = useState(null);

  const selTraining = trainings.find(t => t.id === +wizForm.trainingId);
  const useDefault  = selTraining?.defaultSchedule !== false;

  // ── Edit mode helpers ────────────────────────────────────────────────────
  const applyDaySchedule = (items) => {
    if (!items.length) return items;
    const LUNCH_S = 12*60, LUNCH_E = 13*60, DAY_END = 17*60, DAY_START = 8*60;
    let curDate = items[0].date, cur = DAY_START;
    const result = [];
    for (const item of items) {
      let remaining = item._minutes || 60;
      let isFirst = true;
      while (remaining > 0) {
        if (cur >= LUNCH_S && cur < LUNCH_E) cur = LUNCH_E;
        if (cur >= DAY_END) { curDate = addDays(curDate, 1); cur = DAY_START; }
        let periodEnd = cur < LUNCH_S ? LUNCH_S : DAY_END;
        let available = periodEnd - cur;
        if (available <= 0) {
          if (cur < LUNCH_E) { cur = LUNCH_E; periodEnd = DAY_END; available = DAY_END - LUNCH_E; }
          else { curDate = addDays(curDate, 1); cur = DAY_START; periodEnd = LUNCH_S; available = LUNCH_S - DAY_START; }
        }
        const chunk = Math.min(remaining, available);
        const endM = cur + chunk;
        if (isFirst) {
          result.push({ ...item, date: curDate, startTime: minsToTime(cur), endTime: minsToTime(endM) });
          isFirst = false;
        } else {
          result.push({ ...item, id: item.id + '_' + curDate, date: curDate, startTime: minsToTime(cur), endTime: minsToTime(endM) });
        }
        remaining -= chunk;
        cur = endM;
        if (cur >= LUNCH_S && cur < LUNCH_E) cur = LUNCH_E;
        if (cur >= DAY_END && remaining > 0) { curDate = addDays(curDate, 1); cur = DAY_START; }
      }
    }
    return result;
  };

  const loadClassForEdit = (cls) => {
    const rows = schedules.filter(s => s.className === cls)
      .slice().sort((a, b) => a.date !== b.date ? a.date.localeCompare(b.date) : a.startTime.localeCompare(b.startTime));
    const trainingId = rows[0]?.trainingId;
    const training = trainings.find(t => t.id === trainingId);
    const enriched = rows.map(r => {
      const mod = training?.modules?.find(m => m.name === r.module);
      const rawDur = timeToMins(r.endTime) - timeToMins(r.startTime);
      // Se passou pelo almoço, subtrair 1h do cálculo bruto
      const lunchOverlap = r.startTime < "12:00" && r.endTime > "13:00" ? 60 : 0;
      const dur = mod?.minutes || Math.max(30, rawDur - lunchOverlap);
      return { ...r, _minutes: dur };
    });
    setEditItems(enriched);
    setEditCls(cls);
    setStep(3);
  };

  const recalcEdit = () => {
    const sorted = [...editItems].sort((a, b) =>
      a.date !== b.date ? a.date.localeCompare(b.date) : a.startTime.localeCompare(b.startTime)
    );
    setEditItems(applyDaySchedule(sorted));
  };

  const reorderEdit = (fromId, toId) => {
    const arr = [...editItems];
    const fi = arr.findIndex(i => i.id === fromId);
    const ti = arr.findIndex(i => i.id === toId);
    if (fi < 0 || ti < 0 || fi === ti) return;
    const [item] = arr.splice(fi, 1);
    arr.splice(ti, 0, item);
    setEditItems(applyDaySchedule(arr));
  };

  const moveToDay = (itemId, targetDay) => {
    const item = editItems.find(i => i.id === itemId);
    if (!item) return;
    const others = editItems.filter(i => i.id !== itemId);
    const lastInDayIdx = [...others].map((x,idx) => x.date === targetDay ? idx : -1).filter(x => x >= 0).pop();
    const insertIdx = lastInDayIdx !== undefined ? lastInDayIdx + 1 : (others.findIndex(i => i.date > targetDay) >= 0 ? others.findIndex(i => i.date > targetDay) : others.length);
    const arr = [...others];
    arr.splice(insertIdx, 0, { ...item, date: targetDay });
    setEditItems(applyDaySchedule(arr));
  };

  const saveEditItems = () => {
    const rows = editItems.map(({ _minutes, ...item }) => ({
      ...item,
      instructorName: instructors.find(i => String(i.id) === String(item.instructorId))?.name || item.instructorName || "",
    }));
    setSchedules([...schedules.filter(s => s.className !== editCls), ...rows]);
    setStep(0); setEditCls(null); setEditItems([]);
  };

  const isRevisao   = name => /REVIS[ÃA]O/i.test(name);
  const isProva     = name => /PROVA/i.test(name) && !/TEMPO\s*RESERVA/i.test(name);
  const isReserva   = name => /TEMPO\s*RESERVA/i.test(name);

  const initPlan = () => {
    if (!selTraining || !wizForm.date) return;
    const sorted = sortModules(selTraining.modules || []);
    const startMins = timeToMins(wizForm.startTime || "08:00");

    // Score: quantos módulos deste treinamento cada instrutor pode ministrar
    const instrScore = {};
    sorted.forEach(mod => {
      instructors.filter(i => (i.skills||[]).includes(mod.name)).forEach(i => {
        instrScore[i.id] = (instrScore[i.id]||0) + 1;
      });
    });

    // Passo 1: calcular horários (1 item por módulo)
    const moduleItems = sorted.map((mod, i) => ({ uid: `pi-${i}-${mod.id}`, mod, instructorId: "", local: "" }));
    const timed = recalcTimes(moduleItems, wizForm.date, startMins);

    // Passo 2: atribuir instrutores e locais — priorizando os mesmos ao longo do treinamento
    const preferredLocals = {}; // mod.type → [local0, local1, ...]
    const committedInstrs = []; // instrutores já escolhidos para este treinamento (em ordem de prioridade)

    const raw = timed.map((timedItem, idx) => {
      const mod = timedItem.mod;
      const count = mod.instructorCount || 1;
      const localOpts = getLocalOpts(mod, selTraining);
      if (!preferredLocals[mod.type]) preferredLocals[mod.type] = [];

      const estStart = timeToMins(timedItem.startTime);
      const estEnd   = timeToMins(timedItem.endTime);
      const qualified = instructors.filter(i =>
        (i.skills||[]).includes(mod.name) &&
        !isInstructorAbsent(i.id, timedItem.date, estStart, estEnd, absences||[])
      ).sort((a,b) => (instrScore[b.id]||0) - (instrScore[a.id]||0));

      // Preferir instrutores já comprometidos com o treinamento
      const assignedIds = [];
      committedInstrs.forEach(cid => {
        if (assignedIds.length < count && qualified.some(q => q.id === cid)) assignedIds.push(cid);
      });
      qualified.forEach(q => {
        if (assignedIds.length < count && !assignedIds.includes(q.id)) {
          assignedIds.push(q.id);
          if (!committedInstrs.includes(q.id)) committedInstrs.push(q.id);
        }
      });

      // Slots: um por vaga de instrutor (instructorCount)
      const slots = [];
      // Local unico para toda a equipe — mesmo cenario para todos os instrutores
      let sharedLocal;
      if (preferredLocals[mod.type]?.length > 0) {
        const prev = preferredLocals[mod.type][0];
        sharedLocal = localOpts.some(l => l.name === prev) ? prev : (localOpts[0]?.name || "");
      } else {
        sharedLocal = localOpts[0]?.name || "";
        if (!preferredLocals[mod.type]) preferredLocals[mod.type] = [];
        preferredLocals[mod.type][0] = sharedLocal;
      }
      for (let k = 0; k < count; k++) {
        slots.push({ instructorId: assignedIds[k] != null ? String(assignedIds[k]) : "", local: sharedLocal });
      }

      return { ...timedItem, uid: `pi-${idx}-${mod.id}`, slots };
    });

    // Passo 3: REVISÃO/RESERVA → mesmo instrutor da PROVA
    const provaItem = raw.find(item => isProva(item.mod.name));
    if (provaItem && provaItem.slots[0]?.instructorId) {
      const provaInstrId = provaItem.slots[0].instructorId;
      raw.forEach(item => {
        if (isRevisao(item.mod.name) || isReserva(item.mod.name)) {
          item.slots = item.slots.map(s => ({ ...s, instructorId: provaInstrId }));
        }
      });
    }

    setPlanItems(raw);
    setStep(2);
  };

  const reorder = (from, to) => {
    if (from === to) return;
    const arr = [...planItems];
    const [item] = arr.splice(from, 1);
    arr.splice(to, 0, item);
    const startMins = timeToMins(wizForm.startTime || "08:00");
    setPlanItems(recalcTimes(arr, wizForm.date, startMins));
  };

  const savePlan = () => {
    const newRows = planItems.flatMap(item => {
      const slots = item.slots || [{ instructorId: item.instructorId||"", local: item.local||"" }];
      return slots.map(slot => {
        const instr = instructors.find(i => i.id === +slot.instructorId);
        return {
          id: Date.now() + Math.random(),
          trainingId: selTraining.id,
          trainingName: selTraining.gcc,
          className: wizForm.className,
          date: item.date,
          startTime: item.startTime,
          endTime: item.endTime,
          local: slot.local || "",
          instructorId: +slot.instructorId || null,
          instructorName: instr?.name || "",
          module: item.mod.name,
          role: item.mod.type === "PRÁTICA" ? "Practical Instructor" : "Theoretical Instructor",
          studentCount: "",
          status: "Pendente",
        };
      });
    });
    setSchedules([...schedules, ...newRows]);
    setStep(0);
    setWizForm({ trainingId: "", className: "", date: "", startTime: "08:00" });
    setPlanItems([]);
  };

  const deleteClass = cls => askDelete(() => setSchedules(schedules.filter(s => s.className !== cls)));

  // ── Group existing schedules by className ─────────────────────────────────
  const allClasses = [...new Set(schedules.map(s => s.className))];
  const filteredClasses = allClasses.filter(cls =>
    [cls, ...schedules.filter(s=>s.className===cls).map(s=>s.trainingName||"")].some(v=>v.toLowerCase().includes(search.toLowerCase()))
  );

  // ── Group plan items by date ──────────────────────────────────────────────
  const planByDay = planItems.reduce((acc, item) => {
    const k = item.date || "—";
    if (!acc[k]) acc[k] = [];
    acc[k].push(item);
    return acc;
  }, {});

  // ── STEP 0: List view ─────────────────────────────────────────────────────
  if (step === 0) return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24 }}>
        <div><h2 style={{ color:"#fff", fontWeight:800, margin:0, fontSize:24 }}>Programação</h2>
             <p style={{ color:"#64748b", margin:"4px 0 0", fontSize:14 }}>Planejamento de turmas por treinamento</p></div>
        {canAdmin(user) && <Btn onClick={() => setStep(1)} label="Nova Turma" icon="plus" />}
      </div>
      <div style={{ position:"relative", marginBottom:16 }}>
        <div style={{ position:"absolute", left:14, top:"50%", transform:"translateY(-50%)" }}><Icon name="search" size={16} color="#64748b" /></div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar turma ou treinamento..."
          style={{ width:"100%", padding:"10px 10px 10px 40px", background:"#073d4a", border:"1px solid #154753", borderRadius:10, color:"#e2e8f0", fontSize:14, outline:"none", boxSizing:"border-box" }} />
      </div>
      {filteredClasses.length === 0 && <p style={{ color:"#64748b", textAlign:"center", padding:48 }}>Nenhuma turma programada. Clique em "Nova Turma" para começar.</p>}
      <div style={{ display:"grid", gap:10 }}>
        {filteredClasses.map(cls => {
          const rows = schedules.filter(s => s.className === cls);
          const t = trainings.find(t => t.id === rows[0]?.trainingId);
          const area = areas.find(a => a.id === t?.area);
          const dates = [...new Set(rows.map(r=>r.date))].sort();
          const expanded = !!expandCls[cls];
          const pending = rows.filter(r => r.status === "Pendente").length;
          const confirmed = rows.filter(r => r.status === "Confirmado").length;
          return (
            <div key={cls} style={{ background:"#073d4a", borderRadius:14, border:`1px solid ${area ? area.color+"40" : "#154753"}`, overflow:"hidden" }}>
              <div onClick={() => setExpandCls(p => ({ ...p, [cls]: !p[cls] }))}
                style={{ display:"flex", alignItems:"center", gap:12, padding:"14px 20px", cursor:"pointer" }}>
                {area && <div style={{ width:4, height:44, borderRadius:4, background:area.color, flexShrink:0 }} />}
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                    <span style={{ color:"#fff", fontWeight:700, fontSize:15 }}>{cls}</span>
                    {t && <span style={{ padding:"2px 8px", borderRadius:6, background:"#ffa61920", color:"#ffa619", fontSize:11, fontWeight:700 }}>{t.gcc}</span>}
                    {area && <span style={{ padding:"2px 8px", borderRadius:6, background:area.color+"20", color:area.color, fontSize:11, fontWeight:600 }}>{area.name}</span>}
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:4, flexWrap:"wrap" }}>
                    <span style={{ color:"#64748b", fontSize:12 }}>{rows.length} disciplinas · {dates.length} dia(s)</span>
                    {dates.length > 0 && <span style={{ color:"#94a3b8", fontSize:12 }}>{fmtDate(dates[0])}{dates.length>1 ? ` → ${fmtDate(dates[dates.length-1])}` : ""}</span>}
                    {confirmed > 0 && <span style={{ padding:"1px 8px", borderRadius:10, background:"#16a34a20", color:"#16a34a", fontSize:11 }}>{confirmed} confirmado(s)</span>}
                    {pending > 0 && <span style={{ padding:"1px 8px", borderRadius:10, background:"#d9780620", color:"#d97806", fontSize:11 }}>{pending} pendente(s)</span>}
                  </div>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  {canAdmin(user) && (
                    <button onClick={e => { e.stopPropagation(); loadClassForEdit(cls); }}
                      style={{ background:"#154753", border:"1px solid #1e6a7a", borderRadius:8, cursor:"pointer", padding:"5px 10px", display:"flex", alignItems:"center", gap:5, color:"#ffa619", fontSize:12, fontWeight:600 }}>
                      <Icon name="edit" size={13} color="#ffa619" /> Editar
                    </button>
                  )}
                  {canAdmin(user) && <button onClick={e => { e.stopPropagation(); deleteClass(cls); }}
                    style={{ background:"none", border:"1px solid #ef444440", borderRadius:8, cursor:"pointer", padding:"5px 8px" }}>
                    <Icon name="delete" size={14} color="#ef4444" />
                  </button>}
                  <span style={{ color:"#64748b", fontSize:14 }}>{expanded ? "▲" : "▼"}</span>
                </div>
              </div>
              {expanded && (
                <div style={{ borderTop:"1px solid #154753" }}>
                  {dates.map(d => (
                    <div key={d}>
                      <div style={{ padding:"8px 20px", background:"#01323d", borderBottom:"1px solid #154753" }}>
                        <span style={{ color:"#94a3b8", fontSize:12, fontWeight:600 }}>{fmtDate(d)}</span>
                      </div>
                      {rows.filter(r=>r.date===d).sort((a,b)=>a.startTime.localeCompare(b.startTime)).map(r => (
                        <div key={r.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 20px", borderBottom:"1px solid #07385040" }}>
                          <span style={{ color:"#64748b", fontSize:12, width:80, flexShrink:0 }}>{r.startTime}–{r.endTime}</span>
                          <span style={{ flex:1, color:"#e2e8f0", fontSize:13, minWidth:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.module}</span>
                          <span style={{ padding:"2px 7px", borderRadius:5, background:"#ffa61915", color:"#ffa619", fontSize:11, flexShrink:0 }}>{r.local || "—"}</span>
                          <span style={{ color:"#94a3b8", fontSize:12, flexShrink:0, maxWidth:120, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.instructorName || <span style={{color:"#ef4444"}}>⚠ Sem instrutor</span>}</span>
                          <span style={{ padding:"3px 8px", borderRadius:10, background:(STATUS_COLOR[r.status]||"#64748b")+"20", color:STATUS_COLOR[r.status]||"#64748b", fontSize:11, fontWeight:600, flexShrink:0 }}>{r.status}</span>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
      <DeleteGuardModal guard={delGuard} setGuard={setDelGuard} />
    </div>
  );

  // ── STEP 3: Edit saved class ─────────────────────────────────────────────
  if (step === 3) {
    const editByDay = editItems.reduce((acc, item) => {
      if (!acc[item.date]) acc[item.date] = [];
      acc[item.date].push(item);
      return acc;
    }, {});
    const editTraining = trainings.find(t => t.id === editItems[0]?.trainingId);
    const editArea     = areas.find(a => a.id === editTraining?.area);
    const isCbincEdit  = editArea && /CBINC|INCÊNDIO|INCENDIO/i.test(editArea.name);

    return (
      <div>
        <button onClick={() => { setStep(0); setEditCls(null); setEditItems([]); setDragEditId(null); setDragOverDay(null); }}
          style={{ display:"flex", alignItems:"center", gap:8, background:"none", border:"none", color:"#94a3b8", cursor:"pointer", fontSize:14, marginBottom:20, padding:0 }}>
          <Icon name="back" size={18} color="#94a3b8" /> Voltar sem salvar
        </button>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20, flexWrap:"wrap", gap:12 }}>
          <div>
            <h2 style={{ color:"#fff", fontWeight:800, margin:0, fontSize:22 }}>
              {editCls} <span style={{ color:"#ffa619", fontWeight:400, fontSize:14 }}>— editando</span>
            </h2>
            <p style={{ color:"#64748b", fontSize:13, margin:"4px 0 0" }}>
              {editItems.length} módulos · {Object.keys(editByDay).length} dia(s)
              {editTraining && <span style={{ marginLeft:12, color:"#94a3b8" }}>{editTraining.name.slice(0,50)}</span>}
            </p>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <Btn onClick={recalcEdit} label="↺ Recalcular horários" color="#154753" sm />
            <Btn onClick={saveEditItems} label="✓ Salvar alterações" color="linear-gradient(135deg,#16a34a,#15803d)" />
          </div>
        </div>
        <p style={{ color:"#475569", fontSize:12, marginBottom:16, padding:"8px 12px", background:"#073d4a", borderRadius:8, border:"1px solid #154753" }}>
          ⠿ Arraste módulos para reordenar dentro do dia · Arraste para o <strong style={{color:"#ffa619"}}>cabeçalho de outro dia</strong> para mover aquele módulo
        </p>

        {Object.entries(editByDay).sort(([a],[b]) => a.localeCompare(b)).map(([day, dayItems]) => {
          const isOver = dragOverDay === day;
          return (
            <div key={day} style={{ marginBottom:20 }}
              onDragOver={e => { e.preventDefault(); if (dragEditId) setDragOverDay(day); }}
              onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setDragOverDay(null); }}
              onDrop={e => { e.preventDefault(); setDragOverDay(null); if (dragEditId) moveToDay(dragEditId, day); setDragEditId(null); }}>
              <div style={{ padding:"10px 16px", background: isOver ? "#1e4a5a" : "#01323d",
                borderRadius:"10px 10px 0 0", border:`2px solid ${isOver ? "#ffa619" : "#154753"}`,
                borderBottom:"none", display:"flex", alignItems:"center", gap:10, transition:"all 0.15s" }}>
                <span style={{ color:"#ffa619", fontSize:13, fontWeight:700 }}>{fmtDate(day)}</span>
                <span style={{ color:"#64748b", fontSize:12 }}>{dayItems.length} disciplina(s)</span>
                {isOver && (
                  <span style={{ marginLeft:"auto", color:"#ffa619", fontSize:12, fontWeight:600, animation:"pulse 1s infinite" }}>
                    ⤵ Soltar aqui para mover para {fmtDate(day)}
                  </span>
                )}
              </div>
              <div style={{ border:`1px solid ${isOver ? "#ffa619" : "#154753"}`, borderTop:"none", borderRadius:"0 0 10px 10px", overflow:"hidden", transition:"border-color 0.15s" }}>
                {dayItems.map((item, li) => {
                  const modType  = (item.role||"").includes("Practical") || (item.module||"").includes("PRÁTICA") ? "PRÁTICA" : "TEORIA";
                  const localOpts2 = LOCALS.filter(l => {
                    if (modType === "TEORIA")   return l.env === "Teórico";
                    if (modType === "PRÁTICA")  return isCbincEdit ? l.subtype === "incendio" : l.env === "Prático";
                    return true;
                  });
                  const qualInstr = item.module
                    ? instructors.filter(i => (i.skills||[]).includes(item.module))
                    : instructors;
                  const isDragging = dragEditId === item.id;
                  return (
                    <div key={item.id}
                      draggable
                      onDragStart={e => { e.stopPropagation(); setDragEditId(item.id); setDragOverDay(null); }}
                      onDragEnd={() => { setDragEditId(null); setDragOverDay(null); }}
                      onDragOver={e => { e.preventDefault(); e.stopPropagation(); }}
                      onDrop={e => { e.stopPropagation(); if (dragEditId && dragEditId !== item.id) { reorderEdit(dragEditId, item.id); setDragEditId(null); } }}
                      style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px",
                        background: isDragging ? "#1e5a6a" : li%2===0 ? "#073d4a" : "#063540",
                        borderBottom: li < dayItems.length-1 ? "1px solid #154753" : "none",
                        cursor:"grab", opacity: isDragging ? 0.4 : 1, transition:"opacity 0.15s" }}>
                      <span style={{ color:"#475569", fontSize:16, flexShrink:0, cursor:"grab" }}>⠿</span>
                      <div style={{ width:88, flexShrink:0 }}>
                        <span style={{ color:"#94a3b8", fontSize:11 }}>{item.startTime}–{item.endTime}</span>
                        <p style={{ color:"#475569", fontSize:10, margin:0 }}>{item.startTime && item.endTime ? fmtMin(timeToMins(item.endTime) - timeToMins(item.startTime)) : ""}</p>
                      </div>
                      <div style={{ flex:1, minWidth:0 }}>
                        <p style={{ color:"#e2e8f0", fontSize:13, fontWeight:600, margin:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.module}</p>
                        <span style={{ padding:"1px 6px", borderRadius:4, background: modType==="PRÁTICA" ? "#16a34a20":"#ffa61920", color: modType==="PRÁTICA" ? "#16a34a":"#ffa619", fontSize:10, fontWeight:700 }}>{modType}</span>
                      </div>
                      <div style={{ width:160, flexShrink:0 }}>
                        <select value={item.local||""} onChange={e => setEditItems(prev => prev.map(x => x.id===item.id ? {...x, local:e.target.value} : x))}
                          style={{ width:"100%", padding:"6px 8px", background:"#01323d", border:"1px solid #154753", borderRadius:7, color: item.local ? "#e2e8f0":"#475569", fontSize:12, outline:"none" }}>
                          <option value="">📍 Local...</option>
                          {localOpts2.map(l => <option key={l.id} value={l.name}>{l.name}</option>)}
                        </select>
                      </div>
                      <div style={{ width:180, flexShrink:0 }}>
                        <select value={String(item.instructorId||"")} onChange={e => setEditItems(prev => prev.map(x => x.id===item.id ? {...x, instructorId: +e.target.value||null} : x))}
                          style={{ width:"100%", padding:"6px 8px", background:"#01323d", border:"1px solid #154753", borderRadius:7, color: item.instructorId ? "#e2e8f0":"#475569", fontSize:12, outline:"none" }}>
                          <option value="">👤 Instrutor...</option>
                          {qualInstr.map(i => <option key={i.id} value={i.id}>{i.name}</option>)}
                          {qualInstr.length < instructors.length && (
                            <>
                              <option value="" disabled>─────</option>
                              {instructors.filter(i => !qualInstr.find(q=>q.id===i.id)).map(i => (
                                <option key={i.id} value={i.id} style={{color:"#ef4444"}}>⚠ {i.name}</option>
                              ))}
                            </>
                          )}
                        </select>
                      </div>
                      <span style={{ padding:"3px 8px", borderRadius:10, background:(STATUS_COLOR[item.status]||"#64748b")+"20", color:STATUS_COLOR[item.status]||"#64748b", fontSize:11, fontWeight:600, flexShrink:0 }}>
                        {item.status}
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
        <DeleteGuardModal guard={delGuard} setGuard={setDelGuard} />
      </div>
    );
  }

    // ── STEP 1: Wizard — Select training ─────────────────────────────────────
  if (step === 1) return (
    <div>
      <button onClick={() => setStep(0)} style={{ display:"flex", alignItems:"center", gap:8, background:"none", border:"none", color:"#94a3b8", cursor:"pointer", fontSize:14, marginBottom:20, padding:0 }}>
        <Icon name="back" size={18} color="#94a3b8" /> Voltar à Programação
      </button>
      <div style={{ background:"#073d4a", borderRadius:16, padding:28, border:"1px solid #154753", maxWidth:560 }}>
        <h2 style={{ color:"#fff", fontWeight:800, margin:"0 0 6px", fontSize:20 }}>Nova Turma</h2>
        <p style={{ color:"#64748b", fontSize:13, margin:"0 0 24px" }}>Selecione o treinamento e a data de início</p>
        <SearchSel label="Treinamento" value={wizForm.trainingId}
          onChange={e => setWizForm({ ...wizForm, trainingId: e.target.value, className: "" })}
          opts={trainings.map(t => ({ v: t.id, l: `${t.gcc} — ${t.name.slice(0,50)}` }))} />
        {selTraining && (
          <div style={{ marginBottom:14, padding:"10px 14px", background:"#01323d", borderRadius:10, border:"1px solid #154753" }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
              <span style={{ color:"#ffa619", fontSize:12, fontWeight:700 }}>{selTraining.gcc}</span>
              {(() => { const a = areas.find(x => x.id === selTraining.area); return a ? <span style={{ padding:"1px 8px", borderRadius:10, background:a.color+"20", color:a.color, fontSize:11, fontWeight:600 }}>{a.name}</span> : null; })()}
              <span style={{ color:"#64748b", fontSize:12 }}>{selTraining.modules?.length||0} módulos</span>
              <span style={{ color: selTraining.defaultSchedule!==false ? "#ffa619" : "#94a3b8", fontSize:11 }}>
                {selTraining.defaultSchedule!==false ? "⏰ Horário 08:00–17:00" : "⏰ Horário personalizado"}
              </span>
            </div>
            {selTraining.modules?.length === 0 && <p style={{ color:"#d97806", fontSize:12, margin:"6px 0 0" }}>⚠ Este treinamento não possui módulos cadastrados. Adicione módulos em Treinamentos antes de programar.</p>}
          </div>
        )}
        <Input label="Nome da Turma" value={wizForm.className} onChange={e => setWizForm({ ...wizForm, className: e.target.value })} placeholder="Ex: CBSP - 01" />
        <Input label="Data de Início" type="date" value={wizForm.date} onChange={e => setWizForm({ ...wizForm, date: e.target.value })} />
        {selTraining && selTraining.defaultSchedule === false && (
          <Input label="Horário de Início" type="time" value={wizForm.startTime} onChange={e => setWizForm({ ...wizForm, startTime: e.target.value })} />
        )}
        {selTraining && selTraining.defaultSchedule !== false && (
          <p style={{ color:"#64748b", fontSize:12, margin:"-4px 0 14px", padding:"8px 12px", background:"#154753", borderRadius:8 }}>
            ⏰ Horário padrão: <strong style={{color:"#ffa619"}}>08:00 → 12:00</strong> (almoço) <strong style={{color:"#ffa619"}}>13:00 → 17:00</strong>
          </p>
        )}
        <Btn onClick={initPlan}
          disabled={!wizForm.trainingId || !wizForm.className || !wizForm.date || !selTraining?.modules?.length}
          label="Gerar Planejamento Automático →" color="linear-gradient(135deg,#ffa619,#e8920a)" />
      </div>
    </div>
  );

  // ── STEP 2: Plan editing with drag & drop ─────────────────────────────────
  const startMins = timeToMins(wizForm.startTime || "08:00");

  return (
    <div>
      <button onClick={() => setStep(1)} style={{ display:"flex", alignItems:"center", gap:8, background:"none", border:"none", color:"#94a3b8", cursor:"pointer", fontSize:14, marginBottom:20, padding:0 }}>
        <Icon name="back" size={18} color="#94a3b8" /> Voltar às Configurações
      </button>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20, flexWrap:"wrap", gap:12 }}>
        <div>
          <h2 style={{ color:"#fff", fontWeight:800, margin:0, fontSize:22 }}>{wizForm.className}</h2>
          <p style={{ color:"#64748b", fontSize:13, margin:"4px 0 0" }}>
            {selTraining?.name} · {planItems.length} disciplina(s) · {planItems.reduce((a,i) => a + (i.slots?.length||1), 0)} slot(s) de instrutor · {Object.keys(planByDay).length} dia(s)
          </p>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <Btn onClick={() => { setPlanItems(recalcTimes(planItems.map(i=>({...i})), wizForm.date, startMins)); }} label="↺ Recalcular" color="#154753" sm />
          <Btn onClick={savePlan} label="✓ Confirmar Planejamento" color="linear-gradient(135deg,#16a34a,#15803d)" />
        </div>
      </div>
      <p style={{ color:"#475569", fontSize:12, marginBottom:16 }}>⠿ Arraste para reordenar · Edite o instrutor e local diretamente em cada linha</p>

      {Object.entries(planByDay).sort(([a],[b])=>a.localeCompare(b)).map(([day, dayItems]) => (
        <div key={day} style={{ marginBottom:20 }}>
          <div style={{ padding:"8px 16px", background:"#01323d", borderRadius:"10px 10px 0 0", border:"1px solid #154753", borderBottom:"none" }}>
            <span style={{ color:"#ffa619", fontSize:13, fontWeight:700 }}>{fmtDate(day)}</span>
            <span style={{ color:"#64748b", fontSize:12, marginLeft:12 }}>{dayItems.length} disciplina(s)</span>
          </div>
          <div style={{ border:"1px solid #154753", borderTop:"none", borderRadius:"0 0 10px 10px", overflow:"hidden" }}>
            {dayItems.map((item, localIdx) => {
              const globalIdx = planItems.findIndex(p => p.uid === item.uid);
              const localOpts = getLocalOpts(item.mod, selTraining);
              const qualInstr = item.mod ? instructors.filter(i => (i.skills||[]).includes(item.mod.name)) : instructors;
              const isDraggingOver = dragOver === globalIdx;
              const slots = item.slots || [{ instructorId: item.instructorId||"", local: item.local||"" }];
              return (
                <div key={item.uid}
                  draggable
                  onDragStart={() => setDragIdx(globalIdx)}
                  onDragOver={e => { e.preventDefault(); setDragOver(globalIdx); }}
                  onDragLeave={() => setDragOver(null)}
                  onDrop={e => { e.preventDefault(); setDragOver(null); if (dragIdx !== null && dragIdx !== globalIdx) reorder(dragIdx, globalIdx); setDragIdx(null); }}
                  style={{ display:"flex", alignItems:"stretch",
                    background: isDraggingOver ? "#1e5a6a" : localIdx%2===0 ? "#073d4a" : "#063540",
                    borderBottom: localIdx < dayItems.length-1 ? "1px solid #154753" : "none",
                    cursor:"grab", transition:"background 0.15s", opacity: dragIdx===globalIdx ? 0.5 : 1 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px", flex:1, minWidth:0 }}>
                    <span style={{ color:"#475569", fontSize:16, flexShrink:0, cursor:"grab" }}>⠿</span>
                    <div style={{ width:80, flexShrink:0 }}>
                      <span style={{ color:"#94a3b8", fontSize:11 }}>{item.startTime}–{item.endTime}</span>
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <p style={{ color:"#e2e8f0", fontSize:13, fontWeight:600, margin:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.mod?.name}</p>
                      <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:3 }}>
                        <span style={{ padding:"1px 6px", borderRadius:4, background: item.mod?.type==="PRÁTICA" ? "#16a34a20":"#ffa61920", color: item.mod?.type==="PRÁTICA" ? "#16a34a":"#ffa619", fontSize:10, fontWeight:700 }}>{item.mod?.type||"TEORIA"}</span>
                        <span style={{ color:"#64748b", fontSize:11 }}>{item.startTime && item.endTime ? fmtMin(timeToMins(item.endTime) - timeToMins(item.startTime)) : ""}</span>
                        {slots.length > 1 && <span style={{ color:"#94a3b8", fontSize:10 }}>({slots.length} instrutores)</span>}
                      </div>
                    </div>
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", borderLeft:"1px solid #154753", flexShrink:0 }}>
                    {/* Local unico compartilhado por todos os instrutores */}
                    <div style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 10px", borderBottom:"1px solid #1e3e47" }}>
                      <div style={{ width:180 }}>
                        <select value={slots[0]?.local||""} onChange={e => { const arr=[...planItems]; const ns=slots.map(s=>({...s,local:e.target.value})); arr[globalIdx]={...arr[globalIdx],slots:ns}; setPlanItems(arr); }}
                          style={{ width:"100%", padding:"6px 8px", background:"#01323d", border:"1px solid #154753", borderRadius:7, color: slots[0]?.local ? "#e2e8f0":"#475569", fontSize:12, outline:"none" }}>
                          <option value="">📍 Local...</option>
                          {localOpts.map(l => <option key={l.id} value={l.name}>{l.name}</option>)}
                        </select>
                      </div>
                    </div>
                    {/* Um seletor de instrutor por slot */}
                    {slots.map((slot, k) => (
                      <div key={k} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 10px", borderBottom: k < slots.length-1 ? "1px solid #1e3e47" : "none" }}>
                        <div style={{ width:180 }}>
                          <select value={slot.instructorId} onChange={e => { const arr=[...planItems]; const ns=[...slots]; ns[k]={...ns[k],instructorId:e.target.value}; arr[globalIdx]={...arr[globalIdx],slots:ns}; setPlanItems(arr); }}
                            style={{ width:"100%", padding:"6px 8px", background:"#01323d", border:"1px solid #154753", borderRadius:7, color: slot.instructorId ? "#e2e8f0":"#475569", fontSize:12, outline:"none" }}>
                            <option value="">👤 Instrutor...</option>
                            {qualInstr.length < instructors.length && <option value="" disabled>— {qualInstr.length} habilitado(s) —</option>}
                            {qualInstr.map(i => <option key={i.id} value={i.id}>{i.name}</option>)}
                            {qualInstr.length < instructors.length && <>
                              <option value="" disabled>─────</option>
                              {instructors.filter(i => !qualInstr.find(q=>q.id===i.id)).map(i => <option key={i.id} value={i.id} style={{color:"#ef4444"}}>⚠ {i.name}</option>)}
                            </>}
                          </select>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}

      {planItems.some(i => !i.instructorId) && (
        <div style={{ padding:"10px 16px", background:"#d9780620", border:"1px solid #d9780640", borderRadius:10, marginBottom:16 }}>
          <span style={{ color:"#d97806", fontSize:13 }}>⚠ {planItems.filter(i=>!i.instructorId).length} disciplina(s) sem instrutor atribuído. Você pode salvar assim e atribuir depois.</span>
        </div>
      )}
      <div style={{ display:"flex", gap:8 }}>
        <Btn onClick={savePlan} label="✓ Confirmar e Salvar Planejamento" color="linear-gradient(135deg,#16a34a,#15803d)" />
        <Btn onClick={() => { setStep(0); setPlanItems([]); }} label="Cancelar" color="#154753" />
      </div>
      <DeleteGuardModal guard={delGuard} setGuard={setDelGuard} />
    </div>
  );
};

// ── TRAININGS ─────────────────────────────────────────────────────────────────
const TrainingsPage = ({ trainings, setTrainings, areas, user }) => {
  const [search,     setSearch]     = useState("");
  const [areaFilter, setAreaFilter] = useState(0);
  const [showNew,    setShowNew]    = useState(false);
  const [editing,    setEditing]    = useState(null);
  const [showMod,    setShowMod]    = useState(false);
  const [editingMod, setEditingMod] = useState(null);
  const [bulkLocal,  setBulkLocal]  = useState("");
  const [form,       setForm]       = useState({ gcc: "", name: "", totalMinutes: "", area: "", defaultSchedule: true });
  const [modForm,    setModForm]    = useState({ name: "", type: "TEORIA", locals: [], minutes: "", instructorCount: 1, sameDay: true });
  const [delGuard,   setDelGuard]   = useState({ show: false, action: null, pass: "", err: "" });
  const [dragModId,  setDragModId]  = useState(null);
  const askDelete = (fn) => setDelGuard({ show: true, action: fn, pass: "", err: "" });

  const reorderMod = (fromId, toId) => {
    if (!editing || fromId === toId) return;
    const arr = [...(editing.modules || [])];
    const fi = arr.findIndex(m => m.id === fromId);
    const ti = arr.findIndex(m => m.id === toId);
    if (fi < 0 || ti < 0) return;
    const [item] = arr.splice(fi, 1);
    arr.splice(ti, 0, item);
    const reindexed = arr.map((m, i) => ({ ...m, priority: i + 1 }));
    const upd = trainings.map(t => t.id === editing.id ? { ...t, modules: reindexed } : t);
    setTrainings(upd);
    setEditing(upd.find(t => t.id === editing.id));
  };

  const filtered = trainings.filter(t =>
    (areaFilter === 0 || t.area === areaFilter) &&
    (t.name.toLowerCase().includes(search.toLowerCase()) || t.gcc.toLowerCase().includes(search.toLowerCase()))
  );

  const saveTraining = () => {
    if (!form.gcc || !form.name) return;
    setTrainings([...trainings, { id: Date.now(), gcc: form.gcc.toUpperCase(), name: form.name.toUpperCase(), totalMinutes: +form.totalMinutes || 0, area: +form.area || null, defaultSchedule: form.defaultSchedule !== false, modules: [] }]);
    setForm({ gcc: "", name: "", totalMinutes: "", area: "", defaultSchedule: true });
    setShowNew(false);
  };

  const saveModule = () => {
    if (!modForm.name || !editing) return;
    const np = (editing.modules?.length || 0) + 1;
    const nm = { id: Date.now(), name: modForm.name.toUpperCase(), type: modForm.type, locals: modForm.locals, priority: np, minutes: +modForm.minutes || 0, instructorCount: +modForm.instructorCount || 1, sameDay: modForm.sameDay !== false };
    const upd = trainings.map(t => t.id === editing.id ? { ...t, modules: [...(t.modules || []), nm] } : t);
    setTrainings(upd); setEditing(upd.find(t => t.id === editing.id));
    setModForm({ name: "", type: "TEORIA", locals: [], minutes: "", instructorCount: 1, sameDay: true });
  };

  const saveInline = (tid, mid, ch) => {
    const upd = trainings.map(t => t.id === tid ? { ...t, modules: t.modules.map(m => m.id === mid ? { ...m, ...ch } : m) } : t);
    setTrainings(upd); setEditing(upd.find(t => t.id === tid)); setEditingMod(null);
  };

  const delModule = (tid, mid) => {
    askDelete(() => {
      const upd = trainings.map(t => t.id === tid ? { ...t, modules: t.modules.filter(m => m.id !== mid).map((m, i) => ({ ...m, priority: i + 1 })) } : t);
      setTrainings(upd); setEditing(upd.find(t => t.id === tid));
    });
  };

  const delTraining = id => askDelete(() => setTrainings(trainings.filter(t => t.id !== id)));

  const applyBulk = () => {
    if (!bulkLocal || !editing) return;
    const upd = trainings.map(t => t.id === editing.id ? { ...t, modules: t.modules.map(m => ({ ...m, locals: m.locals?.includes(bulkLocal) ? m.locals : [...(m.locals || []), bulkLocal] })) } : t);
    setTrainings(upd); setEditing(upd.find(t => t.id === editing.id)); setBulkLocal("");
  };

  const replaceBulk = () => {
    if (!bulkLocal || !editing) return;
    const upd = trainings.map(t => t.id === editing.id ? { ...t, modules: t.modules.map(m => ({ ...m, locals: [bulkLocal] })) } : t);
    setTrainings(upd); setEditing(upd.find(t => t.id === editing.id)); setBulkLocal("");
  };

  const removeBulk = ln => {
    const upd = trainings.map(t => t.id === editing.id ? { ...t, modules: t.modules.map(m => ({ ...m, locals: (m.locals || []).filter(l => l !== ln) })) } : t);
    setTrainings(upd); setEditing(upd.find(t => t.id === editing.id));
  };

  const LocalsSelector = ({ type, locals, onChange, isCbinc }) => (
    <div style={{ background: "#01323d", border: "1px solid #154753", borderRadius: 8, padding: 10, maxHeight: 180, overflowY: "auto" }}>
      {type === "TEORIA" && <>
        <div style={{ color: "#ffa619", fontSize: 11, fontWeight: 700, padding: "2px 0 6px" }}>── SALAS TEÓRICAS ──</div>
        {LOCALS.filter(l => l.type === "RelyOn Macaé" && l.env === "Teórico").map(l => (
          <label key={l.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 0", cursor: "pointer" }}>
            <input type="checkbox" checked={locals.includes(l.name)} onChange={e => onChange(e.target.checked ? [...locals, l.name] : locals.filter(x => x !== l.name))} />
            <span style={{ color: "#e2e8f0", fontSize: 12 }}>{l.name}</span>
          </label>
        ))}
      </>}
      {type === "PRÁTICA" && <>
        <div style={{ color: "#16a34a", fontSize: 11, fontWeight: 700, padding: "2px 0 6px" }}>── AMBIENTES PRÁTICOS ──</div>
        {(isCbinc
          ? [{ label: "Combate a Incêndio", color: "#ef4444", items: LOCALS.filter(l => l.subtype === "incendio") }]
          : [{ label: "Piscinas", color: "#ffa619", items: LOCALS.filter(l => l.subtype === "piscina") },
             { label: "Combate a Incêndio", color: "#ef4444", items: LOCALS.filter(l => l.subtype === "incendio") },
             { label: "Industrial / Rigger", color: "#f97316", items: LOCALS.filter(l => l.subtype === "industrial") }]
        ).map(g => (
          <React.Fragment key={g.label}>
            <div style={{ color: g.color, fontSize: 10, fontWeight: 700, padding: "6px 0 2px", borderTop: "1px solid #073d4a" }}>{g.label}</div>
            {g.items.map(l => (
              <label key={l.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 0", cursor: "pointer" }}>
                <input type="checkbox" checked={locals.includes(l.name)} onChange={e => onChange(e.target.checked ? [...locals, l.name] : locals.filter(x => x !== l.name))} />
                <span style={{ color: "#e2e8f0", fontSize: 12 }}>{l.name}</span>
              </label>
            ))}
          </React.Fragment>
        ))}
        {isCbinc && <p style={{ color: "#ef444480", fontSize: 10, margin: "6px 0 0" }}>⚠ Área CBINC — apenas locais de combate a incêndio</p>}
      </>}
    </div>
  );

  // ── EDITING VIEW ─────────────────────────────────────────────────────────
  if (editing) {
    const totalMin = editing.modules?.reduce((s, m) => s + (m.minutes || 0), 0) || 0;
    const area = areas.find(a => a.id === editing.area);
    const em = editingMod;
    const common = editing.modules?.length > 0 ? [...new Set(editing.modules.flatMap(m => m.locals || []))].filter(l => editing.modules.every(m => (m.locals || []).includes(l))) : [];
    return (
      <div>
        <button onClick={() => { setEditing(null); setEditingMod(null); }}
          style={{ display: "flex", alignItems: "center", gap: 8, background: "none", border: "none", color: "#94a3b8", cursor: "pointer", fontSize: 14, marginBottom: 20, padding: 0 }}>
          <Icon name="back" size={18} color="#94a3b8" /> Voltar para Treinamentos
        </button>
        <div style={{ background: "#073d4a", borderRadius: 16, padding: 24, border: "1px solid #154753", marginBottom: 20 }}>
          <div style={{ display: "flex", gap: 12, marginBottom: 12, flexWrap: "wrap" }}>
            <div>
              <label style={{ color: "#94a3b8", fontSize: 11, display: "block", marginBottom: 4 }}>Código GCC</label>
              <input value={editing.gcc} onChange={e => { const upd = trainings.map(t => t.id === editing.id ? { ...t, gcc: e.target.value.toUpperCase() } : t); setTrainings(upd); setEditing(upd.find(t => t.id === editing.id)); }}
                style={{ padding: "6px 12px", background: "#01323d", border: "1px solid #ffa61940", borderRadius: 8, color: "#ffa619", fontSize: 14, fontWeight: 700, outline: "none", width: 120 }} />
            </div>
            <div style={{ flex: 1, minWidth: 200 }}>
              <label style={{ color: "#94a3b8", fontSize: 11, display: "block", marginBottom: 4 }}>Nome do Treinamento</label>
              <input value={editing.name} onChange={e => { const upd = trainings.map(t => t.id === editing.id ? { ...t, name: e.target.value.toUpperCase() } : t); setTrainings(upd); setEditing(upd.find(t => t.id === editing.id)); }}
                style={{ width: "100%", padding: "6px 12px", background: "#01323d", border: "1px solid #154753", borderRadius: 8, color: "#fff", fontSize: 15, fontWeight: 700, outline: "none", boxSizing: "border-box" }} />
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
            <span style={{ color: "#64748b", fontSize: 13 }}>{fmtMin(totalMin)} · {editing.modules?.length || 0} módulo(s)</span>
            <span style={{ padding: "2px 8px", borderRadius: 6, background: editing.defaultSchedule !== false ? "#ffa61920" : "#154753", color: editing.defaultSchedule !== false ? "#ffa619" : "#94a3b8", fontSize: 11, fontWeight: 600 }}>
              {editing.defaultSchedule !== false ? "⏰ Horário padrão 08:00–17:00" : "⏰ Horário personalizado"}
            </span>
          </div>
          <div style={{ marginTop: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ color: "#64748b", fontSize: 12 }}>Horário padrão?</span>
              <div onClick={() => { const upd = trainings.map(t => t.id === editing.id ? { ...t, defaultSchedule: !editing.defaultSchedule } : t); setTrainings(upd); setEditing(upd.find(t => t.id === editing.id)); }}
                style={{ width: 36, height: 20, borderRadius: 10, background: editing.defaultSchedule !== false ? "#ffa619" : "#154753", position: "relative", transition: "background 0.2s", cursor: "pointer", flexShrink: 0 }}>
                <div style={{ width: 14, height: 14, borderRadius: "50%", background: "#fff", position: "absolute", top: 3, left: editing.defaultSchedule !== false ? 19 : 3, transition: "left 0.2s" }} />
              </div>
              <span style={{ color: editing.defaultSchedule !== false ? "#ffa619" : "#64748b", fontSize: 12 }}>{editing.defaultSchedule !== false ? "Sim" : "Não"}</span>
            </div>
          </div>
          <div style={{ marginTop: 16, display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
            <label style={{ color: "#94a3b8", fontSize: 13 }}>Área:</label>
            <select
              value={editing.area || ""}
              onChange={e => {
                const upd = trainings.map(t => t.id === editing.id ? { ...t, area: +e.target.value || null } : t);
                setTrainings(upd);
                setEditing(upd.find(t => t.id === editing.id));
              }}
              style={{ padding: "6px 12px", background: "#01323d", border: `1px solid ${area ? area.color + "80" : "#154753"}`, borderRadius: 8, color: area ? area.color : "#94a3b8", fontSize: 13, fontWeight: 600, outline: "none", cursor: "pointer" }}
            >
              <option value="">— Sem área —</option>
              {areas.map(a => <option key={a.id} value={a.id}>{a.name} — {a.leader}</option>)}
            </select>
            {area && <span style={{ padding: "2px 10px", borderRadius: 20, background: area.color + "20", color: area.color, fontSize: 12, fontWeight: 700 }}>{area.name}</span>}
          </div>
        </div>
        <div style={{ background: "#073d4a", borderRadius: 16, border: "1px solid #154753", overflow: "hidden", marginBottom: 20 }}>
          <div style={{ padding: "16px 20px", borderBottom: "1px solid #154753", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <h3 style={{ color: "#fff", margin: 0, fontWeight: 700, fontSize: 15 }}>Módulos / Disciplinas</h3>
            {canAdmin(user) && <Btn onClick={() => setShowMod(true)} label="Adicionar Módulo" icon="plus" sm />}
          </div>
          {editing.modules?.length > 0 && canAdmin(user) && (
            <div style={{ padding: "14px 20px", borderBottom: "1px solid #154753", background: "#01323d" }}>
              <p style={{ color: "#f59e0b", fontSize: 12, fontWeight: 700, margin: "0 0 10px" }}>⚡ APLICAR SALA A TODOS</p>
              <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
                <select value={bulkLocal} onChange={e => setBulkLocal(e.target.value)}
                  style={{ flex: 1, minWidth: 160, padding: "8px 12px", background: "#073d4a", border: "1px solid #154753", borderRadius: 8, color: "#e2e8f0", fontSize: 13, outline: "none" }}>
                  <option value="">Selecionar sala...</option>
                  <optgroup label="── TEÓRICO ──">{LOCALS.filter(l => l.type === "RelyOn Macaé" && l.env === "Teórico").map(l => <option key={l.id} value={l.name}>{l.name}</option>)}</optgroup>
                  <optgroup label="── PRÁTICO ──">{LOCALS.filter(l => l.type === "RelyOn Macaé" && l.env === "Prático").map(l => <option key={l.id} value={l.name}>{l.name}</option>)}</optgroup>
                </select>
                <Btn onClick={applyBulk} label="+ Adicionar a todos" disabled={!bulkLocal} sm />
                <Btn onClick={replaceBulk} label="↺ Substituir todos" color="#f59e0b" disabled={!bulkLocal} sm />
              </div>
              {common.length > 0 && (
                <div style={{ marginTop: 10 }}>
                  <p style={{ color: "#64748b", fontSize: 11, margin: "0 0 6px" }}>Salas em TODOS os módulos:</p>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {common.map(l => (
                      <span key={l} style={{ padding: "3px 10px", borderRadius: 20, background: "#16a34a20", color: "#16a34a", fontSize: 12, display: "flex", alignItems: "center", gap: 5 }}>

        {filtered.length === 0 && <p style={{ color: "#64748b", textAlign: "center", padding: 32 }}>Nenhum treinamento encontrado.</p>}
      </div>
      <DeleteGuardModal guard={delGuard} setGuard={setDelGuard} />
      {showNew && (
        <Modal title="Novo Treinamento" onClose={() => setShowNew(false)} width={480}>
          <Input label="Código GCC" value={form.gcc} onChange={e => setForm({ ...form, gcc: e.target.value })} placeholder="Ex: OBS308" />
          <Input label="Nome completo" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="Ex: CBSP - CURSO BÁSICO DE SEGURANÇA DE PLATAFORMA" />

          <Input label="Carga Horária Total (minutos)" type="number" value={form.totalMinutes} onChange={e => setForm({ ...form, totalMinutes: e.target.value })} placeholder="Ex: 2400" />
          {form.totalMinutes > 0 && <p style={{ color: "#64748b", fontSize: 12, margin: "-4px 0 12px" }}>= {fmtMin(+form.totalMinutes)}</p>}
          <div style={{ marginBottom: 14 }}>
            <label style={{ color: "#94a3b8", fontSize: 13, display: "block", marginBottom: 6 }}>Horário padrão? <span style={{ color: "#64748b", fontSize: 11 }}>(Sim = 08:00–17:00 com almoço 12:00–13:00)</span></label>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div onClick={() => setForm({ ...form, defaultSchedule: !form.defaultSchedule })}
                style={{ width: 42, height: 24, borderRadius: 12, background: form.defaultSchedule ? "#ffa619" : "#154753", position: "relative", transition: "background 0.2s", cursor: "pointer", flexShrink: 0 }}>
                <div style={{ width: 18, height: 18, borderRadius: "50%", background: "#fff", position: "absolute", top: 3, left: form.defaultSchedule ? 21 : 3, transition: "left 0.2s" }} />
              </div>
              <span style={{ color: form.defaultSchedule ? "#ffa619" : "#64748b", fontSize: 13, fontWeight: 600 }}>{form.defaultSchedule ? "Sim — Padrão 08:00–17:00" : "Não — Solicitar horário na programação"}</span>

          <Btn onClick={saveTraining} label="Salvar Treinamento" icon="check" color="#16a34a" />
        </Modal>

    </div>
  );
};
