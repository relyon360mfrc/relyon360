const Dashboard = ({ schedules, trainings }) => {
  const today = new Date().toISOString().split("T")[0];

  return (
    <div>
      <h2 style={{ color: "#fff", fontWeight: 800, marginBottom: 4, fontSize: 24 }}>Dashboard</h2>
      <p style={{ color: "#64748b", marginBottom: 24, fontSize: 14 }}>Visão geral do planejamento</p>
      <div style={{ display: "flex", gap: 16, marginBottom: 24, flexWrap: "wrap" }}>
        <StatCard label="Hoje"         value={schedules.filter(s => s.date === today).length} icon="calendar"   color="#3b82f6" sub="treinamentos" />
        <StatCard label="Próximos"     value={schedules.filter(s => s.date >= today).length}  icon="star"       color="#f59e0b" sub="agendados" />
        <StatCard label="Confirmados"  value={schedules.filter(s => s.status === "Confirmado").length} icon="check" color="#16a34a" sub="com ciência" />
        <StatCard label="Pendentes"    value={schedules.filter(s => s.status === "Pendente").length}   icon="warning" color="#ef4444" sub="aguardando" />
        <StatCard label="Treinamentos" value={trainings.length} icon="training" color="#8b5cf6" sub="cadastrados" />
      </div>
      <div style={{ background: "#1e293b", borderRadius: 16, padding: 24, border: "1px solid #334155" }}>
        <h3 style={{ color: "#fff", fontWeight: 700, margin: "0 0 16px", fontSize: 16 }}>📅 Próximas Programações</h3>
        {upcoming.length === 0 ? <p style={{ color: "#64748b" }}>Nenhuma programação.</p> : upcoming.map(s => (
          <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 16, padding: "12px 0", borderBottom: "1px solid #334155" }}>
            <div style={{ width: 48, height: 48, borderRadius: 12, background: "#0f172a", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <span style={{ color: "#f59e0b", fontSize: 16, fontWeight: 800 }}>{new Date(s.date + "T12:00:00").getDate()}</span>
              <span style={{ color: "#64748b", fontSize: 10 }}>{new Date(s.date + "T12:00:00").toLocaleDateString("pt-BR", { month: "short" }).toUpperCase()}</span>
            </div>
            <div style={{ flex: 1 }}>
              <p style={{ color: "#e2e8f0", fontWeight: 600, margin: 0, fontSize: 14 }}>{s.trainingName} — {s.className}</p>
              <p style={{ color: "#64748b", fontSize: 12, margin: "2px 0 0" }}>{s.instructorName} · {s.local} · {s.startTime}–{s.endTime}</p>
            </div>

              <span style={{ padding: "4px 10px", borderRadius: 20, background: (STATUS_COLOR[s.status] || "#64748b") + "20", color: STATUS_COLOR[s.status] || "#64748b", fontSize: 12, fontWeight: 600, flexShrink: 0 }}>{s.status}</span>
            )}
          </div>
        ))}
      </div>
    </div>
  );
};

const Schedule = ({ schedules, setSchedules, trainings, user, instructors }) => {
  const [showModal, setShowModal] = useState(false);
  const [search, setSearch] = useState("");
  const [form, setForm] = useState({ trainingId: "", className: "", date: "", startTime: "08:00", endTime: "17:00", local: "", instructorId: "", module: "", role: "Theoretical Instructor" });

    (user.role === "admin" || s.instructorId === user.id) &&
    [s.trainingName, s.instructorName, s.className].some(v => v?.toLowerCase().includes(search.toLowerCase()))
  );
  const selT = trainings.find(t => t.id === +form.trainingId);
  const save = () => {
    if (!form.trainingId || !form.className || !form.date || !form.local || !form.instructorId) return;
    const instr = instructors.find(i => i.id === +form.instructorId);
    setSchedules([...schedules, { ...form, id: Date.now(), trainingId: +form.trainingId, instructorId: +form.instructorId, trainingName: selT?.gcc || "", instructorName: instr?.name || "", status: "Pendente" }]);
    setShowModal(false);
    setForm({ trainingId: "", className: "", date: "", startTime: "08:00", endTime: "17:00", local: "", instructorId: "", module: "", role: "Theoretical Instructor" });
  };
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div><h2 style={{ color: "#fff", fontWeight: 800, margin: 0, fontSize: 24 }}>Programação</h2><p style={{ color: "#64748b", margin: "4px 0 0", fontSize: 14 }}>Escala de instrutores</p></div>
        {user.role === "admin" && <Btn onClick={() => setShowModal(true)} label="Nova Programação" icon="plus" />}
      </div>
      <div style={{ position: "relative", marginBottom: 16 }}>
        <div style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)" }}><Icon name="search" size={16} color="#64748b" /></div>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar..." style={{ width: "100%", padding: "10px 10px 10px 40px", background: "#1e293b", border: "1px solid #334155", borderRadius: 10, color: "#e2e8f0", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
      </div>
      <div style={{ background: "#1e293b", borderRadius: 16, border: "1px solid #334155", overflow: "hidden" }}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead><tr style={{ background: "#0f172a" }}>
            {["Curso / Turma","Data","Horário","Local","Instrutor","Função","Status",""].map(h => (
              <th key={h} style={{ padding: "12px 16px", color: "#64748b", fontSize: 12, fontWeight: 600, textAlign: "left", borderBottom: "1px solid #334155" }}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {filtered.map(s => (
              <tr key={s.id} style={{ borderBottom: "1px solid #1e293b" }}>
                <td style={{ padding: "14px 16px" }}><div style={{ color: "#e2e8f0", fontWeight: 600, fontSize: 14 }}>{s.trainingName}</div><div style={{ color: "#64748b", fontSize: 12 }}>{s.className}</div></td>
                <td style={{ padding: "14px 16px", color: "#94a3b8", fontSize: 13 }}>{new Date(s.date + "T12:00:00").toLocaleDateString("pt-BR")}</td>
                <td style={{ padding: "14px 16px", color: "#94a3b8", fontSize: 13 }}>{s.startTime}–{s.endTime}</td>
                <td style={{ padding: "14px 16px" }}><span style={{ padding: "3px 8px", borderRadius: 6, background: "#0f172a", color: "#94a3b8", fontSize: 12 }}>{s.local}</span></td>
                <td style={{ padding: "14px 16px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <div style={{ width: 28, height: 28, borderRadius: "50%", background: "linear-gradient(135deg,#3b82f6,#8b5cf6)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 10, fontWeight: 700 }}>
                      {s.instructorName?.split(" ").map(n => n[0]).join("").slice(0, 2)}
                    </div>
                    <span style={{ color: "#e2e8f0", fontSize: 13 }}>{s.instructorName}</span>
                  </div>
                </td>
                <td style={{ padding: "14px 16px" }}><span style={{ padding: "3px 8px", borderRadius: 6, background: (ROLE_BADGE[s.role] || "#64748b") + "20", color: ROLE_BADGE[s.role] || "#64748b", fontSize: 11, fontWeight: 600 }}>{s.role}</span></td>
                <td style={{ padding: "14px 16px" }}><span style={{ padding: "4px 10px", borderRadius: 20, background: (STATUS_COLOR[s.status] || "#64748b") + "20", color: STATUS_COLOR[s.status] || "#64748b", fontSize: 12, fontWeight: 600 }}>{s.status}</span></td>
                <td style={{ padding: "14px 16px" }}>{user.role === "admin" && <button onClick={() => setSchedules(schedules.filter(x => x.id !== s.id))} style={{ background: "none", border: "none", cursor: "pointer", padding: 4 }}><Icon name="delete" size={16} color="#ef4444" /></button>}</td>
              </tr>
            ))}
          </tbody>
        </table>
        {filtered.length === 0 && <p style={{ color: "#64748b", textAlign: "center", padding: 32 }}>Nenhuma programação encontrada.</p>}
      </div>
      {showModal && (
        <Modal title="Nova Programação" onClose={() => setShowModal(false)}>
          <Sel label="Treinamento" value={form.trainingId} onChange={e => setForm({ ...form, trainingId: e.target.value, module: "" })} opts={trainings.map(t => ({ v: t.id, l: `${t.gcc} — ${t.name.slice(0, 45)}` }))} />
          <Input label="Nome da Turma" value={form.className} onChange={e => setForm({ ...form, className: e.target.value })} placeholder="Ex: CBSP - 01" />
          <Input label="Data" type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Input label="Início" type="time" value={form.startTime} onChange={e => setForm({ ...form, startTime: e.target.value })} />
            <Input label="Fim"    type="time" value={form.endTime}   onChange={e => setForm({ ...form, endTime: e.target.value })} />
          </div>
          <Sel label="Local" value={form.local} onChange={e => setForm({ ...form, local: e.target.value })} opts={LOCALS.map(l => ({ v: l.name, l: `${l.name} (${l.type})` }))} />
          <Sel label="Instrutor" value={form.instructorId} onChange={e => setForm({ ...form, instructorId: e.target.value })} opts={instructors.map(i => ({ v: i.id, l: i.name }))} />
          <Sel label="Módulo" value={form.module} onChange={e => setForm({ ...form, module: e.target.value })}
            opts={selT?.modules?.length ? selT.modules.map(m => ({ v: m.name, l: m.name })) : [{ v: "—", l: "— Sem módulos cadastrados —" }]} />
          <Sel label="Função" value={form.role} onChange={e => setForm({ ...form, role: e.target.value })}
            opts={["Lead Instructor","Theoretical Instructor","Practical Instructor","Support Instructor"].map(r => ({ v: r, l: r }))} />
          <Btn onClick={save} label="Salvar Programação" color="linear-gradient(135deg,#3b82f6,#8b5cf6)" />
        </Modal>
      )}
    </div>
  );
};

// ── TRAININGS ─────────────────────────────────────────────────────────────────
const TrainingsPage = ({ trainings, setTrainings, areas }) => {
  const [search,     setSearch]     = useState("");
  const [areaFilter, setAreaFilter] = useState(0);
  const [showNew,    setShowNew]    = useState(false);
  const [editing,    setEditing]    = useState(null);
  const [showMod,    setShowMod]    = useState(false);
  const [editingMod, setEditingMod] = useState(null);
  const [bulkLocal,  setBulkLocal]  = useState("");
  const [form,       setForm]       = useState({ gcc: "", name: "", totalMinutes: "", area: "" });
  const [modForm,    setModForm]    = useState({ name: "", type: "TEORIA", locals: [], minutes: "", instructorCount: 1 });

  const filtered = trainings.filter(t =>
    (areaFilter === 0 || t.area === areaFilter) &&
    (t.name.toLowerCase().includes(search.toLowerCase()) || t.gcc.toLowerCase().includes(search.toLowerCase()))
  );

  const saveTraining = () => {
    if (!form.gcc || !form.name) return;
    setTrainings([...trainings, { id: Date.now(), gcc: form.gcc.toUpperCase(), name: form.name.toUpperCase(), totalMinutes: +form.totalMinutes || 0, area: +form.area || null, modules: [] }]);
    setForm({ gcc: "", name: "", totalMinutes: "", area: "" });
    setShowNew(false);
  };

  const saveModule = () => {
    if (!modForm.name || !editing) return;
    const np = (editing.modules?.length || 0) + 1;
    const nm = { id: Date.now(), name: modForm.name.toUpperCase(), type: modForm.type, locals: modForm.locals, priority: np, minutes: +modForm.minutes || 0, instructorCount: +modForm.instructorCount || 1 };
    const upd = trainings.map(t => t.id === editing.id ? { ...t, modules: [...(t.modules || []), nm] } : t);
    setTrainings(upd); setEditing(upd.find(t => t.id === editing.id));
    setModForm({ name: "", type: "TEORIA", locals: [], minutes: "", instructorCount: 1 });
  };

  const saveInline = (tid, mid, ch) => {
    const upd = trainings.map(t => t.id === tid ? { ...t, modules: t.modules.map(m => m.id === mid ? { ...m, ...ch } : m) } : t);
    setTrainings(upd); setEditing(upd.find(t => t.id === tid)); setEditingMod(null);
  };

  const delModule = (tid, mid) => {
    const upd = trainings.map(t => t.id === tid ? { ...t, modules: t.modules.filter(m => m.id !== mid).map((m, i) => ({ ...m, priority: i + 1 })) } : t);
    setTrainings(upd); setEditing(upd.find(t => t.id === tid));
  };

  const delTraining = id => setTrainings(trainings.filter(t => t.id !== id));

  const applyBulk = () => {
    if (!bulkLocal || !editing) return;
    const upd = trainings.map(t => t.id === editing.id ? { ...t, modules: t.modules.map(m => ({ ...m, locals: m.locals?.includes(bulkLocal) ? m.locals : [...(m.locals || []), bulkLocal] })) } : t);
    setTrainings(upd); setEditing(upd.find(t => t.id === editing.id)); setBulkLocal("");
  };

  const replaceBulk = () => {
    if (!bulkLocal || !editing) return;
    const upd = trainings.map(t => t.id === editing.id ? { ...t, modules: t.modules.map(m => ({ ...m, locals: [bulkLocal] })) } : t);
    setTrainings(upd); setEditing(upd.find(t => t.id === editing.id)); setBulkLocal("");
  };

  const removeBulk = ln => {
    const upd = trainings.map(t => t.id === editing.id ? { ...t, modules: t.modules.map(m => ({ ...m, locals: (m.locals || []).filter(l => l !== ln) })) } : t);
    setTrainings(upd); setEditing(upd.find(t => t.id === editing.id));
  };

  const LocalsSelector = ({ type, locals, onChange }) => (
    <div style={{ background: "#0f172a", border: "1px solid #334155", borderRadius: 8, padding: 10, maxHeight: 180, overflowY: "auto" }}>
      {type === "TEORIA" && <>
        <div style={{ color: "#3b82f6", fontSize: 11, fontWeight: 700, padding: "2px 0 6px" }}>── SALAS TEÓRICAS ──</div>
        {LOCALS.filter(l => l.type === "RelyOn Macaé" && l.env === "Teórico").map(l => (
          <label key={l.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 0", cursor: "pointer" }}>
            <input type="checkbox" checked={locals.includes(l.name)} onChange={e => onChange(e.target.checked ? [...locals, l.name] : locals.filter(x => x !== l.name))} />
            <span style={{ color: "#e2e8f0", fontSize: 12 }}>{l.name}</span>
          </label>
        ))}
      </>}
      {type === "PRÁTICA" && <>
        <div style={{ color: "#16a34a", fontSize: 11, fontWeight: 700, padding: "2px 0 6px" }}>── AMBIENTES PRÁTICOS ──</div>
        {[{ label: "Piscinas", color: "#0ea5e9", items: LOCALS.filter(l => l.subtype === "piscina") },
          { label: "Combate a Incêndio", color: "#ef4444", items: LOCALS.filter(l => l.subtype === "incendio") },
          { label: "Industrial / Rigger", color: "#f97316", items: LOCALS.filter(l => l.subtype === "industrial") }
        ].map(g => (
          <React.Fragment key={g.label}>
            <div style={{ color: g.color, fontSize: 10, fontWeight: 700, padding: "6px 0 2px", borderTop: "1px solid #1e293b" }}>{g.label}</div>
            {g.items.map(l => (
              <label key={l.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 0", cursor: "pointer" }}>
                <input type="checkbox" checked={locals.includes(l.name)} onChange={e => onChange(e.target.checked ? [...locals, l.name] : locals.filter(x => x !== l.name))} />
                <span style={{ color: "#e2e8f0", fontSize: 12 }}>{l.name}</span>
              </label>
            ))}
          </React.Fragment>
        ))}
      </>}
    </div>
  );

  // ── EDITING VIEW ─────────────────────────────────────────────────────────
  if (editing) {
    const totalMin = editing.modules?.reduce((s, m) => s + (m.minutes || 0), 0) || 0;
    const area = areas.find(a => a.id === editing.area);
    const em = editingMod;
    const common = editing.modules?.length > 0 ? [...new Set(editing.modules.flatMap(m => m.locals || []))].filter(l => editing.modules.every(m => (m.locals || []).includes(l))) : [];
    return (
      <div>
        <button onClick={() => { setEditing(null); setEditingMod(null); }}
          style={{ display: "flex", alignItems: "center", gap: 8, background: "none", border: "none", color: "#94a3b8", cursor: "pointer", fontSize: 14, marginBottom: 20, padding: 0 }}>
          <Icon name="back" size={18} color="#94a3b8" /> Voltar para Treinamentos
        </button>
        <div style={{ background: "#1e293b", borderRadius: 16, padding: 24, border: "1px solid #334155", marginBottom: 20 }}>
          <span style={{ padding: "3px 10px", borderRadius: 6, background: "#3b82f620", color: "#3b82f6", fontSize: 13, fontWeight: 700 }}>{editing.gcc}</span>
          <h2 style={{ color: "#fff", fontWeight: 800, margin: "8px 0 4px", fontSize: 20 }}>{editing.name}</h2>
          <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
            {area && <span style={{ padding: "2px 10px", borderRadius: 20, background: area.color + "20", color: area.color, fontSize: 12, fontWeight: 700 }}>{area.name} — {area.leader}</span>}
            <span style={{ color: "#64748b", fontSize: 13 }}>{fmtMin(totalMin)}{editing.totalMinutes > 0 ? ` / ${fmtMin(editing.totalMinutes)} previstos` : ""} · {editing.modules?.length || 0} módulo(s)</span>
          </div>
        </div>
        <div style={{ background: "#1e293b", borderRadius: 16, border: "1px solid #334155", overflow: "hidden", marginBottom: 20 }}>
          <div style={{ padding: "16px 20px", borderBottom: "1px solid #334155", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <h3 style={{ color: "#fff", margin: 0, fontWeight: 700, fontSize: 15 }}>Módulos / Disciplinas</h3>
            <Btn onClick={() => setShowMod(true)} label="Adicionar Módulo" icon="plus" sm />
          </div>
          {editing.modules?.length > 0 && (
            <div style={{ padding: "14px 20px", borderBottom: "1px solid #334155", background: "#0f172a" }}>
              <p style={{ color: "#f59e0b", fontSize: 12, fontWeight: 700, margin: "0 0 10px" }}>⚡ APLICAR SALA A TODOS</p>
              <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
                <select value={bulkLocal} onChange={e => setBulkLocal(e.target.value)}
                  style={{ flex: 1, minWidth: 160, padding: "8px 12px", background: "#1e293b", border: "1px solid #334155", borderRadius: 8, color: "#e2e8f0", fontSize: 13, outline: "none" }}>
                  <option value="">Selecionar sala...</option>
                  <optgroup label="── TEÓRICO ──">{LOCALS.filter(l => l.type === "RelyOn Macaé" && l.env === "Teórico").map(l => <option key={l.id} value={l.name}>{l.name}</option>)}</optgroup>
                  <optgroup label="── PRÁTICO ──">{LOCALS.filter(l => l.type === "RelyOn Macaé" && l.env === "Prático").map(l => <option key={l.id} value={l.name}>{l.name}</option>)}</optgroup>
                </select>
                <Btn onClick={applyBulk} label="+ Adicionar a todos" disabled={!bulkLocal} sm />
                <Btn onClick={replaceBulk} label="↺ Substituir todos" color="#f59e0b" disabled={!bulkLocal} sm />
              </div>
              {common.length > 0 && (
                <div style={{ marginTop: 10 }}>
                  <p style={{ color: "#64748b", fontSize: 11, margin: "0 0 6px" }}>Salas em TODOS os módulos:</p>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {common.map(l => (
                      <span key={l} style={{ padding: "3px 10px", borderRadius: 20, background: "#16a34a20", color: "#16a34a", fontSize: 12, display: "flex", alignItems: "center", gap: 5 }}>
                        {l} <button onClick={() => removeBulk(l)} style={{ background: "none", border: "none", cursor: "pointer", color: "#16a34a", padding: 0, fontSize: 13 }}>×</button>
                      </span>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
          {(!editing.modules || editing.modules.length === 0) && <p style={{ color: "#64748b", padding: 24, textAlign: "center" }}>Nenhum módulo. Clique em "Adicionar Módulo".</p>}
          {editing.modules?.map(m => {
            const isE = em?.id === m.id;
            return (
              <div key={m.id} style={{ borderBottom: "1px solid #334155", background: isE ? "#0f172a" : "transparent" }}>
                {!isE && (
                  <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px" }}>
                    <span style={{ color: "#64748b", fontSize: 12, width: 24, textAlign: "center", flexShrink: 0 }}>{m.priority}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <p style={{ color: "#e2e8f0", fontSize: 13, fontWeight: 600, margin: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.name}</p>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4, flexWrap: "wrap" }}>
                        <span style={{ padding: "2px 7px", borderRadius: 5, background: m.type === "PRÁTICA" ? "#16a34a20" : "#3b82f620", color: m.type === "PRÁTICA" ? "#16a34a" : "#3b82f6", fontSize: 11, fontWeight: 700 }}>{m.type || "TEORIA"}</span>
                        <span style={{ color: "#3b82f6", fontSize: 11, fontWeight: 600 }}>{fmtMin(m.minutes)}</span>
                        <span style={{ color: "#64748b", fontSize: 11 }}>{m.instructorCount || 1} instrutor(es)</span>
                        {m.locals?.slice(0, 3).map(l => <span key={l} style={{ padding: "1px 5px", borderRadius: 4, background: localColor(l) + "20", color: localColor(l), fontSize: 10, fontWeight: 600 }}>{l}</span>)}
                        {m.locals?.length > 3 && <span style={{ color: "#64748b", fontSize: 10 }}>+{m.locals.length - 3}</span>}
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                      <button onClick={() => setEditingMod({ ...m })} style={{ padding: "5px 10px", background: "#334155", border: "none", borderRadius: 6, color: "#94a3b8", cursor: "pointer", display: "flex", alignItems: "center", gap: 4, fontSize: 12 }}>
                        <Icon name="edit" size={12} color="#94a3b8" /> Editar
                      </button>
                      <button onClick={() => delModule(editing.id, m.id)} style={{ padding: "5px 8px", background: "none", border: "1px solid #ef444440", borderRadius: 6, cursor: "pointer" }}>
                        <Icon name="delete" size={13} color="#ef4444" />
                      </button>
                    </div>
                  </div>
                )}
                {isE && (
                  <div style={{ padding: 16 }}>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
                      <div><label style={{ color: "#94a3b8", fontSize: 12, display: "block", marginBottom: 4 }}>Nome</label>
                        <input value={em.name} onChange={e => setEditingMod({ ...em, name: e.target.value })}
                          style={{ width: "100%", padding: "8px 10px", background: "#1e293b", border: "1px solid #334155", borderRadius: 7, color: "#e2e8f0", fontSize: 13, outline: "none", boxSizing: "border-box" }} /></div>
                      <div><label style={{ color: "#94a3b8", fontSize: 12, display: "block", marginBottom: 4 }}>Tipo</label>
                        <select value={em.type} onChange={e => setEditingMod({ ...em, type: e.target.value, locals: [] })}
                          style={{ width: "100%", padding: "8px 10px", background: "#1e293b", border: "1px solid #334155", borderRadius: 7, color: "#e2e8f0", fontSize: 13, outline: "none" }}>
                          <option value="TEORIA">TEORIA</option><option value="PRÁTICA">PRÁTICA</option>
                        </select></div>
                      <div><label style={{ color: "#94a3b8", fontSize: 12, display: "block", marginBottom: 4 }}>Carga (min)</label>
                        <input type="number" value={em.minutes} onChange={e => setEditingMod({ ...em, minutes: e.target.value })}
                          style={{ width: "100%", padding: "8px 10px", background: "#1e293b", border: "1px solid #334155", borderRadius: 7, color: "#e2e8f0", fontSize: 13, outline: "none", boxSizing: "border-box" }} /></div>
                      <div><label style={{ color: "#94a3b8", fontSize: 12, display: "block", marginBottom: 4 }}>Nº Instrutores</label>
                        <input type="number" value={em.instructorCount} onChange={e => setEditingMod({ ...em, instructorCount: +e.target.value })}
                          style={{ width: "100%", padding: "8px 10px", background: "#1e293b", border: "1px solid #334155", borderRadius: 7, color: "#e2e8f0", fontSize: 13, outline: "none", boxSizing: "border-box" }} /></div>
                    </div>
                    <label style={{ color: "#94a3b8", fontSize: 12, display: "block", marginBottom: 6 }}>Locais Compatíveis</label>
                    <LocalsSelector type={em.type} locals={em.locals || []} onChange={ls => setEditingMod({ ...em, locals: ls })} />
                    {em.locals?.length > 0 && (
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 6, marginBottom: 12 }}>
                        {em.locals.map(l => (
                          <span key={l} style={{ padding: "2px 8px", borderRadius: 20, background: localColor(l) + "20", color: localColor(l), fontSize: 11, display: "flex", alignItems: "center", gap: 4, fontWeight: 600 }}>
                            {l} <button onClick={() => setEditingMod({ ...em, locals: em.locals.filter(x => x !== l) })} style={{ background: "none", border: "none", cursor: "pointer", color: localColor(l), padding: 0, fontSize: 12 }}>×</button>
                          </span>
                        ))}
                      </div>
                    )}
                    <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                      <Btn onClick={() => saveInline(editing.id, m.id, { name: em.name, type: em.type, locals: em.locals, minutes: +em.minutes, instructorCount: +em.instructorCount })} label="Salvar" icon="check" color="#16a34a" sm />
                      <Btn onClick={() => setEditingMod(null)} label="Cancelar" color="#334155" sm />
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
        {showMod && (
          <Modal title="Adicionar Módulo" onClose={() => setShowMod(false)} width={500}>
            <Input label="Nome do Módulo / Disciplina" value={modForm.name} onChange={e => setModForm({ ...modForm, name: e.target.value })} placeholder="Ex: CBSP - TSP/P - TEORIA" />
            <Sel label="Tipo" value={modForm.type} onChange={e => setModForm({ ...modForm, type: e.target.value, locals: [] })} opts={[{ v: "TEORIA", l: "TEORIA" }, { v: "PRÁTICA", l: "PRÁTICA" }]} placeholder="Selecionar..." />
            <label style={{ color: "#94a3b8", fontSize: 13, display: "block", marginBottom: 6 }}>Locais Compatíveis</label>
            <LocalsSelector type={modForm.type} locals={modForm.locals} onChange={ls => setModForm({ ...modForm, locals: ls })} />
            {modForm.locals.length > 0 && <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 6, marginBottom: 8 }}>{modForm.locals.map(l => <span key={l} style={{ padding: "2px 8px", borderRadius: 6, background: localColor(l) + "20", color: localColor(l), fontSize: 11 }}>{l}</span>)}</div>}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 12 }}>
              <Input label="Carga Horária (min)" type="number" value={modForm.minutes} onChange={e => setModForm({ ...modForm, minutes: e.target.value })} placeholder="Ex: 300" />
              <Input label="Nº de Instrutores" type="number" value={modForm.instructorCount} onChange={e => setModForm({ ...modForm, instructorCount: e.target.value })} placeholder="Ex: 1" />
            </div>
            {modForm.minutes > 0 && <p style={{ color: "#64748b", fontSize: 12, margin: "-4px 0 12px" }}>= {fmtMin(+modForm.minutes)}</p>}
            <Btn onClick={saveModule} label="Salvar Módulo" icon="check" color="#16a34a" />
          </Modal>
        )}
      </div>
    );
  }

  // ── LIST VIEW ─────────────────────────────────────────────────────────────
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div><h2 style={{ color: "#fff", fontWeight: 800, margin: 0, fontSize: 24 }}>Treinamentos</h2><p style={{ color: "#64748b", margin: "4px 0 0", fontSize: 14 }}>{trainings.length} cursos cadastrados</p></div>
        <Btn onClick={() => setShowNew(true)} label="Novo Treinamento" icon="plus" />
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
        <button onClick={() => setAreaFilter(0)} style={{ padding: "6px 14px", borderRadius: 20, border: `1px solid ${areaFilter === 0 ? "#fff" : "#334155"}`, background: areaFilter === 0 ? "#fff" : "transparent", color: areaFilter === 0 ? "#0f172a" : "#94a3b8", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
          TODAS ({trainings.length})
        </button>
        {areas.map(a => (
          <button key={a.id} onClick={() => setAreaFilter(areaFilter === a.id ? 0 : a.id)}
            style={{ padding: "6px 14px", borderRadius: 20, border: `1px solid ${areaFilter === a.id ? a.color : "#334155"}`, background: areaFilter === a.id ? a.color + "20" : "transparent", color: areaFilter === a.id ? a.color : "#94a3b8", fontSize: 12, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: a.color }} />
            {a.name} ({trainings.filter(t => t.area === a.id).length})
          </button>
        ))}
      </div>
      <div style={{ position: "relative", marginBottom: 16 }}>
        <div style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)" }}><Icon name="search" size={16} color="#64748b" /></div>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar por nome ou código GCC..."
          style={{ width: "100%", padding: "10px 10px 10px 40px", background: "#1e293b", border: "1px solid #334155", borderRadius: 10, color: "#e2e8f0", fontSize: 14, outline: "none", boxSizing: "border-box" }} />

      <div style={{ display: "grid", gap: 10 }}>

              <span style={{ padding: "4px 12px", borderRadius: 8, background: "#3b82f620", color: "#3b82f6", fontSize: 13, fontWeight: 700, flexShrink: 0 }}>{t.gcc}</span>

                <p style={{ color: "#e2e8f0", fontWeight: 600, margin: 0, fontSize: 14, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.name}</p>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 3, flexWrap: "wrap" }}>
                  {area && <span style={{ padding: "1px 8px", borderRadius: 20, background: area.color + "20", color: area.color, fontSize: 11, fontWeight: 700 }}>{area.name}</span>}
                  <span style={{ color: "#64748b", fontSize: 12 }}>{t.modules?.length || 0} módulo(s){t.totalMinutes > 0 ? ` · ${fmtMin(t.totalMinutes)}` : ""}</span>

                  {area && <span style={{ color: "#64748b", fontSize: 11 }}>· {area.leader}</span>}
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>

                  <Icon name="delete" size={14} color="#ef4444" />
                </button>
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && <p style={{ color: "#64748b", textAlign: "center", padding: 32 }}>Nenhum treinamento encontrado.</p>}
      </div>
      {showNew && (
        <Modal title="Novo Treinamento" onClose={() => setShowNew(false)} width={480}>

          <Input label="Nome completo" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="Ex: CBSP - CURSO BÁSICO DE SEGURANÇA DE PLATAFORMA" />
          <Sel label="Área" value={form.area} onChange={e => setForm({ ...form, area: e.target.value })} opts={areas.map(a => ({ v: a.id, l: `${a.name} — ${a.leader}` }))} />
          <Input label="Carga Horária Total (minutos)" type="number" value={form.totalMinutes} onChange={e => setForm({ ...form, totalMinutes: e.target.value })} placeholder="Ex: 2400" />
          {form.totalMinutes > 0 && <p style={{ color: "#64748b", fontSize: 12, margin: "-4px 0 12px" }}>= {fmtMin(+form.totalMinutes)}</p>}

        </Modal>
      )}

  );
};

// ── INSTRUCTORS ───────────────────────────────────────────────────────────────
const InstructorsPage = ({ instructors, setInstructors }) => {
  const [search, setSearch]   = useState("");
  const [sel, setSel]         = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const BLANK = { name: "", contract: "CLT", status: "Ativo", base: "Macaé", phone: "", email: "", skillsText: "" };
  const [form, setForm]       = useState(BLANK);

  const filtered = instructors.filter(i => i.name.toLowerCase().includes(search.toLowerCase()));

  const openNew  = () => { setEditing(null); setForm(BLANK); setShowForm(true); };
  const openEdit = (i) => {
    setEditing(i);
    setForm({ name: i.name, contract: i.contract, status: i.status, base: i.base, phone: i.phone || "", email: i.email || "", skillsText: (i.skills || []).join(", ") });
    setSel(null);
    setShowForm(true);
  };
  const remove = (id) => { if (window.confirm("Remover este instrutor?")) setInstructors(instructors.filter(i => i.id !== id)); };
  const save = () => {
    if (!form.name.trim()) return;
    const skills = form.skillsText.split(",").map(s => s.trim()).filter(Boolean);
    if (editing) {
      setInstructors(instructors.map(i => i.id === editing.id ? { ...i, ...form, skills } : i));
    } else {
      const newId = Math.max(0, ...instructors.map(i => i.id)) + 1;
      setInstructors([...instructors, { id: newId, name: form.name, contract: form.contract, status: form.status, base: form.base, phone: form.phone, email: form.email, skills }]);
    }
    setShowForm(false); setEditing(null); setForm(BLANK);
  };

  const statusColor = s => s === "Ativo" ? "#16a34a" : s === "Inativo" ? "#ef4444" : "#f59e0b";

  return (
    <div>
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
        <div>
          <h2 style={{ color: "#fff", fontWeight: 800, margin: 0, fontSize: 24 }}>Instrutores</h2>
          <p style={{ color: "#64748b", margin: "4px 0 0", fontSize: 14 }}>{instructors.length} instrutores cadastrados</p>
        </div>
        <button onClick={openNew} style={{ display: "flex", alignItems: "center", gap: 8, background: "#3b82f6", border: "none", borderRadius: 10, padding: "10px 18px", color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
          <Icon name="check" size={16} color="#fff" /> Novo Instrutor
        </button>
      </div>
      <div style={{ position: "relative", marginBottom: 16 }}>
        <div style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)" }}><Icon name="search" size={16} color="#64748b" /></div>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar instrutor..."
          style={{ width: "100%", padding: "10px 10px 10px 40px", background: "#1e293b", border: "1px solid #334155", borderRadius: 10, color: "#e2e8f0", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(280px,1fr))", gap: 16 }}>
        {filtered.map(i => (
          <div key={i.id} style={{ background: "#1e293b", borderRadius: 16, padding: 20, border: "1px solid #334155", display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, cursor: "pointer" }} onClick={() => setSel(i)}>
              <div style={{ width: 48, height: 48, borderRadius: "50%", background: "linear-gradient(135deg,#3b82f6,#8b5cf6)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 700, fontSize: 16, flexShrink: 0 }}>
                {i.name.split(" ").map(n => n[0]).join("").slice(0, 2)}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <p style={{ color: "#e2e8f0", fontWeight: 700, margin: 0, fontSize: 15, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{i.name}</p>
                <p style={{ color: "#64748b", fontSize: 12, margin: "2px 0 0" }}>{i.contract} · {i.base}</p>
              </div>
              <span style={{ padding: "3px 10px", borderRadius: 20, background: statusColor(i.status) + "20", color: statusColor(i.status), fontSize: 11, fontWeight: 600, flexShrink: 0 }}>{i.status}</span>
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {(i.skills || []).slice(0, 3).map(s => <span key={s} style={{ padding: "2px 8px", borderRadius: 6, background: "#3b82f620", color: "#3b82f6", fontSize: 11 }}>{s}</span>)}
              {(i.skills || []).length > 3 && <span style={{ color: "#64748b", fontSize: 11 }}>+{i.skills.length - 3}</span>}
            </div>
            <div style={{ display: "flex", gap: 8, borderTop: "1px solid #334155", paddingTop: 12 }}>
              <button onClick={() => openEdit(i)} style={{ flex: 1, background: "#334155", border: "none", borderRadius: 8, padding: "8px 0", color: "#e2e8f0", fontSize: 13, cursor: "pointer", fontWeight: 600 }}>Editar</button>
              <button onClick={() => remove(i.id)} style={{ background: "none", border: "1px solid #ef444440", borderRadius: 8, padding: "8px 12px", cursor: "pointer", color: "#ef4444", fontSize: 13 }}>✕</button>
            </div>
          </div>
        ))}
      </div>

      {sel && (
        <Modal title={sel.name} onClose={() => setSel(null)} width={440}>
          {[["Contrato", sel.contract], ["Base", sel.base], ["Telefone", sel.phone || "—"], ["E-mail", sel.email || "—"], ["Status", sel.status]].map(([k, v]) => (
            <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: "1px solid #334155" }}>
              <span style={{ color: "#64748b", fontSize: 14 }}>{k}</span>
              <span style={{ color: "#e2e8f0", fontSize: 14, fontWeight: 500 }}>{v}</span>

          ))}
          <div style={{ marginTop: 16, marginBottom: 20 }}>
            <p style={{ color: "#64748b", fontSize: 13, marginBottom: 8 }}>COMPETÊNCIAS</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {(sel.skills || []).map(s => <span key={s} style={{ padding: "4px 10px", borderRadius: 8, background: "#3b82f620", color: "#3b82f6", fontSize: 12 }}>{s}</span>)}
            </div>
          </div>
          <Btn onClick={() => openEdit(sel)} label="Editar Instrutor" icon="edit" color="#3b82f6" />
        </Modal>

      {showForm && (
        <Modal title={editing ? "Editar Instrutor" : "Novo Instrutor"} onClose={() => { setShowForm(false); setEditing(null); }} width={500}>
          <Input label="Nome completo" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="Ex: João da Silva" />
          <Sel label="Tipo de contrato" value={form.contract} onChange={e => setForm({ ...form, contract: e.target.value })}
            opts={["CLT","CLT Offshore","Freelancer","PJ","Prestador"].map(v => ({ v, l: v }))} />
          <Sel label="Status" value={form.status} onChange={e => setForm({ ...form, status: e.target.value })}
            opts={["Ativo","Inativo","Afastado"].map(v => ({ v, l: v }))} />
          <Input label="Base" value={form.base} onChange={e => setForm({ ...form, base: e.target.value })} placeholder="Ex: Macaé" />
          <Input label="Telefone" value={form.phone} onChange={e => setForm({ ...form, phone: e.target.value })} placeholder="Ex: (22) 99999-0000" />
          <Input label="E-mail" value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} placeholder="Ex: nome@relyonnutec.com" />
          <div style={{ marginBottom: 20 }}>
            <label style={{ color: "#94a3b8", fontSize: 13, display: "block", marginBottom: 8 }}>Competências <span style={{ color: "#64748b" }}>(separe por vírgula)</span></label>
            <textarea value={form.skillsText} onChange={e => setForm({ ...form, skillsText: e.target.value })}
              placeholder="Ex: HUET - TEORIA, HUET - PRÁTICA, CAEBS - TEORIA" rows={3}
              style={{ width: "100%", padding: "10px 14px", background: "#0f172a", border: "1px solid #334155", borderRadius: 10, color: "#e2e8f0", fontSize: 13, outline: "none", boxSizing: "border-box", resize: "vertical", fontFamily: "inherit", lineHeight: 1.5 }} />
          </div>
          <Btn onClick={save} label={editing ? "Salvar Alterações" : "Criar Instrutor"} icon="check" color="#16a34a" />
        </Modal>
      )}
    </div>
  );
};

  const grouped = [
    { name: "RelyOn Macaé — Teórico",  color: "#3b82f6", items: LOCALS.filter(l => l.type === "RelyOn Macaé" && l.env === "Teórico") },

    { name: "Combate a Incêndio",      color: "#ef4444", items: LOCALS.filter(l => l.subtype === "incendio") },
    { name: "Industrial / Rigger",     color: "#f97316", items: LOCALS.filter(l => l.subtype === "industrial") },
    { name: "Offshore",                color: "#8b5cf6", items: LOCALS.filter(l => l.type === "Offshore") },
    { name: "In Company",              color: "#f59e0b", items: LOCALS.filter(l => l.type === "In Company") },

      <div style={{ position: "relative", marginBottom: 20 }}>

// ── AI ────────────────────────────────────────────────────────────────────────
const AiPage = ({ schedules, setSchedules, trainings, instructors }) => {
  const [tid, setTid] = useState("");
  const [date, setDate] = useState("");
  const [local, setLocal] = useState("");
  const [sugs, setSugs] = useState([]);
  const [loading, setLoading] = useState(false);
  const [applied, setApplied] = useState(false);
  const t = trainings.find(x => x.id === +tid);
  const suggest = () => {
    if (!tid || !date) return;
    setLoading(true); setApplied(false);
    setTimeout(() => {
      const busy = schedules.filter(s => s.date === date).map(s => s.instructorId);
      setSugs((t?.modules || []).map((mod, idx) => {
        const qual = instructors.filter(i => (i.skills || []).includes(mod.name));
        const avail = qual.filter(i => !busy.includes(i.id));
        const chosen = avail[0] || qual[0];
        return { module: mod.name, instructor: chosen, available: avail.length, conflict: avail.length === 0, role: idx === 0 ? "Lead Instructor" : mod.name.includes("PRÁTICA") ? "Practical Instructor" : "Theoretical Instructor" };
      }));
      setLoading(false);
    }, 1600);
  };
  const apply = () => {
    const news = sugs.filter(s => s.instructor).map(s => ({
      id: Date.now() + Math.random(), trainingId: +tid, trainingName: t?.gcc || "", className: `${t?.gcc}-AI`,
      date, startTime: "08:00", endTime: "17:00", local: local || "A definir",
      instructorId: s.instructor.id, instructorName: s.instructor.name, module: s.module, role: s.role, status: "Pendente",
    }));
    setSchedules([...schedules, ...news]); setApplied(true);
  };
  return (
    <div>
      <h2 style={{ color: "#fff", fontWeight: 800, margin: "0 0 4px", fontSize: 24 }}>IA — Sugestão de Escala</h2>
      <p style={{ color: "#64748b", margin: "0 0 24px", fontSize: 14 }}>Analisa competências, disponibilidade e conflitos</p>
      <div style={{ background: "#1e293b", borderRadius: 16, padding: 24, border: "1px solid #334155", marginBottom: 20 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16, marginBottom: 16 }}>
          <Sel label="Treinamento" value={tid} onChange={e => setTid(e.target.value)} opts={trainings.map(t => ({ v: t.id, l: `${t.gcc} — ${t.name.slice(0, 30)}` }))} />
          <div><label style={{ color: "#94a3b8", fontSize: 13, display: "block", marginBottom: 6 }}>Data</label>
            <input type="date" value={date} onChange={e => setDate(e.target.value)} style={{ width: "100%", padding: "10px 12px", background: "#0f172a", border: "1px solid #334155", borderRadius: 8, color: "#e2e8f0", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
          </div>
          <Sel label="Local" value={local} onChange={e => setLocal(e.target.value)} opts={LOCALS.map(l => ({ v: l.name, l: l.name }))} />
        </div>
        <Btn onClick={suggest} label={loading ? "Analisando..." : "Gerar Sugestão com IA"} icon="ai" color={loading ? "#334155" : "linear-gradient(135deg,#f59e0b,#ef4444)"} disabled={loading || !tid || !date} />
      </div>
      {sugs.length > 0 && (
        <div style={{ background: "#1e293b", borderRadius: 16, padding: 24, border: "1px solid #334155" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <h3 style={{ color: "#fff", margin: 0, fontWeight: 700 }}>✨ Sugestão para {t?.gcc}</h3>
            {!applied ? <Btn onClick={apply} label="Aplicar Escala" color="#16a34a" sm /> : <span style={{ color: "#16a34a", fontWeight: 600, fontSize: 13 }}>✅ Aplicada!</span>}
          </div>
          {sugs.map((s, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 16, padding: "14px 0", borderBottom: "1px solid #334155" }}>
              <div style={{ flex: 1 }}><p style={{ color: "#e2e8f0", fontWeight: 600, margin: 0, fontSize: 14 }}>{s.module}</p><p style={{ color: "#64748b", fontSize: 12, margin: "2px 0 0" }}>{s.role}</p></div>
              {s.instructor ? (
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ width: 32, height: 32, borderRadius: "50%", background: "linear-gradient(135deg,#3b82f6,#8b5cf6)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 11, fontWeight: 700 }}>
                    {s.instructor.name.split(" ").map(n => n[0]).join("").slice(0, 2)}
                  </div>
                  <div><p style={{ color: "#e2e8f0", margin: 0, fontSize: 13, fontWeight: 600 }}>{s.instructor.name}</p>
                    <p style={{ color: s.conflict ? "#ef4444" : "#16a34a", fontSize: 11, margin: 0 }}>{s.conflict ? "⚠️ Possível conflito" : `✅ ${s.available} disponível(is)`}</p>
                  </div>
                </div>
              ) : <span style={{ color: "#ef4444", fontSize: 13 }}>❌ Sem instrutor qualificado</span>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

// ── MY SCHEDULE ───────────────────────────────────────────────────────────────
const MySchedule = ({ schedules, setSchedules, user }) => {
  const today = new Date().toISOString().split("T")[0];
  const mine = schedules.filter(s => s.instructorId === user.id).sort((a, b) => a.date.localeCompare(b.date));
  const upcoming = mine.filter(s => s.date >= today);
  const past = mine.filter(s => s.date < today);
  const pending = mine.filter(s => s.status === "Pendente").length;
  const confirm = id => setSchedules(schedules.map(s => s.id === id ? { ...s, status: "Confirmado", confirmedAt: new Date().toISOString(), confirmedBy: user.name } : s));
  return (
    <div>
      <h2 style={{ color: "#fff", fontWeight: 800, margin: "0 0 4px", fontSize: 24 }}>Minha Agenda</h2>
      <p style={{ color: "#64748b", margin: "0 0 20px", fontSize: 14 }}>Olá, {user.name.split(" ")[0]}! Confirme suas programações.</p>
      {pending > 0 && (
        <div style={{ background: "#d9770615", border: "1px solid #d97706", borderRadius: 12, padding: "12px 16px", marginBottom: 20, display: "flex", alignItems: "center", gap: 10 }}>
          <Icon name="warning" size={18} color="#d97706" />
          <p style={{ color: "#d97706", margin: 0, fontSize: 14, fontWeight: 600 }}>{pending} programação(ões) aguardando confirmação de ciência.</p>
        </div>
      )}
      <div style={{ display: "flex", gap: 16, marginBottom: 24, flexWrap: "wrap" }}>
        <StatCard label="Total"       value={mine.length}                                      icon="calendar" color="#3b82f6" sub="treinamentos" />
        <StatCard label="Próximos"    value={upcoming.length}                                  icon="star"     color="#f59e0b" sub="agendados" />
        <StatCard label="Confirmados" value={mine.filter(s => s.status === "Confirmado").length} icon="check"  color="#16a34a" sub="ciente" />
        <StatCard label="Pendentes"   value={pending}                                          icon="warning"  color="#ef4444" sub="aguardando" />
      </div>
      <div style={{ background: "#1e293b", borderRadius: 16, padding: 24, border: "1px solid #334155", marginBottom: 20 }}>
        <h3 style={{ color: "#fff", fontWeight: 700, margin: "0 0 16px", fontSize: 16 }}>📅 Próximos Treinamentos</h3>
        {upcoming.length === 0 ? <p style={{ color: "#64748b" }}>Nenhum treinamento agendado.</p> : upcoming.map(s => (
          <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 16, padding: "16px 0", borderBottom: "1px solid #334155" }}>
            <div style={{ width: 52, height: 52, borderRadius: 12, background: "#0f172a", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <span style={{ color: "#f59e0b", fontSize: 18, fontWeight: 800 }}>{new Date(s.date + "T12:00:00").getDate()}</span>
              <span style={{ color: "#64748b", fontSize: 10 }}>{new Date(s.date + "T12:00:00").toLocaleDateString("pt-BR", { month: "short" }).toUpperCase()}</span>
            </div>
            <div style={{ flex: 1 }}>
              <p style={{ color: "#e2e8f0", fontWeight: 700, margin: 0 }}>{s.trainingName} — {s.className}</p>
              <p style={{ color: "#64748b", fontSize: 12, margin: "4px 0 4px" }}>{s.module} · {s.local} · {s.startTime}–{s.endTime}</p>
              <span style={{ padding: "2px 8px", borderRadius: 6, background: (ROLE_BADGE[s.role] || "#64748b") + "20", color: ROLE_BADGE[s.role] || "#64748b", fontSize: 11 }}>{s.role}</span>
              {s.confirmedAt && <span style={{ color: "#64748b", fontSize: 11, marginLeft: 8 }}>Ciente em {new Date(s.confirmedAt).toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" })}</span>}
            </div>
            {s.status === "Pendente"
              ? <button onClick={() => confirm(s.id)} style={{ padding: "8px 16px", background: "linear-gradient(135deg,#16a34a,#15803d)", border: "none", borderRadius: 10, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 13, display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
                  <Icon name="check" size={14} color="#fff" /> Confirmar Ciência
                </button>
              : <span style={{ padding: "6px 14px", borderRadius: 20, background: "#16a34a20", color: "#16a34a", fontSize: 12, fontWeight: 700, flexShrink: 0, display: "flex", alignItems: "center", gap: 6 }}>
                  <Icon name="check" size={13} color="#16a34a" /> Confirmado
                </span>}
          </div>
        ))}
      </div>
      {past.length > 0 && (
        <div style={{ background: "#1e293b", borderRadius: 16, padding: 24, border: "1px solid #334155" }}>
          <h3 style={{ color: "#fff", fontWeight: 700, margin: "0 0 16px", fontSize: 16 }}>🗂 Histórico</h3>
          {past.map(s => (
            <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 16, padding: "12px 0", borderBottom: "1px solid #334155", opacity: 0.7 }}>
              <div style={{ width: 44, height: 44, borderRadius: 10, background: "#0f172a", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                <span style={{ color: "#94a3b8", fontSize: 16, fontWeight: 800 }}>{new Date(s.date + "T12:00:00").getDate()}</span>
                <span style={{ color: "#64748b", fontSize: 10 }}>{new Date(s.date + "T12:00:00").toLocaleDateString("pt-BR", { month: "short" }).toUpperCase()}</span>
              </div>
              <div style={{ flex: 1 }}>
                <p style={{ color: "#94a3b8", fontWeight: 600, margin: 0, fontSize: 13 }}>{s.trainingName} — {s.className}</p>
                <p style={{ color: "#64748b", fontSize: 12, margin: "2px 0 0" }}>{s.local} · {s.startTime}–{s.endTime}</p>
              </div>
              <span style={{ color: "#64748b", fontSize: 12 }}>Realizado</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

// ── REPORTS ───────────────────────────────────────────────────────────────────
const ReportsPage = ({ schedules, trainings, instructors }) => {
  const byI = instructors.map(i => ({ ...i, count: schedules.filter(s => s.instructorId === i.id).length })).sort((a, b) => b.count - a.count);
  const byT = trainings.map(t => ({ ...t, count: schedules.filter(s => s.trainingId === t.id).length })).sort((a, b) => b.count - a.count);
  const maxI = Math.max(...byI.map(x => x.count), 1), maxT = Math.max(...byT.map(x => x.count), 1);
  return (
    <div>
      <h2 style={{ color: "#fff", fontWeight: 800, margin: "0 0 4px", fontSize: 24 }}>Relatórios</h2>
      <p style={{ color: "#64748b", margin: "0 0 24px", fontSize: 14 }}>Análise de desempenho e utilização</p>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
        <div style={{ background: "#1e293b", borderRadius: 16, padding: 24, border: "1px solid #334155" }}>
          <h3 style={{ color: "#fff", fontWeight: 700, margin: "0 0 16px", fontSize: 15 }}>🏆 Carga por Instrutor</h3>
          {byI.map(i => (
            <div key={i.id} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
              <div style={{ width: 30, height: 30, borderRadius: "50%", background: "linear-gradient(135deg,#3b82f6,#8b5cf6)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 10, fontWeight: 700, flexShrink: 0 }}>
                {i.name.split(" ").map(n => n[0]).join("").slice(0, 2)}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#e2e8f0", fontSize: 13 }}>{i.name}</span><span style={{ color: "#64748b", fontSize: 13 }}>{i.count}</span></div>
                <div style={{ height: 4, background: "#334155", borderRadius: 2, marginTop: 4 }}>
                  <div style={{ height: "100%", width: `${(i.count / maxI) * 100}%`, background: "linear-gradient(90deg,#3b82f6,#8b5cf6)", borderRadius: 2 }} />
                </div>
              </div>
            </div>
          ))}
        </div>
        <div style={{ background: "#1e293b", borderRadius: 16, padding: 24, border: "1px solid #334155" }}>
          <h3 style={{ color: "#fff", fontWeight: 700, margin: "0 0 16px", fontSize: 15 }}>📚 Cursos Mais Programados</h3>
          {byT.slice(0, 8).map(t => (
            <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
              <span style={{ padding: "2px 8px", borderRadius: 6, background: "#3b82f620", color: "#3b82f6", fontSize: 11, fontWeight: 700, flexShrink: 0, minWidth: 60, textAlign: "center" }}>{t.gcc}</span>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#e2e8f0", fontSize: 12, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: 160 }}>{t.name.slice(0, 30)}</span><span style={{ color: "#64748b", fontSize: 13 }}>{t.count}</span></div>
                <div style={{ height: 4, background: "#334155", borderRadius: 2, marginTop: 4 }}>
                  <div style={{ height: "100%", width: `${(t.count / maxT) * 100}%`, background: "linear-gradient(90deg,#f59e0b,#ef4444)", borderRadius: 2 }} />
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ── SETTINGS ──────────────────────────────────────────────────────────────────
const SettingsPage = ({ areas, setAreas }) => {
  const [showNew, setShowNew] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ name: "", color: "#3b82f6", leader: "", leaderEmail: "" });
  const COLORS = ["#3b82f6","#0ea5e9","#8b5cf6","#ef4444","#f97316","#f59e0b","#16a34a","#10b981","#ec4899","#64748b"];
  const openNew  = () => { setForm({ name: "", color: "#3b82f6", leader: "", leaderEmail: "" }); setEditing(null); setShowNew(true); };
  const openEdit = a => { setForm({ name: a.name, color: a.color, leader: a.leader, leaderEmail: a.leaderEmail }); setEditing(a); setShowNew(true); };
  const save = () => {
    if (!form.name || !form.leader) return;
    if (editing) setAreas(areas.map(a => a.id === editing.id ? { ...a, ...form } : a));
    else setAreas([...areas, { id: Date.now(), ...form }]);
    setShowNew(false);
  };
  return (
    <div>
      <h2 style={{ color: "#fff", fontWeight: 800, margin: "0 0 4px", fontSize: 24 }}>Configurações</h2>
      <p style={{ color: "#64748b", margin: "0 0 28px", fontSize: 14 }}>Gerencie as áreas de negócio — base de toda a estrutura</p>
      <div style={{ background: "#1e293b", borderRadius: 16, border: "1px solid #334155", overflow: "hidden" }}>
        <div style={{ padding: "18px 24px", borderBottom: "1px solid #334155", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div><h3 style={{ color: "#fff", fontWeight: 700, margin: 0, fontSize: 16 }}>Áreas de Negócio</h3>
            <p style={{ color: "#64748b", fontSize: 13, margin: "2px 0 0" }}>Cada área tem um líder responsável e agrupa os treinamentos</p>
          </div>
          <Btn onClick={openNew} label="Nova Área" icon="plus" sm />
        </div>
        {areas.map((a, i) => (
          <div key={a.id} style={{ display: "flex", alignItems: "center", gap: 16, padding: "18px 24px", borderBottom: i < areas.length - 1 ? "1px solid #334155" : "none" }}>
            <div style={{ width: 44, height: 44, borderRadius: 12, background: a.color + "20", border: `2px solid ${a.color}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <div style={{ width: 18, height: 18, borderRadius: "50%", background: a.color }} />
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
                <span style={{ color: "#fff", fontWeight: 800, fontSize: 15 }}>{a.name}</span>
                <span style={{ padding: "2px 8px", borderRadius: 20, background: a.color + "20", color: a.color, fontSize: 11, fontWeight: 700 }}>ÁREA {i + 1}</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ width: 28, height: 28, borderRadius: "50%", background: "linear-gradient(135deg,#3b82f6,#8b5cf6)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 10, fontWeight: 700 }}>
                  {a.leader.split(" ").map(n => n[0]).join("").slice(0, 2)}
                </div>
                <div><p style={{ color: "#e2e8f0", fontSize: 13, margin: 0, fontWeight: 600 }}>{a.leader}</p><p style={{ color: "#64748b", fontSize: 11, margin: 0 }}>{a.leaderEmail}</p></div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
              <Btn onClick={() => openEdit(a)} label="Editar" icon="edit" color="#334155" sm />
              <button onClick={() => setAreas(areas.filter(x => x.id !== a.id))} style={{ background: "none", border: "1px solid #ef444440", borderRadius: 8, cursor: "pointer", padding: "6px 8px" }}><Icon name="delete" size={14} color="#ef4444" /></button>
            </div>
          </div>
        ))}
      </div>
      {showNew && (
        <Modal title={editing ? "Editar Área" : "Nova Área"} onClose={() => setShowNew(false)} width={460}>
          <Input label="Nome da Área" value={form.name} onChange={e => setForm({ ...form, name: e.target.value.toUpperCase() })} placeholder="Ex: OPITO" />
          <div style={{ marginBottom: 16 }}>
            <label style={{ color: "#94a3b8", fontSize: 13, display: "block", marginBottom: 8 }}>Cor de identificação</label>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              {COLORS.map(c => <button key={c} onClick={() => setForm({ ...form, color: c })} style={{ width: 32, height: 32, borderRadius: "50%", background: c, border: form.color === c ? "3px solid #fff" : "3px solid transparent", cursor: "pointer", outline: "none" }} />)}
            </div>
          </div>
          <Input label="Nome do Líder" value={form.leader} onChange={e => setForm({ ...form, leader: e.target.value })} placeholder="Ex: Matheus Fritz Rodrigues Carvalho" />
          <Input label="E-mail do Líder" value={form.leaderEmail} onChange={e => setForm({ ...form, leaderEmail: e.target.value })} placeholder="Ex: lider@relyonnutec.com" />
          <Btn onClick={save} label={editing ? "Salvar Alterações" : "Criar Área"} icon="check" color="#16a34a" />
        </Modal>
      )}
    </div>
  );
};

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser]       = useState(() => { try { const s = sessionStorage.getItem(SAVED_KEY); return s ? JSON.parse(s) : null; } catch { return null; } });
  const [active, setActive]   = useState("dashboard");
  const [collapsed, setCollapsed] = useState(false);
  const [schedules, setSchedules]     = useState(INITIAL_SCHEDULES);
  const [trainings, setTrainings]     = useState(INITIAL_TRAININGS);
  const [areas, setAreas]             = useState(INITIAL_AREAS);
  const [instructors, setInstructors] = useState(INSTRUCTORS);

  const handleLogin = (u, keep) => {
    setUser(u);
    setActive(u.role === "admin" ? "dashboard" : "my-schedule");
    if (keep) { try { sessionStorage.setItem(SAVED_KEY, JSON.stringify(u)); } catch {} }
  };
  const handleLogout = () => { setUser(null); try { sessionStorage.removeItem(SAVED_KEY); } catch {} };

  if (!user) return <Login onLogin={handleLogin} />;

  const pages = {
    dashboard:    <Dashboard    schedules={schedules} trainings={trainings} />,
    schedule:     <Schedule     schedules={schedules} setSchedules={setSchedules} trainings={trainings} user={user} instructors={instructors} />,
    instructors:  <InstructorsPage instructors={instructors} setInstructors={setInstructors} />,
    trainings:    <TrainingsPage  trainings={trainings} setTrainings={setTrainings} areas={areas} />,
    locals:       <LocalsPage     schedules={schedules} />,
    ai:           <AiPage         schedules={schedules} setSchedules={setSchedules} trainings={trainings} instructors={instructors} />,
    reports:      <ReportsPage    schedules={schedules} trainings={trainings} instructors={instructors} />,
    settings:     <SettingsPage   areas={areas} setAreas={setAreas} />,
    "my-schedule":<MySchedule     schedules={schedules} setSchedules={setSchedules} user={user} />,
    "my-history": <ReportsPage    schedules={schedules} trainings={trainings} instructors={instructors} />,
  };

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: "#0f172a", fontFamily: "'Segoe UI',sans-serif" }}>
      <Sidebar active={active} setActive={setActive} user={user} onLogout={handleLogout} collapsed={collapsed} setCollapsed={setCollapsed} />
      <main style={{ flex: 1, padding: 32, overflowY: "auto" }}>
        {pages[active] || <Dashboard schedules={schedules} trainings={trainings} />}
      </main>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
