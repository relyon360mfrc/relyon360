        </button>

        {/* ── HEADER ── */}
        <div style={{ background: "#073d4a", borderRadius: 16, padding: 24, border: "1px solid #154753", marginBottom: 16, display: "flex", alignItems: "center", gap: 20, flexWrap: "wrap" }}>
          <div style={{ width: 76, height: 76, borderRadius: "50%", background: "linear-gradient(135deg,#ffa619,#e8920a)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: 24, flexShrink: 0, boxShadow: "0 4px 12px #ffa61930" }}>
            {detail.name.split(" ").map(n => n[0]).join("").slice(0, 2)}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <h2 style={{ color: "#fff", fontWeight: 800, margin: "0 0 6px", fontSize: 21 }}>{detail.name}</h2>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
              <span style={{ color: "#94a3b8", fontSize: 13 }}>{detail.contract}</span>
              <span style={{ color: "#154753" }}>·</span>
              <span style={{ padding: "2px 10px", borderRadius: 20, background: statusColor(detail.status) + "20", color: statusColor(detail.status), fontSize: 12, fontWeight: 600 }}>{detail.status}</span>
              {detail.leader && <><span style={{ color: "#154753" }}>·</span><span style={{ color: "#64748b", fontSize: 12 }}>Reporta a <strong style={{ color: "#94a3b8" }}>{detail.leader}</strong></span></>}
            </div>
            <div style={{ display: "flex", gap: 16, marginTop: 6 }}>
              <span style={{ color: "#475569", fontSize: 12 }}>📍 {detail.base}</span>
              <span style={{ color: "#475569", fontSize: 12 }}>🎓 {(detail.skills || []).length} competência{(detail.skills || []).length !== 1 ? "s" : ""}</span>
            </div>
          </div>
          <button onClick={() => askDelete(() => { setInstructors(instructors.filter(i => i.id !== detail.id)); setDetail(null); })}
            style={{ background: "none", border: "1px solid #ef444440", borderRadius: 10, padding: "8px 12px", cursor: "pointer", color: "#ef4444", fontSize: 13 }}>Excluir</button>
        </div>

        {/* ── DADOS PESSOAIS ── */}
        <InstructorAcc open={personalOpen} onToggle={() => setPersonalOpen(v => !v)} title="👤 Dados Pessoais">
          {!editingPersonal ? (
            <div>
              {[["Tipo de Contrato", detail.contract], ["Status", detail.status], ["Base", detail.base], ["Telefone", detail.phone || "—"], ["E-mail", detail.email || "—"], ["Usuário", detail.username ? "@" + detail.username : "—"], ["Reporta a (Líder)", detail.leader || "—"]].map(([k, v]) => (
                <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: "1px solid #154753" }}>
                  <span style={{ color: "#64748b", fontSize: 14 }}>{k}</span>
                  <span style={{ color: "#e2e8f0", fontSize: 14, fontWeight: 500 }}>{v}</span>
                </div>
              ))}
              {canAdmin(user) && (
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: "1px solid #154753" }}>
                  <span style={{ color: "#64748b", fontSize: 14 }}>Senha de acesso</span>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ color: "#e2e8f0", fontSize: 14, fontWeight: 500, fontFamily: showPass ? "inherit" : "monospace" }}>{showPass ? (detail.password || "—") : "••••••••"}</span>
                    <button onClick={() => setShowPass(v => !v)} style={{ background: "#154753", border: "none", cursor: "pointer", color: "#94a3b8", fontSize: 11, padding: "2px 8px", borderRadius: 4 }}>{showPass ? "ocultar" : "mostrar"}</button>
                  </div>
                </div>
              )}
              <div style={{ marginTop: 14 }}>
                <Btn onClick={() => { setPForm({ contract: detail.contract, status: detail.status, base: detail.base || "", phone: detail.phone || "", email: detail.email || "", username: detail.username || "", leader: detail.leader || "", password: detail.password || "" }); setEditingPersonal(true); }} label="Editar Dados" icon="edit" color="#ffa619" sm />
              </div>
            </div>
          ) : (
            <div>
              <Sel label="Tipo de Contrato" value={pForm.contract} onChange={e => setPForm({ ...pForm, contract: e.target.value })} opts={["CLT","CLT Offshore","Freelancer","PJ","Prestador"].map(v => ({ v, l: v }))} />
              <Sel label="Status" value={pForm.status} onChange={e => setPForm({ ...pForm, status: e.target.value })} opts={["Ativo","Inativo","Afastado"].map(v => ({ v, l: v }))} />
              <Sel label="Base" value={pForm.base} onChange={e => setPForm({ ...pForm, base: e.target.value })} opts={["Unidade Macaé","Unidade Rio de Janeiro"].map(v => ({ v, l: v }))} />
              <Input label="Telefone" value={pForm.phone} onChange={e => setPForm({ ...pForm, phone: e.target.value })} placeholder="Ex: (22) 99999-0000" />
              <Input label="E-mail" value={pForm.email} onChange={e => setPForm({ ...pForm, email: e.target.value })} placeholder="Ex: nome@relyonnutec.com" />
              <Input label="Usuário (acesso)" value={pForm.username||""} onChange={e => setPForm({ ...pForm, username: e.target.value.toLowerCase().replace(/\s/g,"") })} placeholder="Ex: joao.silva" />
              <Sel label="Reporta a (Líder)" value={pForm.leader} onChange={e => setPForm({ ...pForm, leader: e.target.value })} opts={[{ v: "", l: "— Sem líder —" }, ...[...new Map((areas||[]).map(a => [a.leader, a.leader])).values()].filter(Boolean).map(v => ({ v, l: v }))]} />
              {canAdmin(user) && (
                <Input label="Senha de acesso" type="text" value={pForm.password} onChange={e => setPForm({ ...pForm, password: e.target.value })} placeholder="Senha do instrutor" />
              )}
              <div style={{ display: "flex", gap: 8 }}>
                <Btn onClick={() => { updateInstr(detail.id, pForm); setEditingPersonal(false); }} label="Salvar" icon="check" color="#16a34a" sm />
                <Btn onClick={() => setEditingPersonal(false)} label="Cancelar" color="#154753" sm />
              </div>
            </div>
          )}
        </InstructorAcc>

        {/* ── COMPETÊNCIAS ── */}
        <InstructorAcc open={skillsOpen} onToggle={() => setSkillsOpen(v => !v)} title="🎓 Competências" count={(detail.skills || []).length}>
          {/* Search */}
          <div style={{ position: "relative", marginBottom: 14 }}>
            <div style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)" }}><Icon name="search" size={14} color="#64748b" /></div>
            <input value={skillSearch} onChange={e => setSkillSearch(e.target.value)} placeholder="Filtrar competências..."
              style={{ width: "100%", padding: "8px 8px 8px 30px", background: "#01323d", border: "1px solid #154753", borderRadius: 8, color: "#e2e8f0", fontSize: 13, outline: "none", boxSizing: "border-box" }} />
          </div>

          {/* Add skill */}
          <div style={{ marginBottom: 16 }}>
            {!addingSkill ? (
              <Btn onClick={() => { setAddingSkill(true); setNewSkillVal(""); }} label="+ Adicionar Competência" color="#ffa619" sm />
            ) : (
              <div style={{ background: "#01323d", borderRadius: 12, padding: 16, border: "1px solid #ffa61940", marginBottom: 4 }}>
                <p style={{ color: "#ffa619", fontSize: 13, fontWeight: 700, margin: "0 0 10px" }}>Nova Competência</p>
                <SearchSel label="" value={newSkillVal} onChange={e => setNewSkillVal(e.target.value)}
                  opts={allModuleOpts.filter(o => !(detail.skills || []).includes(o.v))}
                  placeholder="Buscar módulo..." />
                <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                  <Btn onClick={() => {
                    if (!newSkillVal || (detail.skills || []).includes(newSkillVal)) { setAddingSkill(false); setNewSkillVal(""); return; }
                    updateInstr(detail.id, { skills: [...(detail.skills || []), newSkillVal] });
                    setAddingSkill(false); setNewSkillVal("");
                  }} label="Adicionar" icon="check" color="#16a34a" sm disabled={!newSkillVal} />
                  <Btn onClick={() => { setAddingSkill(false); setNewSkillVal(""); }} label="Cancelar" color="#154753" sm />
                </div>
              </div>
            )}
          </div>

          {/* Skills grouped by training — collapsible */}
          {(() => {
            const sl = skillSearch.toLowerCase();
            const filteredGroups = groups.map(g => ({
              ...g,
              modules: sl ? g.modules.filter(m => m.toLowerCase().includes(sl)) : g.modules
            })).filter(g => g.modules.length > 0);
            const isExp = gi => sl ? true : expandedTrainings.has(gi);
            const toggle = gi => setExpandedTrainings(s => { const n = new Set(s); n.has(gi) ? n.delete(gi) : n.add(gi); return n; });
            if (filteredGroups.length === 0)
              return <p style={{ color: "#64748b", fontSize: 14 }}>{sl ? `Nenhuma competência encontrada para "${skillSearch}".` : "Nenhuma competência cadastrada."}</p>;
            return filteredGroups.map((g, gi) => (
              <div key={gi} style={{ marginBottom: 8 }}>
                <button onClick={() => toggle(gi)}
                  style={{ width: "100%", background: "#01323d", border: "1px solid #154753", borderRadius: isExp(gi) ? "8px 8px 0 0" : 8, padding: "9px 12px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between", textAlign: "left" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ color: "#ffa619", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5 }}>{g.label}</span>
                    <span style={{ color: "#64748b", fontSize: 11 }}>({g.modules.length})</span>
                  </div>
                  <span style={{ color: "#64748b", fontSize: 10 }}>{isExp(gi) ? "▲" : "▼"}</span>
                </button>
                {isExp(gi) && (
                  <div style={{ border: "1px solid #154753", borderTop: "none", borderRadius: "0 0 8px 8px", overflow: "hidden" }}>
                    {g.modules.map((skillName, mi) => (
                      <div key={skillName} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", background: mi % 2 === 0 ? "#073d4a" : "#01323d", borderTop: mi > 0 ? "1px solid #154753" : "none" }}>
                        <span style={{ flex: 1, color: "#e2e8f0", fontSize: 12 }}>{skillName}</span>
                        <button onClick={() => askDelete(() => updateInstr(detail.id, { skills: (detail.skills || []).filter(s => s !== skillName) }))}
                          style={{ background: "none", border: "1px solid #ef444430", borderRadius: 6, padding: "3px 8px", color: "#ef4444", fontSize: 11, cursor: "pointer", flexShrink: 0 }}>✕</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ));
          })()}
        </InstructorAcc>

        <DeleteGuardModal guard={delGuard} setGuard={setDelGuard} />
      </div>
    );
  }

  const fullyFiltered = instructors.filter(i => {
    if (!i.name.toLowerCase().includes(search.toLowerCase())) return false;
    if (filterLeader && i.leader !== filterLeader) return false;
    if (filterArea) {
      const ia = instrAreas(i);
      if (!ia.some(a => String(a.id) === String(filterArea))) return false;
    }
    return true;
  });

  // ── LIST VIEW ──
  return (
    <div>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
        <div>
          <h2 style={{ color: "#fff", fontWeight: 800, margin: 0, fontSize: 24 }}>Instrutores</h2>
          <p style={{ color: "#64748b", margin: "4px 0 0", fontSize: 14 }}>{fullyFiltered.length} de {instructors.length} instrutores</p>
        </div>
        <button onClick={() => setShowNew(true)} style={{ display: "flex", alignItems: "center", gap: 8, background: "#ffa619", border: "none", borderRadius: 10, padding: "10px 18px", color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
          <Icon name="plus" size={16} color="#fff" /> Novo Instrutor
        </button>
      </div>

      {/* Filters (5.2) */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr auto auto", gap: 10, marginBottom: 16, alignItems: "center" }}>
        <div style={{ position: "relative" }}>
          <div style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)" }}><Icon name="search" size={16} color="#64748b" /></div>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar instrutor..."
            style={{ width: "100%", padding: "10px 10px 10px 40px", background: "#073d4a", border: "1px solid #154753", borderRadius: 10, color: "#e2e8f0", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
        </div>
        <select value={filterLeader} onChange={e => setFilterLeader(e.target.value)}
          style={{ padding: "10px 12px", background: "#073d4a", border: `1px solid ${filterLeader ? "#ffa619" : "#154753"}`, borderRadius: 10, color: filterLeader ? "#ffa619" : "#94a3b8", fontSize: 13, outline: "none", cursor: "pointer" }}>
          <option value="">Todos os líderes</option>
          {uniqueLeaders.map(l => <option key={l} value={l}>{l}</option>)}
        </select>
        <select value={filterArea} onChange={e => setFilterArea(e.target.value)}
          style={{ padding: "10px 12px", background: "#073d4a", border: `1px solid ${filterArea ? "#ffa619" : "#154753"}`, borderRadius: 10, color: filterArea ? "#ffa619" : "#94a3b8", fontSize: 13, outline: "none", cursor: "pointer" }}>
          <option value="">Todas as áreas</option>
          {(areas||[]).map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
        </select>
      </div>
      {(filterLeader || filterArea) && (
        <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
          {filterLeader && <span style={{ padding: "3px 12px", borderRadius: 20, background: "#ffa61920", color: "#ffa619", fontSize: 12, cursor: "pointer" }} onClick={() => setFilterLeader("")}>✕ Líder: {filterLeader}</span>}
          {filterArea && <span style={{ padding: "3px 12px", borderRadius: 20, background: "#ffa61920", color: "#ffa619", fontSize: 12, cursor: "pointer" }} onClick={() => setFilterArea("")}>✕ Área: {(areas||[]).find(a => String(a.id) === String(filterArea))?.name}</span>}
        </div>
      )}

      {/* LIST TABLE (5.1) */}
      <div style={{ background: "#073d4a", borderRadius: 16, border: "1px solid #154753", overflow: "hidden" }}>
        {/* Table header */}
        <div style={{ display: "grid", gridTemplateColumns: "44px 1fr 160px 130px 130px", gap: 0, padding: "10px 20px", borderBottom: "1px solid #154753", background: "#01323d" }}>
          {["","Nome","Contrato · Base","Líder","Áreas de Atuação"].map((h,i) => (
            <span key={i} style={{ color: "#475569", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5 }}>{h}</span>
          ))}
        </div>
        {fullyFiltered.length === 0 && (
          <p style={{ color: "#475569", padding: "24px 20px", fontSize: 14 }}>Nenhum instrutor encontrado.</p>
        )}
        {fullyFiltered.map((i, idx) => {
          const ia = instrAreas(i);
          return (
            <div key={i.id} onClick={() => openDetail(i)}
              style={{ display: "grid", gridTemplateColumns: "44px 1fr 160px 130px 130px", gap: 0, padding: "12px 20px", borderBottom: idx < fullyFiltered.length - 1 ? "1px solid #154753" : "none", cursor: "pointer", alignItems: "center", transition: "background .12s" }}
              onMouseEnter={e => e.currentTarget.style.background = "#073d4a80"}
              onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
              {/* Avatar */}
              <div style={{ width: 36, height: 36, borderRadius: "50%", background: "linear-gradient(135deg,#ffa619,#e8920a)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: 13 }}>
                {i.name.split(" ").map(n => n[0]).join("").slice(0, 2)}
              </div>
              {/* Name + status + contract */}
              <div style={{ minWidth: 0, paddingRight: 8 }}>
                <p style={{ color: "#e2e8f0", fontWeight: 700, margin: "0 0 3px", fontSize: 14, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{i.name}</p>
                <div style={{ display: "flex", gap: 5, flexWrap: "wrap", alignItems: "center" }}>
                  <span style={{ padding: "1px 8px", borderRadius: 10, background: statusColor(i.status) + "20", color: statusColor(i.status), fontSize: 10, fontWeight: 700 }}>{i.status}</span>
                  <span style={{ padding: "1px 8px", borderRadius: 10, background: "#154753", color: "#94a3b8", fontSize: 10, fontWeight: 600 }}>{i.contract}</span>
                </div>
              </div>
              {/* Contract + Base */}
              <div style={{ minWidth: 0 }}>
                <p style={{ color: "#94a3b8", fontSize: 12, margin: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{i.contract}</p>
                <p style={{ color: "#475569", fontSize: 11, margin: "2px 0 0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>📍 {i.base}</p>
              </div>
              {/* Leader */}
              <p style={{ color: "#64748b", fontSize: 12, margin: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{i.leader || "—"}</p>
              {/* Areas (5.3) */}
              <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                {ia.length === 0
                  ? <span style={{ color: "#475569", fontSize: 11 }}>—</span>
                  : ia.map(a => <span key={a.id} style={{ padding: "2px 7px", borderRadius: 8, background: (a.color||"#64748b") + "22", color: a.color||"#64748b", fontSize: 10, fontWeight: 700, whiteSpace: "nowrap" }}>{a.name}</span>)
                }
              </div>
            </div>
          );
        })}
      </div>

      {showNew && (
        <Modal title="Novo Instrutor" onClose={() => setShowNew(false)} width={480}>
          <Input label="Nome completo" value={newForm.name} onChange={e => setNewForm({ ...newForm, name: e.target.value })} placeholder="Ex: João da Silva" />
          <Sel label="Tipo de contrato" value={newForm.contract} onChange={e => setNewForm({ ...newForm, contract: e.target.value })} opts={["CLT","CLT Offshore","Freelancer","PJ","Prestador"].map(v => ({ v, l: v }))} />
          <Sel label="Status" value={newForm.status} onChange={e => setNewForm({ ...newForm, status: e.target.value })} opts={["Ativo","Inativo","Afastado"].map(v => ({ v, l: v }))} />
          <Sel label="Base" value={newForm.base} onChange={e => setNewForm({ ...newForm, base: e.target.value })} opts={["Unidade Macaé","Unidade Rio de Janeiro"].map(v => ({ v, l: v }))} />
          <Sel label="Reporta a (Líder)" value={newForm.leader} onChange={e => setNewForm({ ...newForm, leader: e.target.value })} opts={[{ v: "", l: "— Sem líder —" }, ...[...new Map((areas||[]).map(a => [a.leader, a.leader])).values()].filter(Boolean).map(v => ({ v, l: v }))]} />
          <Input label="Telefone" value={newForm.phone} onChange={e => setNewForm({ ...newForm, phone: e.target.value })} placeholder="Ex: (22) 99999-0000" />
          <Input label="E-mail" value={newForm.email} onChange={e => setNewForm({ ...newForm, email: e.target.value })} placeholder="Ex: nome@relyonnutec.com" />
          <Input label="Usuário (nome de acesso)" value={newForm.username||""} onChange={e => setNewForm({ ...newForm, username: e.target.value.toLowerCase().replace(/\s/g,"") })} placeholder="Ex: joao.silva (sem espaços)" />
          <Btn onClick={createInstructor} label="Criar Instrutor" icon="check" color="#16a34a" />
        </Modal>
      )}
      <DeleteGuardModal guard={delGuard} setGuard={setDelGuard} />
    </div>
  );
};

// ── LOCALS ────────────────────────────────────────────────────────────────────
const LocalsPage = ({ schedules }) => {
  const [search, setSearch] = useState("");
  const [activeGroup, setActiveGroup] = useState("Todos");
  const today = new Date().toISOString().split("T")[0];
  const isOcc = name => schedules.some(s => s.local === name && s.date === today && s.status !== "Cancelado");
  const grouped = [
    { name: "RelyOn Macaé — Teórico",  color: "#ffa619", items: LOCALS.filter(l => l.type === "RelyOn Macaé" && l.env === "Teórico") },
    { name: "Piscinas",                color: "#ffa619", items: LOCALS.filter(l => l.subtype === "piscina") },
    { name: "Combate a Incêndio",      color: "#ef4444", items: LOCALS.filter(l => l.subtype === "incendio") },
    { name: "Industrial / Rigger",     color: "#f97316", items: LOCALS.filter(l => l.subtype === "industrial") },
    { name: "Offshore",                color: "#e8920a", items: LOCALS.filter(l => l.type === "Offshore") },
    { name: "In Company",              color: "#f59e0b", items: LOCALS.filter(l => l.type === "In Company") },
    { name: "Online",                  color: "#10b981", items: LOCALS.filter(l => l.type === "Online") },
  ];
  const visibleGroups = activeGroup === "Todos" ? grouped : grouped.filter(g => g.name === activeGroup);
  const filtered = visibleGroups.map(g => ({ ...g, items: g.items.filter(l => l.name.toLowerCase().includes(search.toLowerCase())) })).filter(g => g.items.length > 0);
  return (
    <div>
      <h2 style={{ color: "#fff", fontWeight: 800, margin: "0 0 4px", fontSize: 24 }}>Locais</h2>
      <p style={{ color: "#64748b", margin: "0 0 20px", fontSize: 14 }}>{LOCALS.length} locais · 7 grupos</p>
      <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap" }}>
        {grouped.map(g => (
          <div key={g.name} onClick={() => setActiveGroup(activeGroup === g.name ? "Todos" : g.name)}
            style={{ background: activeGroup === g.name ? g.color + "20" : "#073d4a", borderRadius: 12, padding: "10px 14px", border: `1px solid ${activeGroup === g.name ? g.color : "#154753"}`, cursor: "pointer", flex: 1, minWidth: 100 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}><div style={{ width: 8, height: 8, borderRadius: "50%", background: g.color }} /><span style={{ color: g.color, fontSize: 11, fontWeight: 700 }}>{g.name}</span></div>
            <p style={{ color: "#fff", fontWeight: 800, fontSize: 18, margin: 0 }}>{g.items.length}</p>
          </div>
        ))}
      </div>
      <div style={{ position: "relative", marginBottom: 20 }}>
        <div style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)" }}><Icon name="search" size={16} color="#64748b" /></div>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar local..."
          style={{ width: "100%", padding: "10px 10px 10px 40px", background: "#073d4a", border: "1px solid #154753", borderRadius: 10, color: "#e2e8f0", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
      </div>
      {filtered.map(g => (
        <div key={g.name} style={{ marginBottom: 24 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
            <div style={{ width: 10, height: 10, borderRadius: "50%", background: g.color }} />
            <h3 style={{ color: "#e2e8f0", fontWeight: 700, margin: 0, fontSize: 15 }}>{g.name}</h3>
            <span style={{ color: "#64748b", fontSize: 13 }}>{g.items.length} local(is)</span>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(200px,1fr))", gap: 10 }}>
            {g.items.map(l => {
              const occ = isOcc(l.name);
              const lc = localColor(l.name);
              return (
                <div key={l.id} style={{ background: "#073d4a", borderRadius: 12, padding: 14, border: `1px solid ${occ ? "#ef4444" : lc + "40"}`, position: "relative", overflow: "hidden" }}>
                  <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: occ ? "#ef4444" : lc }} />
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                    <Icon name="location" size={14} color={occ ? "#ef4444" : lc} />
                    <span style={{ padding: "2px 6px", borderRadius: 20, background: occ ? "#ef444420" : lc + "20", color: occ ? "#ef4444" : lc, fontSize: 10, fontWeight: 700 }}>{occ ? "EM USO" : "LIVRE"}</span>
                  </div>
                  <p style={{ color: "#e2e8f0", fontWeight: 600, margin: 0, fontSize: 12, lineHeight: 1.3 }}>{l.name}</p>
                  {l.capacity && <p style={{ color: "#64748b", fontSize: 11, margin: "2px 0 0" }}>até {l.capacity} alunos</p>}
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
};

// ── AI ────────────────────────────────────────────────────────────────────────
const AiPage = ({ schedules, setSchedules, trainings, instructors }) => {
  const [tid, setTid] = useState("");
  const [date, setDate] = useState("");
  const [local, setLocal] = useState("");
  const [sugs, setSugs] = useState([]);
  const [loading, setLoading] = useState(false);
  const [applied, setApplied] = useState(false);
  const t = trainings.find(x => x.id === +tid);
  const suggest = () => {
    if (!tid || !date) return;
    setLoading(true); setApplied(false);
    setTimeout(() => {
      const busy = schedules.filter(s => s.date === date).map(s => s.instructorId);
      setSugs((t?.modules || []).map((mod, idx) => {
        const qual = instructors.filter(i => (i.skills || []).includes(mod.name));
        const avail = qual.filter(i => !busy.includes(i.id));
        const chosen = avail[0] || qual[0];
        return { module: mod.name, instructor: chosen, available: avail.length, conflict: avail.length === 0, role: idx === 0 ? "Lead Instructor" : mod.name.includes("PRÁTICA") ? "Practical Instructor" : "Theoretical Instructor" };
      }));
      setLoading(false);
    }, 1600);
  };
  const apply = () => {
    const news = sugs.filter(s => s.instructor).map(s => ({
      id: Date.now() + Math.random(), trainingId: +tid, trainingName: t?.gcc || "", className: `${t?.gcc}-AI`,
      date, startTime: "08:00", endTime: "17:00", local: local || "A definir",
      instructorId: s.instructor.id, instructorName: s.instructor.name, module: s.module, role: s.role, status: "Pendente",
    }));
    setSchedules([...schedules, ...news]); setApplied(true);
  };
  return (
    <div>
      <h2 style={{ color: "#fff", fontWeight: 800, margin: "0 0 4px", fontSize: 24 }}>IA — Sugestão de Escala</h2>
      <p style={{ color: "#64748b", margin: "0 0 24px", fontSize: 14 }}>Analisa competências, disponibilidade e conflitos</p>
      <div style={{ background: "#073d4a", borderRadius: 16, padding: 24, border: "1px solid #154753", marginBottom: 20 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16, marginBottom: 16 }}>
          <Sel label="Treinamento" value={tid} onChange={e => setTid(e.target.value)} opts={trainings.map(t => ({ v: t.id, l: `${t.gcc} — ${t.name.slice(0, 30)}` }))} />
          <div><label style={{ color: "#94a3b8", fontSize: 13, display: "block", marginBottom: 6 }}>Data</label>
            <input type="date" value={date} onChange={e => setDate(e.target.value)} style={{ width: "100%", padding: "10px 12px", background: "#01323d", border: "1px solid #154753", borderRadius: 8, color: "#e2e8f0", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
          </div>
          <Sel label="Local" value={local} onChange={e => setLocal(e.target.value)} opts={LOCALS.map(l => ({ v: l.name, l: l.name }))} />
        </div>
        <Btn onClick={suggest} label={loading ? "Analisando..." : "Gerar Sugestão com IA"} icon="ai" color={loading ? "#154753" : "linear-gradient(135deg,#ffa619,#e8920a)"} disabled={loading || !tid || !date} />
      </div>
      {sugs.length > 0 && (
        <div style={{ background: "#073d4a", borderRadius: 16, padding: 24, border: "1px solid #154753" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <h3 style={{ color: "#fff", margin: 0, fontWeight: 700 }}>✨ Sugestão para {t?.gcc}</h3>
            {!applied ? <Btn onClick={apply} label="Aplicar Escala" color="#16a34a" sm /> : <span style={{ color: "#16a34a", fontWeight: 600, fontSize: 13 }}>✅ Aplicada!</span>}
          </div>
          {sugs.map((s, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 16, padding: "14px 0", borderBottom: "1px solid #154753" }}>
              <div style={{ flex: 1 }}><p style={{ color: "#e2e8f0", fontWeight: 600, margin: 0, fontSize: 14 }}>{s.module}</p><p style={{ color: "#64748b", fontSize: 12, margin: "2px 0 0" }}>{s.role}</p></div>
              {s.instructor ? (
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ width: 32, height: 32, borderRadius: "50%", background: "linear-gradient(135deg,#ffa619,#e8920a)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 11, fontWeight: 700 }}>
                    {s.instructor.name.split(" ").map(n => n[0]).join("").slice(0, 2)}
                  </div>
                  <div><p style={{ color: "#e2e8f0", margin: 0, fontSize: 13, fontWeight: 600 }}>{s.instructor.name}</p>
                    <p style={{ color: s.conflict ? "#ef4444" : "#16a34a", fontSize: 11, margin: 0 }}>{s.conflict ? "⚠️ Possível conflito" : `✅ ${s.available} disponível(is)`}</p>
                  </div>
                </div>
              ) : <span style={{ color: "#ef4444", fontSize: 13 }}>❌ Sem instrutor qualificado</span>}
            </div>
          ))}
        </div>
      )}

  );
};

// ── TRUNCATED TEXT WITH EXPAND BUTTON ────────────────────────────────────────
const TruncText = ({ text, maxLen, textStyle }) => {
  const [expanded, setExpanded] = React.useState(false);
  if (!text) return <span style={{ color: "#64748b" }}>—</span>;
  const needs = text.length > maxLen;
  return (
    <span>
      <span style={textStyle}>{expanded || !needs ? text : text.slice(0, maxLen) + "…"}</span>
      {needs && (
        <button onClick={e => { e.stopPropagation(); setExpanded(v => !v); }}
          style={{ marginLeft: 3, padding: "0 5px", background: "#154753", border: "none",
            borderRadius: 4, color: "#ffa619", fontSize: 9, cursor: "pointer",
            lineHeight: "1.8", verticalAlign: "middle" }}>
          {expanded ? "▲" : "+"}
        </button>
      )}
    </span>
  );
};

// ── INSTRUCTOR SCHEDULE CARD ──────────────────────────────────────────────────
// Definido fora do InstructorDashboard para evitar remount (ver CLAUDE.md)
const InstructorScheduleCard = ({ s, schedules, user, onConfirm, showDate }) => {

  const siblings = (schedules || []).filter(other =>
    other.className === s.className &&
    other.module    === s.module &&
    other.date      === s.date &&
    String(other.instructorId) !== String(user.id)
  );
  const isConfirmed = s.status === "Confirmado";
  const fmtFull = d => new Date(d + "T12:00:00").toLocaleDateString("pt-BR",
    { weekday: "long", day: "2-digit", month: "long", year: "numeric" });

  return (
    <div style={{
      background: "#01323d",
      border: `1px solid ${isConfirmed ? "#16a34a50" : "#154753"}`,
      borderRadius: 12,
      padding: "12px 14px",
      display: "flex",
      flexDirection: "column",
      gap: 7,
    }}>

      {/* Linha 1 — data (se solicitado) + horário + local */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
        {showDate && (
          <span style={{ color: "#94a3b8", fontSize: 11, fontWeight: 600, flexShrink: 0 }}>
            📅 {fmtFull(s.date)}
          </span>
        )}
        <span style={{ color: "#f59e0b", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>
          {s.startTime}–{s.endTime}
        </span>
        <span style={{ color: "#64748b", fontSize: 11, flexShrink: 0 }}>· {s.local}</span>
      </div>

      {/* Linha 2 — treinamento (7 chars) · disciplina (10 chars) */}
      <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
        <TruncText
          text={s.trainingName}
          maxLen={7}
          textStyle={{ color: "#ffa619", fontSize: 12, fontWeight: 700 }} />
        <span style={{ color: "#475569", fontSize: 11 }}>·</span>
        <TruncText
          text={s.module}
          maxLen={10}
          textStyle={{ color: "#e2e8f0", fontSize: 13, fontWeight: 600 }} />
      </div>

      {/* Linha 3 — equipe / tradutor + botão de confirmação */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, flexWrap: "wrap" }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          {siblings.length > 0 && (
            <span style={{ color: "#94a3b8", fontSize: 11 }}>
              {siblings.map(si => {
                const firstName = (si.instructorName || "").split(" ")[0];
                const isTranslator = (si.role || "").toLowerCase().includes("transl") ||
                                     (si.role || "").toLowerCase().includes("tradutor");
                return isTranslator ? `🌐 Tradutor: ${firstName}` : `👥 ${firstName}`;
              }).join("  ")}
            </span>
          )}
        </div>
        {!isConfirmed ? (
          <button onClick={() => onConfirm(s.id)}
            style={{ padding: "5px 14px", background: "#ffa619", border: "none", borderRadius: 8,
              color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer", flexShrink: 0,
              WebkitTapHighlightColor: "transparent" }}>
            Estou ciente ✓
          </button>
        ) : (
          <span style={{ color: "#16a34a", fontSize: 11, fontWeight: 700, flexShrink: 0 }}>✓ Ciente</span>
        )}
      </div>
    </div>
  );
};

// ── INSTRUCTOR DASHBOARD ──────────────────────────────────────────────────────
const InstructorDashboard = ({ schedules, setSchedules, user }) => {
  const today    = new Date().toISOString().split("T")[0];
  const tomorrow = (() => {
    const d = new Date(today + "T12:00:00");
    d.setDate(d.getDate() + 1);
    return d.toISOString().split("T")[0];
  })();
  const fmt     = d => new Date(d + "T12:00:00").toLocaleDateString("pt-BR", { weekday: "short", day: "2-digit", month: "2-digit" });
  const fmtLong = d => new Date(d + "T12:00:00").toLocaleDateString("pt-BR", { weekday: "long",  day: "2-digit", month: "long" });

  const mine = schedules
    .filter(s => String(s.instructorId) === String(user.id))
    .sort((a, b) => a.date.localeCompare(b.date) || a.startTime.localeCompare(b.startTime));

  const todayItems    = mine.filter(s => s.date === today);
  const tomorrowItems = mine.filter(s => s.date === tomorrow);
  const pendingToday  = todayItems.filter(s => s.status === "Pendente");
  const pendingAll    = mine.filter(s => s.date >= today && s.status === "Pendente");

  const confirm = id => setSchedules(schedules.map(s =>
    s.id === id
      ? { ...s, status: "Confirmado", confirmedAt: new Date().toISOString(), confirmedBy: user.name }
      : s
  ));
  const confirmAll = () => setSchedules(schedules.map(s =>
    String(s.instructorId) === String(user.id) && s.date === today
      ? { ...s, status: "Confirmado", confirmedAt: new Date().toISOString(), confirmedBy: user.name }
      : s
  ));

  const [queryDate, setQueryDate] = useState("");
  const queryItems = queryDate ? mine.filter(s => s.date === queryDate) : [];

  // Nome do líder responsável (vem do cadastro do instrutor)
  const leaderName = user.leader || "seu líder";

  // Semana: segunda a sexta da semana atual
  const getWeekDays = () => {
    const d = new Date(today + "T12:00:00");
    const dow = d.getDay() || 7;
    const mon = new Date(d); mon.setDate(d.getDate() - (dow - 1));
    return Array.from({ length: 5 }, (_, i) => {
      const x = new Date(mon); x.setDate(mon.getDate() + i);
      return x.toISOString().split("T")[0];
    });
  };
  const week      = getWeekDays();
  const weekItems = mine.filter(s => week.includes(s.date));

  // Configuração da timeline do dia
  const SLOT_H = 52, START_HOUR = 8, END_HOUR = 17;
  const totalH = END_HOUR - START_HOUR;
  const toFrac = t => { const [h,m] = t.split(":").map(Number); return (h + m/60 - START_HOUR) / totalH; };

  return (
    <div>
      <h2 style={{ color: "#fff", fontWeight: 800, margin: "0 0 4px", fontSize: 24 }}>Dashboard</h2>
      <p style={{ color: "#64748b", margin: "0 0 20px", fontSize: 14 }}>
        Olá, {user.name.split(" ")[0]}! Sua programação está aqui.
      </p>

      {/* ── Barra de alertas de pendências ── */}
      {pendingAll.length > 0 && (
        <div style={{ background: "#ef444415", border: "1px solid #ef4444", borderRadius: 12,
          padding: "12px 16px", marginBottom: 20, display: "flex", alignItems: "center",
          gap: 10, flexWrap: "wrap" }}>
          <Icon name="warning" size={18} color="#ef4444" />
          <p style={{ color: "#ef4444", margin: 0, fontSize: 14, fontWeight: 600, flex: 1 }}>
            {pendingAll.length} {pendingAll.length === 1 ? "programação aguarda" : "programações aguardam"} sua confirmação!
          </p>
          {pendingToday.length > 0 && (
            <button onClick={confirmAll}
              style={{ padding: "6px 16px", background: "#16a34a", border: "none", borderRadius: 8,
                color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
              Confirmar tudo hoje
            </button>
          )}
        </div>
      )}

      {/* ── HOJE — timeline visual ── */}
      <div style={{ background: "#073d4a", borderRadius: 16, padding: 24,
        border: "1px solid #154753", marginBottom: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <h3 style={{ color: "#fff", fontWeight: 700, margin: 0, fontSize: 16 }}>
            🕗 Hoje — {fmtLong(today)}
          </h3>
          {todayItems.length > 0 && pendingToday.length === 0 && (
            <span style={{ color: "#16a34a", fontWeight: 700, fontSize: 12,
              background: "#16a34a20", padding: "4px 12px", borderRadius: 20 }}>
              ✅ Tudo confirmado
            </span>
          )}
        </div>
        {todayItems.length === 0 ? (
          <p style={{ color: "#64748b", fontSize: 14 }}>
            Você está livre! Procure {leaderName}.
          </p>
        ) : (
          <div style={{ position: "relative", height: totalH * SLOT_H + 16 }}>
            {/* Grade de horas */}
            {Array.from({ length: totalH + 1 }, (_, i) => (
              <div key={i} style={{ position: "absolute", top: i * SLOT_H, left: 0, right: 0,
                borderTop: "1px solid #154753", display: "flex", alignItems: "flex-start" }}>
                <span style={{ color: "#64748b", fontSize: 10, width: 36, paddingTop: 2, flexShrink: 0 }}>
                  {String(START_HOUR + i).padStart(2,"0")}h
                </span>
              </div>
            ))}
            {/* Faixa de almoço */}
            <div style={{ position: "absolute", top: 4 * SLOT_H, left: 36, right: 0,
              height: SLOT_H, background: "#01323d60", borderRadius: 4,
              display: "flex", alignItems: "center", justifyContent: "center" }}>
              <span style={{ color: "#64748b", fontSize: 11 }}>Almoço</span>
            </div>
            {/* Blocos de disciplina */}
            {todayItems.map(s => {
              const top    = toFrac(s.startTime) * totalH * SLOT_H;
              const [hs,ms] = s.startTime.split(":").map(Number);
              const [he,me] = s.endTime.split(":").map(Number);
              const durH   = (he*60+me - hs*60-ms) / 60;
              const height = Math.max(durH * SLOT_H - 4, 28);
              const siblings = schedules.filter(other =>
                other.className === s.className && other.module === s.module &&
                other.date === s.date && String(other.instructorId) !== String(user.id)
              );
              return (
                <div key={s.id} style={{
                  position: "absolute", top: top + 2, left: 40, right: 0, height,
                  background: s.status === "Confirmado" ? "#16a34a20" : "#ffa61920",
                  border: `1px solid ${s.status === "Confirmado" ? "#16a34a" : "#ffa619"}`,
                  borderRadius: 8, padding: "4px 10px",
                  display: "flex", alignItems: "center", gap: 8, overflow: "hidden" }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <p style={{ color: "#e2e8f0", margin: 0, fontSize: 12, fontWeight: 700,
                      whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                      {s.module}
                    </p>
                    <p style={{ color: "#64748b", margin: 0, fontSize: 10 }}>
                      {s.startTime}–{s.endTime} · {s.local}
                      {siblings.length > 0 && (
                        <span style={{ color: "#94a3b8" }}>
                          {" · "}👥 {siblings.map(si => (si.instructorName || "").split(" ")[0]).join(", ")}
                        </span>
                      )}
                    </p>
                  </div>
                  {s.status === "Pendente"
                    ? <button onClick={() => confirm(s.id)}
                        style={{ padding: "3px 10px", background: "#ffa619", border: "none",
                          borderRadius: 6, color: "#fff", fontSize: 11, fontWeight: 700,
                          cursor: "pointer", flexShrink: 0 }}>
                        Estou ciente ✓
                      </button>
                    : <Icon name="check" size={14} color="#16a34a" />}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* ── AMANHÃ — cards InstructorScheduleCard ── */}
      <div style={{ background: "#073d4a", borderRadius: 16, padding: 20,
        border: "1px solid #154753", marginBottom: 20 }}>
        <h3 style={{ color: "#e2e8f0", fontWeight: 700, margin: "0 0 12px", fontSize: 15 }}>
          📋 Amanhã — {fmtLong(tomorrow)}
        </h3>
        {tomorrowItems.length === 0 ? (
          <p style={{ color: "#475569", fontSize: 13 }}>
            Você está livre! Procure {leaderName}.
          </p>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {tomorrowItems.map(s => (
              <InstructorScheduleCard
                key={s.id} s={s} schedules={schedules} user={user}
                onConfirm={confirm} showDate={false} />
            ))}
          </div>
        )}
      </div>

      {/* ── CONSULTAR DATA ── */}
      <div style={{ background: "#073d4a", borderRadius: 16, padding: 20,
        border: "1px solid #154753", marginBottom: 20 }}>
        <h3 style={{ color: "#e2e8f0", fontWeight: 700, margin: "0 0 12px", fontSize: 15 }}>
          🔍 Consultar outra data
        </h3>
        <input type="date" value={queryDate} onChange={e => setQueryDate(e.target.value)}
          style={{ background: "#01323d", border: "1px solid #154753", borderRadius: 8,
            color: "#e2e8f0", padding: "8px 12px", fontSize: 14,
            marginBottom: 12, width: "100%", maxWidth: 220 }} />
        {queryDate && (
          queryItems.length === 0 ? (
            <p style={{ color: "#475569", fontSize: 13 }}>
              Você está livre! Procure {leaderName}.
            </p>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {queryItems.map(s => (
                <InstructorScheduleCard
                  key={s.id} s={s} schedules={schedules} user={user}
                  onConfirm={confirm} showDate={true} />
              ))}
            </div>
          )
        )}
      </div>

      {/* ── ESTA SEMANA ── */}
      <div style={{ background: "#073d4a", borderRadius: 16, padding: 24, border: "1px solid #154753" }}>
        <h3 style={{ color: "#fff", fontWeight: 700, margin: "0 0 16px", fontSize: 16 }}>
          📅 Esta semana
        </h3>
        {week.map(day => {
          const dayItems = weekItems.filter(s => s.date === day);
          const isPast   = day < today;
          const isToday  = day === today;
          return (
            <div key={day} style={{ marginBottom: 14 }}>
              {/* Cabeçalho do dia */}
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                <span style={{
                  color: isToday ? "#ffa619" : isPast ? "#475569" : "#e2e8f0",
                  fontWeight: isToday ? 800 : 600, fontSize: 13, minWidth: 100 }}>
                  {fmt(day)}
                </span>
                {isToday && (
                  <span style={{ background: "#ffa61920", color: "#ffa619", fontSize: 10,
                    padding: "2px 8px", borderRadius: 10, fontWeight: 700 }}>HOJE</span>
                )}
                {dayItems.some(s => s.status === "Pendente") && (
                  <span style={{ background: "#ef444420", color: "#ef4444", fontSize: 10,
                    padding: "2px 8px", borderRadius: 10, fontWeight: 700 }}>● Pendente</span>
                )}
              </div>
              {dayItems.length === 0 ? (
                <p style={{ color: "#475569", fontSize: 12, margin: "0 0 0 8px" }}>
                  Sem treinamentos
                </p>
              ) : (
                <div style={{
                  display: "flex", flexDirection: "column", gap: 6,
                  paddingLeft: 8,
                  borderLeft: `3px solid ${isToday ? "#ffa619" : "#154753"}`,
                  opacity: isPast ? 0.7 : 1 }}>
                  {dayItems.map(s => (
                    <InstructorScheduleCard
                      key={s.id} s={s} schedules={schedules} user={user}
                      onConfirm={confirm} showDate={false} />
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ── INSTRUCTOR PROFILE (7.10.2) ───────────────────────────────────────────────
const InstructorProfile = ({ user, instructors, setInstructors, setUser }) => {
  const instr = instructors.find(i => String(i.id) === String(user.id));
  const [changing, setChanging] = useState(false);
  const [oldPass, setOldPass]   = useState("");
  const [newPass, setNewPass]   = useState("");
  const [conf,    setConf]      = useState("");
  const [passErr, setPassErr]   = useState("");
  const [passOk,  setPassOk]    = useState(false);

  const changePass = () => {
    setPassErr("");
    if (oldPass !== user.password) { setPassErr("Senha atual incorreta."); return; }
    if (newPass.length < 6)        { setPassErr("Nova senha precisa ter pelo menos 6 caracteres."); return; }
    if (newPass !== conf)          { setPassErr("As senhas não coincidem."); return; }
    setInstructors(prev => prev.map(i => String(i.id) === String(user.id) ? { ...i, password: newPass } : i));
    setUser(u => ({ ...u, password: newPass }));
    setChanging(false); setOldPass(""); setNewPass(""); setConf(""); setPassOk(true);
    setTimeout(() => setPassOk(false), 3000);
  };

  if (!instr) return <p style={{ color: "#64748b" }}>Perfil não encontrado.</p>;
  return (
    <div>
      <h2 style={{ color: "#fff", fontWeight: 800, margin: "0 0 4px", fontSize: 24 }}>Meu Perfil</h2>
      <p style={{ color: "#64748b", margin: "0 0 24px", fontSize: 14 }}>Visualize seus dados e competências. Você pode alterar sua senha.</p>

      {passOk && (
        <div style={{ background: "#16a34a20", border: "1px solid #16a34a", borderRadius: 12, padding: "12px 16px", marginBottom: 20, color: "#16a34a", fontWeight: 600, fontSize: 14 }}>
          ✅ Senha alterada com sucesso!
        </div>
      )}

      {/* Personal data (read-only) */}
      <div style={{ background: "#073d4a", borderRadius: 16, padding: 24, border: "1px solid #154753", marginBottom: 20 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 20 }}>
          <div style={{ width: 60, height: 60, borderRadius: "50%", background: "linear-gradient(135deg,#ffa619,#e8920a)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: 20, flexShrink: 0 }}>
            {instr.avatar || instr.name.split(" ").map(n => n[0]).join("").slice(0, 2)}
          </div>
          <div>
            <p style={{ color: "#e2e8f0", fontWeight: 800, margin: 0, fontSize: 18 }}>{instr.name}</p>
            <p style={{ color: "#64748b", fontSize: 13, margin: "3px 0 0" }}>{instr.contract} · {instr.base}</p>
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          {[
            ["Usuário", "@" + (instr.username || "—")],
            ["E-mail",  instr.email  || "—"],
            ["Telefone",instr.phone  || "—"],
            ["Status",  instr.status || "—"],
            ["Líder",   instr.leader || "—"],
            ["Contrato",instr.contract || "—"],
          ].map(([k, v]) => (
            <div key={k} style={{ background: "#01323d", borderRadius: 10, padding: "10px 14px" }}>
              <p style={{ color: "#64748b", fontSize: 11, margin: "0 0 3px", fontWeight: 700, textTransform: "uppercase" }}>{k}</p>
              <p style={{ color: "#e2e8f0", fontSize: 14, margin: 0, fontWeight: 600 }}>{v}</p>
            </div>
          ))}
        </div>
      </div>

      {/* Competencies (read-only) */}
      <div style={{ background: "#073d4a", borderRadius: 16, padding: 24, border: "1px solid #154753", marginBottom: 20 }}>
        <h3 style={{ color: "#fff", fontWeight: 700, margin: "0 0 12px", fontSize: 16 }}>🎯 Competências</h3>
        {(instr.skills || []).length === 0 ? (
          <p style={{ color: "#64748b" }}>Nenhuma competência cadastrada.</p>
        ) : (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {(instr.skills || []).map(s => (
              <span key={s} style={{ padding: "5px 12px", borderRadius: 20, background: "#ffa61918", border: "1px solid #ffa61930", color: "#f59e0b", fontSize: 12 }}>{s}</span>
            ))}
          </div>
        )}
      </div>

      {/* Password change */}
      <div style={{ background: "#073d4a", borderRadius: 16, padding: 24, border: "1px solid #154753" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <h3 style={{ color: "#fff", fontWeight: 700, margin: 0, fontSize: 16 }}>🔒 Alterar Senha</h3>
          {!changing && <button onClick={() => setChanging(true)} style={{ padding: "8px 16px", background: "#ffa619", border: "none", borderRadius: 8, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 13 }}>Solicitar Alteração</button>}
        </div>
        {changing && (
          <div style={{ marginTop: 16 }}>
            <Input label="Senha Atual"    type="password" value={oldPass} onChange={e => { setOldPass(e.target.value); setPassErr(""); }} placeholder="Digite sua senha atual" />
            <Input label="Nova Senha"     type="password" value={newPass} onChange={e => { setNewPass(e.target.value); setPassErr(""); }} placeholder="Mínimo 6 caracteres" />
            <Input label="Confirmar Nova" type="password" value={conf}    onChange={e => { setConf(e.target.value);    setPassErr(""); }} placeholder="Repita a nova senha" />
            {passErr && <p style={{ color: "#f87171", fontSize: 13, margin: "-8px 0 12px" }}>{passErr}</p>}
            <div style={{ display: "flex", gap: 10 }}>
              <Btn onClick={changePass} label="Salvar Nova Senha" icon="check" color="#16a34a" />
              <Btn onClick={() => { setChanging(false); setOldPass(""); setNewPass(""); setConf(""); setPassErr(""); }} label="Cancelar" color="#475569" />
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ── MY SCHEDULE ───────────────────────────────────────────────────────────────
const MySchedule = ({ schedules, setSchedules, user }) => {
  const today = new Date().toISOString().split("T")[0];
  const mine = schedules.filter(s => s.instructorId === user.id).sort((a, b) => a.date.localeCompare(b.date));
  const upcoming = mine.filter(s => s.date >= today);
  const past = mine.filter(s => s.date < today);
  const pending = mine.filter(s => s.status === "Pendente").length;
  const confirm = id => setSchedules(schedules.map(s => s.id === id ? { ...s, status: "Confirmado", confirmedAt: new Date().toISOString(), confirmedBy: user.name } : s));
  return (
    <div>
      <h2 style={{ color: "#fff", fontWeight: 800, margin: "0 0 4px", fontSize: 24 }}>Minha Agenda</h2>
      <p style={{ color: "#64748b", margin: "0 0 20px", fontSize: 14 }}>Olá, {user.name.split(" ")[0]}! Confirme suas programações.</p>
      {pending > 0 && (
        <div style={{ background: "#d9770615", border: "1px solid #d97706", borderRadius: 12, padding: "12px 16px", marginBottom: 20, display: "flex", alignItems: "center", gap: 10 }}>
          <Icon name="warning" size={18} color="#d97706" />

        <StatCard label="Total"       value={mine.length}                                      icon="calendar" color="#ffa619" sub="treinamentos" />
        <StatCard label="Próximos"    value={upcoming.length}                                  icon="star"     color="#f59e0b" sub="agendados" />
        <StatCard label="Confirmados" value={mine.filter(s => s.status === "Confirmado").length} icon="check"  color="#16a34a" sub="ciente" />
        <StatCard label="Pendentes"   value={pending}                                          icon="warning"  color="#ef4444" sub="aguardando" />

      <div style={{ background: "#073d4a", borderRadius: 16, padding: 24, border: "1px solid #154753", marginBottom: 20 }}>
        <h3 style={{ color: "#fff", fontWeight: 700, margin: "0 0 16px", fontSize: 16 }}>📅 Próximos Treinamentos</h3>
        {upcoming.length === 0 ? <p style={{ color: "#64748b" }}>Nenhum treinamento agendado.</p> : upcoming.map(s => (
          <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 16, padding: "16px 0", borderBottom: "1px solid #154753" }}>
            <div style={{ width: 52, height: 52, borderRadius: 12, background: "#01323d", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <span style={{ color: "#f59e0b", fontSize: 18, fontWeight: 800 }}>{new Date(s.date + "T12:00:00").getDate()}</span>
              <span style={{ color: "#64748b", fontSize: 10 }}>{new Date(s.date + "T12:00:00").toLocaleDateString("pt-BR", { month: "short" }).toUpperCase()}</span>
            </div>
            <div style={{ flex: 1 }}>
              <p style={{ color: "#e2e8f0", fontWeight: 700, margin: 0 }}>{s.trainingName} — {s.className}</p>
              <p style={{ color: "#64748b", fontSize: 12, margin: "4px 0 4px" }}>{s.module} · {s.local} · {s.startTime}–{s.endTime}</p>
              <span style={{ padding: "2px 8px", borderRadius: 6, background: (ROLE_BADGE[s.role] || "#64748b") + "20", color: ROLE_BADGE[s.role] || "#64748b", fontSize: 11 }}>{s.role}</span>
              {s.confirmedAt && <span style={{ color: "#64748b", fontSize: 11, marginLeft: 8 }}>Ciente em {new Date(s.confirmedAt).toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" })}</span>}
            </div>
            {s.status === "Pendente"
              ? <button onClick={() => confirm(s.id)} style={{ padding: "8px 16px", background: "linear-gradient(135deg,#16a34a,#15803d)", border: "none", borderRadius: 10, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 13, display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
                  <Icon name="check" size={14} color="#fff" /> Confirmar Ciência
                </button>
              : <span style={{ padding: "6px 14px", borderRadius: 20, background: "#16a34a20", color: "#16a34a", fontSize: 12, fontWeight: 700, flexShrink: 0, display: "flex", alignItems: "center", gap: 6 }}>
                  <Icon name="check" size={13} color="#16a34a" /> Confirmado
                </span>}

      {past.length > 0 && (
